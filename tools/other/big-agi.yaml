name: Big-AGI
tagline: Multi-model AI workspace for professionals and teams
description: Big-AGI is an open-source, multi-model AI workspace that provides a unified interface for interacting with state-of-the-art LLMs including GPT-4, Claude, Gemini, and local models. It features advanced capabilities like Beam for multi-step reasoning, persona-based chats, automatic model routing, and team collaboration — deployable via Docker, Vercel, or as a desktop application.
website_url: https://big-agi.com
github_url: https://github.com/enricoros/big-agi
docs_url: https://github.com/enricoros/big-AGI/blob/main/docs/README.md
category: Other
tags: [ai-workspace, llm, multi-model, chatbots, productivity, collaboration, self-hosted]
pricing: freemium
is_open_source: true
license: MIT
problem_solved: |
  Professionals often need to switch between multiple AI models for different tasks — coding, writing, research, and analysis — but no single tool provides a unified, customizable workspace for managing multiple models, personas, and conversations effectively. Big-AGI solves this by offering a single interface for all major LLMs, with advanced features like Beam reasoning, persona management, and team collaboration in a self-hostable or cloud-deployed workspace.
use_cases:
  - "Multi-model chats: switch between GPT-4, Claude, Gemini, local models, and custom endpoints within a single conversation thread with automatic model routing"
  - "Beam reasoning: generate multiple parallel response variants and compare them side-by-side to find the best answer for complex problems"
  - "Persona-based interactions: create custom system prompts and personas for different roles — coder, writer, analyst — and switch between them seamlessly"
  - "Team collaboration: share chats, personas, and model configurations across team members with managed deployments and permission controls"
  - "Self-hosted deployment: run Big-AGI on your own infrastructure via Docker or Vercel with full data privacy and custom model endpoint support"
