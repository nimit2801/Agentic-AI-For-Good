name: HeyGen
description: "HeyGen is an AI video generation platform that enables users to create professional videos with digital avatars, voice cloning, and text-to-speech in multiple languages. It offers custom avatar creation, template-based video production, and API access for scalable video generation workflows."
tagline: "AI video generation with customizable avatars and voice cloning"

website_url: https://www.heygen.com
docs_url: https://docs.heygen.com

category: Other
tags: [video-generation, ai-avatars, voice-cloning, text-to-video, content-creation, enterprise]
pricing: paid
is_open_source: false

problem_solved: |
  Creating personalized video content at scale — whether for sales outreach, learning modules,
  or internal communications — requires actors, studios, and production time that most teams
  cannot afford. HeyGen removes these barriers by letting users generate realistic AI avatar
  videos from text alone. Users can create custom avatars that look and sound like themselves,
  clone their voice, translate content into multiple languages, and produce hundreds of
  personalized video variations through the API. Sales teams use it for personalized video
  prospecting, L&D teams for training content, and marketers for global campaigns without
  the cost of traditional video production.

use_cases:
  - Send personalized sales outreach videos where each prospect's name and company are dynamically inserted into the script
  - Create a custom digital twin avatar for executive communications, training content, and thought leadership videos
  - Translate existing video content into 15+ languages with lip-synced voiceovers that match the original speaker's voice
  - Automate video generation workflows via API for e-commerce product demos, onboarding sequences, and personalized recommendations
