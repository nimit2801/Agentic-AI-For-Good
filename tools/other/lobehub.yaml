problem_solved: |
  Many teams experiment with AI through disconnected chats, one-off model dashboards, and separate tool integrations that make it hard to build persistent workflows or self-host their own setup. LobeHub provides a unified workspace where users can create agent teammates, connect model providers and MCP tools, add knowledge sources, and run everything from one interface with an optional self-hosted deployment path.

use_cases:
  - Self-host a multi-model chat and agent workspace for internal teams that need more control over data and integrations
  - Build personalized AI agents that connect to MCP-compatible tools, prompts, and external services in one interface
  - Add knowledge-base and document search to agent workflows so teams can work from internal context instead of isolated chats
  - Share ongoing agent conversations and workflows across a team without switching between separate AI apps
