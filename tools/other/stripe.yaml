name: Stripe
description: Online payment processing platform for internet businesses with a comprehensive API for payments, subscriptions, and financial operations.
tagline: Payment infrastructure for the internet
problem_solved: >
  Building payment infrastructure requires handling complex compliance, security, and multi-currency support across different regions. Stripe provides a developer-friendly API for payments, subscriptions, and financial operations with AI-powered fraud detection and revenue optimization tools.
category: Other
github_url: https://github.com/stripe/stripe-python
website_url: https://stripe.com
docs_url: https://docs.stripe.com
install_command: pip install stripe
pricing: paid
is_open_source: false
license: Proprietary
tags: [payments, billing, subscriptions, ecommerce, api, fintech, fraud-detection]

use_cases:
  - "Payment processing: accept and manage online payments with a simple API across multiple currencies and payment methods"
  - "Subscription management: handle recurring billing, invoicing, and metered usage with automated dunning and retries"
  - "AI-powered fraud detection: use Stripe Radar's machine learning models to detect and prevent fraudulent transactions"
