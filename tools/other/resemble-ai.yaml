name: Resemble AI
description: An AI voice platform offering deepfake detection, synthetic voice detection, and voice cloning APIs to secure voice authentication and detect AI-generated audio in real time.
tagline: AI voice security, detection, and synthetic voice APIs

github_url: https://github.com/resemble-ai
website_url: https://resemble.ai
