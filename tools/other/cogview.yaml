name: CogView
description: A series of text-to-image generation models developed by Tsinghua University that produce photorealistic images from text prompts using transformer-based architectures. CogView and CogView2 achieve competitive image quality with parallel decoding and hierarchical generation for high-resolution outputs.
tagline: Transformer-based text-to-image generation by Tsinghua University

github_url: https://github.com/THUDM/CogView
website_url: https://github.com/THUDM/CogView

category: Other
tags: [text-to-image, image-generation, transformers, diffusion, generative-ai, computer-vision]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Generating high-quality images from text descriptions requires models that understand complex visual concepts and produce coherent, detailed outputs — most open-source text-to-image models struggle with compositional prompts and fine-grained visual details. CogView uses a transformer-based approach with multi-stage generation to produce photorealistic images from natural language descriptions, supporting parallel decoding for faster inference and hierarchical generation for higher resolution outputs compared to autoregressive image generation methods.

use_cases:
  - Generate photorealistic images from detailed text descriptions for creative projects and content creation
  - Produce concept art and visual prototypes from design briefs for rapid iteration in creative workflows
  - Create training data for computer vision models by generating synthetic images from text descriptions
  - Explore visual concepts and variations from text prompts for artistic and design exploration
  - Generate scene compositions and background images for game development and virtual environments
