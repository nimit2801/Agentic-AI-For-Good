name: Ultralytics YOLO
description: >
  Ultralytics YOLO is the industry-leading, state-of-the-art framework for
  real-time object detection, instance segmentation, image classification,
  pose estimation, and multi-object tracking. Built on the YOLO (You Only
  Look Once) architecture, it provides a unified Python API and CLI for
  training, validating, predicting, and deploying computer vision models
  across edge devices, cloud servers, and mobile platforms.
tagline: State-of-the-art real-time object detection and computer vision AI
problem_solved: >
  Traditional computer vision systems require deep expertise and slow
  multi-pass algorithms to detect and classify objects in images and video.
  Ultralytics YOLO solves this by providing a single-pass, real-time neural
  network framework that anyone can use — from researchers and hobbyists to
  enterprises — to build fast, accurate vision AI without sacrificing
  performance or ease of use.
use_cases:
  - Autonomous vehicle perception and obstacle detection
  - Medical imaging analysis for diagnosis assistance
  - Industrial quality inspection and defect detection
  - Wildlife monitoring and environmental conservation
  - Smart surveillance and security threat detection
github_url: https://github.com/ultralytics/ultralytics
website_url: https://www.ultralytics.com/
docs_url: https://docs.ultralytics.com/
install_command: pip install ultralytics
category: Other
