name: MoneyPrinterTurbo
description: >
  MoneyPrinterTurbo is an AI-powered tool that generates high-definition short
  videos from just a topic or keyword. It automatically writes video copy,
  sources HD royalty-free stock footage, generates subtitles, and adds background
  music — turning a single idea into a finished short video in minutes.
tagline: AI-powered short video generator — one topic, one HD video

github_url: https://github.com/harry0703/MoneyPrinterTurbo
website_url: https://github.com/harry0703/MoneyPrinterTurbo
docs_url: https://github.com/harry0703/MoneyPrinterTurbo/blob/main/README.md

install_command: pip install -r requirements.txt

category: Other
tags: [python, video-generation, ai-video, shortvideo, automation, tts, streamlit, llm, open-source]
pricing: free
is_open_source: true
license: MIT

problem_solved: |
  Content creators and marketers face a time-consuming, multi-step process to
  produce short-form videos — scripting, sourcing footage, recording voiceovers,
  adding subtitles, and editing. MoneyPrinterTurbo automates the entire pipeline
  end-to-end, turning a single topic or keyword into a fully-produced HD short
  video in minutes, eliminating the need for video editing skills or expensive
  production tools.

use_cases:
  - "Social media content creation for TikTok, YouTube Shorts, and Instagram Reels"
  - Marketing and promotional video production for businesses and products
  - Educational and informational video series generation at scale
  - "Rapid video prototyping and A/B testing of content ideas"
