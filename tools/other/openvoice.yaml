name: OpenVoice
description: An instant voice cloning audio foundation model by MIT and MyShell that accurately clones tone color and generates speech in multiple languages and accents with flexible control over voice style, emotion, rhythm, and intonation.
tagline: Instant voice cloning with flexible style control in any language

github_url: https://github.com/myshell-ai/OpenVoice
website_url: https://research.myshell.ai/open-voice
docs_url: https://github.com/myshell-ai/OpenVoice/wiki

category: Other
tags: [voice-cloning, text-to-speech, audio-generation, multi-lingual, speech-synthesis, deep-learning]
pricing: free
is_open_source: true
license: MIT

problem_solved: |
  High-quality voice cloning traditionally requires hours of studio-recorded training data per
  speaker and separate models per language or accent. OpenVoice clones a voice from a single
  short audio sample and generates speech in multiple languages — including English, Spanish,
  French, Chinese, Japanese, and Korean — while preserving the original tone color and allowing
  fine-grained control over emotion, accent, and speaking style.

use_cases:
  - Generate multilingual voiceovers from a single recorded sample for content localization
  - Create personalized voice assistants that speak with the user's own voice in any supported language
  - Produce audiobook narration with consistent voice across multiple languages and emotional tones
  - Build voice-based accessibility tools that preserve a user's unique vocal identity across languages
  - Develop creative audio applications with granular control over emotion, rhythm, and intonation
