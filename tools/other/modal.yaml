name: Modal Labs
description: Modal is a serverless platform for running Python code in the cloud with custom containers, GPUs, and scale-to-zero billing. The Python SDK lets you define functions that run remotely with a single decorator.
tagline: Serverless cloud for Python with GPUs and scale-to-zero

github_url: https://github.com/modal-labs/modal-client
website_url: https://modal.com
docs_url: https://modal.com/docs

category: Other
tags: [serverless, cloud, gpu, python, deployment, infrastructure]
pricing: freemium
is_open_source: false
license: Apache-2.0 (SDK only)

install_command: pip install modal

problem_solved: |
  Deploying Python workloads to the cloud typically requires managing Dockerfiles, Kubernetes manifests, IAM roles, and CI/CD pipelines before you can run a single inference job. Modal collapses all of that into a Python decorator: define a function, decorate it, and it runs on managed infrastructure with GPU access, scale-to-zero billing, and built-in scheduling.

use_cases:
  - Run GPU-accelerated LLM inference or batch embedding jobs without managing infrastructure
  - Schedule recurring Python scripts (web scrapers, model retraining, ETL) on a cron in the cloud
  - Deploy ML model serving endpoints with auto-scaling and scale-to-zero cost control
  - Build and serve LLM-powered APIs with custom containers that include heavy ML dependencies
  - Run parallel data processing jobs across hundreds of containers with a simple map operation
