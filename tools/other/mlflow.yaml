name: MLflow
tagline: The open-source AI engineering platform for agents, LLMs and models
description: MLflow is the largest open-source AI engineering platform for agents, LLMs, and ML models. It enables teams to debug, evaluate, monitor, and optimize production-quality AI applications while controlling costs and managing access to models and data. With millions of monthly downloads, organizations rely on MLflow to ship AI to production with confidence.
problem_solved: Managing the complete AI and ML lifecycle across experiment tracking, model registry, deployment, prompt management, observability, and evaluation is challenging. MLflow solves this by providing a unified open-source platform that covers traditional machine learning, large language models, and AI agents end to end.
use_cases:
  - Trace and debug LLM agent behavior in production with OpenTelemetry-based observability
  - Evaluate model quality with 50+ built-in metrics and automated LLM judges
  - Manage and version prompts with full lineage tracking and optimization
  - Deploy AI agents to production endpoints via the Agent Server
  - Route LLM requests through a unified AI Gateway with rate limits and fallbacks
