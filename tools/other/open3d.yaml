name: Open3D
description: |-
  A modern library for 3D data processing that provides a comprehensive set of tools for 3D geometry, visualization, mesh processing, point clouds, and 3D machine learning with Python and C++ APIs.
tagline: A modern library for 3D data processing and visualization

github_url: https://github.com/isl-org/Open3D
website_url: http://www.open3d.org
docs_url: http://www.open3d.org/docs

category: Other
tags: [python, cpp, 3d, point-cloud, mesh, visualization, geometry, computer-graphics]
pricing: free
is_open_source: true
license: BSD-3-Clause

problem_solved: |-
  Working with 3D data traditionally requires stitching together multiple disparate libraries for loading, processing, visualizing, and analyzing 3D geometries. Open3D provides a single, unified framework with a clean API for handling point clouds, meshes, voxel grids, RGB-D images, and 3D machine learning pipelines, dramatically reducing the friction of 3D data processing.

use_cases:
  - Process and visualize large-scale point cloud data from LiDAR sensors for autonomous driving research
  - Perform mesh reconstruction, registration, and alignment for 3D scanning and photogrammetry workflows
  - Train and deploy 3D deep learning models for shape classification, segmentation, and object detection
  - Build real-time 3D visualization applications with built-in GUI and rendering capabilities
