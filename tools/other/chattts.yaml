name: ChatTTS
description: >-
  Text-to-speech model optimized for conversational speech with fine-grained prosody control,
  multi-speaker support, and natural emotional expression — designed for dialogue and chat
  applications.
tagline: Conversational TTS with emotional expression

github_url: https://github.com/2noise/ChatTTS
install_command: pip install chattts

category: Other
tags:
  - tts
  - text-to-speech
  - conversational
  - dialogue
  - prosody
  - speech-synthesis
pricing: free
is_open_source: true
license: AGPL-3.0

problem_solved: >-
  Most text-to-speech systems produce monotonic, announcer-style speech that sounds unnatural in
  conversational contexts like voice assistants, chatbots, and dialogue systems. ChatTTS is
  specifically designed for conversational speech — it provides fine-grained control over prosody,
  laughter, pauses, and emotional tone so that generated speech sounds natural in back-and-forth
  dialogue, with multi-speaker support for chat applications.

use_cases:
  - Generate natural conversational speech for voice assistants and chatbot interfaces with emotional expression
  - Control prosody, pitch, and speaking rate at fine granularity for expressive dialogue delivery
  - Create multi-speaker voice interactions for role-playing games and interactive fiction
  - Synthesize training data for speech recognition systems in conversational domains
  - Build accessibility tools with natural-sounding speech that adapts tone to context
