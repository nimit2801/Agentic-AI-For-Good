name: OpenAI Whisper
description: Robust speech recognition system via large-scale weak supervision. A general-purpose Transformer sequence-to-sequence model trained on 680k+ hours of multilingual audio data. Supports speech recognition, translation, language identification, and voice activity detection across 99+ languages.
tagline: State-of-the-art open-source speech recognition supporting 99+ languages

github_url: https://github.com/openai/whisper
website_url: https://openai.com/index/whisper
docs_url: https://github.com/openai/whisper

install_command: pip install openai-whisper

category: Other
tags: [speech-recognition, audio, transcription, asr, multilingual, deep-learning, transformer, pytorch, openai, translation]
pricing: free
is_open_source: true
license: MIT

problem_solved: |
  Before Whisper, high-quality automatic speech recognition (ASR) was fragmented across dozens of language-specific models and proprietary APIs with restrictive pricing and data privacy concerns. Developers needed separate solutions for transcription, translation, and language ID — each with inconsistent accuracy. Whisper solves this with a single open-source model that rivals commercial ASR quality across 99+ languages, handling transcription, translation to English, language identification, and timestamp alignment in one unified pipeline. It runs locally, respects privacy, and has become the de facto standard for open-source speech-to-text.

use_cases:
  - Transcribe podcasts, meetings, and lectures with high accuracy across 99+ languages and speaker diarization
  - Translate non-English speech audio into English text for cross-language content accessibility
  - Build voice-controlled applications and hands-free UI systems with real-time speech command recognition
  - Generate accurate subtitles and closed captions for video content with word-level timestamps
  - Analyze customer service calls and extract insights from voice conversations in multiple languages
