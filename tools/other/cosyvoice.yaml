name: CosyVoice
description: >-
  Alibaba's text-to-speech system with voice cloning, zero-shot voice adaptation, and fine-grained
  prosody control using a supervised semantic token approach for natural speech synthesis.
tagline: TTS with zero-shot voice cloning

github_url: https://github.com/FunAudioLLM/CosyVoice
install_command: pip install cosyvoice

category: Other
tags:
  - tts
  - text-to-speech
  - voice-cloning
  - zero-shot
  - speech-synthesis
  - audio-generation
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: >-
  Creating custom synthetic voices traditionally requires hours of studio-recorded training data
  per speaker and complex fine-tuning pipelines that are inaccessible to most developers. CosyVoice
  enables zero-shot voice cloning — generating speech in a target voice from just a few seconds of
  audio — using a supervised semantic token approach. Combined with fine-grained prosody control,
  it makes personalized speech synthesis practical for real-world applications.

use_cases:
  - Clone voices from short audio samples for personalized TTS in virtual assistants and content creation
  - Generate speech with precise control over emotion, speaking rate, and intonation for expressive delivery
  - Build multilingual voice applications with consistent voice identity across languages
  - Create synthetic training data for speech recognition with diverse speaker characteristics
  - Develop accessibility tools with personalized synthetic voices that match user preferences
