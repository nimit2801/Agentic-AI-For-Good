name: Khoj
description: A personal AI app that extends your capabilities with chat, semantic search, and custom agents over your documents. Scales smoothly from an on-device personal AI to a cloud-scale enterprise AI.
tagline: Your AI second brain for chat, search, and automation

github_url: https://github.com/khoj-ai/khoj
website_url: https://khoj.dev
docs_url: https://docs.khoj.dev

install_command: pip install khoj

category: Other
tags: [python, ai, rag, agents, semantic-search, personal-knowledge-base, open-source, self-hosted, chatbot]
pricing: freemium
is_open_source: true
license: AGPL-3.0

problem_solved: |
  People struggle to find information across their scattered digital notes, documents, emails, and bookmarks.
  Khoj creates a unified, AI-powered interface to chat with, search, and automate workflows over all your
  personal knowledge, keeping data completely private when self-hosted and supporting any local or online LLM.

use_cases:
  - Chat with your PDFs, notes, and emails using any local or online LLM through a single interface
  - Build custom AI agents with specific knowledge, personas, and tool access for automation
  - Automate repetitive research with personal newsletters and smart notification digests
  - Search across all documents semantically to find relevant information instantly without keywords
