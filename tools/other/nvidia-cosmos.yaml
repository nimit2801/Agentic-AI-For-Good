name: NVIDIA Cosmos
description: NVIDIA's world foundation model platform for physical AI, generating photorealistic video and 3D scenes from text, images, and action inputs at scale.
tagline: World foundation models for physical AI

github_url: https://github.com/NVIDIA/Cosmos
website_url: https://developer.nvidia.com/cosmos

category: Other
tags: [video-generation, world-model, physical-ai, simulation, nvidia, generative-ai]
pricing: free
is_open_source: true
license: NOASSERTION

problem_solved: |
  Building physical AI systems — robots, autonomous vehicles, and embodied agents — requires
  massive amounts of diverse, realistic simulation data that is expensive and time-consuming to
  collect. NVIDIA Cosmos generates photorealistic video and 3D content from text, images, and
  action prompts, providing a scalable data pipeline for training and testing physical AI models.

use_cases:
  - Generate photorealistic training video for robotics and embodied AI systems from text descriptions
  - Create diverse simulation scenarios for testing autonomous vehicle perception and planning
  - Produce synthetic 3D scenes and object interactions for training computer vision models
  - Augment real-world datasets with AI-generated variations for robust model training
  - Enable video-to-video and image-to-video generation for creative and simulation workflows
