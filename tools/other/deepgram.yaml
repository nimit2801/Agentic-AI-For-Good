name: Deepgram
tagline: Real-time voice AI APIs for speech-to-text, text-to-speech, and voice agents
description: |-
  Deepgram is a voice AI platform providing real-time speech-to-text, text-to-speech, and voice agent APIs powered by end-to-end deep learning. It delivers high-accuracy transcription with sub-300ms latency, supporting 100+ languages and streaming audio for developers building voice-enabled applications.
problem_solved: |-
  Adding accurate, low-latency speech recognition to applications traditionally requires training custom ML models and managing complex infrastructure. Deepgram provides a simple API that converts audio to text with industry-leading accuracy, real-time streaming, and built-in audio intelligence features.
github_url: https://github.com/deepgram/deepgram-python-sdk
website_url: https://deepgram.com
docs_url: https://developers.deepgram.com
install_command: pip install deepgram-sdk
category: Other
tags:
  - speech-to-text
  - voice-ai
  - transcription
  - text-to-speech
  - voice-agents
pricing: freemium
is_open_source: false
license: MIT
use_cases:
  - "Real-time captioning for live events, webinars, and broadcasts"
  - "Transcribing customer support calls for analytics and compliance"
  - "Building voice-controlled applications and virtual assistants"
  - "Generating subtitles and transcripts for media content at scale"
  - "Powering voice agent interactions with conversational AI and TTS"
