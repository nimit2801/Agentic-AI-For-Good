name: SwarmUI
description: "SwarmUI (formerly StableSwarmUI) is a modular, high-performance AI image and video generation web UI that supports Stable Diffusion, Flux, Z-Image, Qwen Image, Wan, Hunyuan Video, and more. It combines an intuitive Generate tab for beginners with a full Comfy Workflow tab for advanced users, plus powertools like Grid Generator and batch processing — all in one extensible, open-source interface."
tagline: "Modular web UI for AI image and video generation"
