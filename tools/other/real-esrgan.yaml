name: Real-ESRGAN
description: A practical algorithm for general image and video restoration that enhances resolution, removes artifacts, and restores detail using a Real-ESRGAN architecture trained on synthetic and real-world degradations.
tagline: General-purpose image and video upscaling with realistic detail

github_url: https://github.com/xinntao/Real-ESRGAN
website_url: https://github.com/xinntao/Real-ESRGAN
install_command: pip install realesrgan

category: Other
tags: [image-restoration, upscaling, super-resolution, computer-vision, python]
pricing: free
is_open_source: true
license: BSD-3-Clause

problem_solved: |
  Traditional image upscaling methods produce blurry, artifact-ridden results when enhancing
  old photos, low-resolution images, or compressed video frames — especially for complex scenes
  with faces, text, and fine details. Real-ESRGAN extends the ESRGAN architecture with a more
  practical training strategy using high-order degradation models that simulate real-world image
  deterioration. It upscales images 2x-4x while restoring sharpness, removing compression
  artifacts, and preserving natural textures without the glossy, plastic look of earlier GAN
  upscalers.

use_cases:
  - Enhance old family photos and historical images for printing and digital archiving with realistic detail
  - Upscale low-resolution video frames for restoration projects without introducing temporal artifacts
  - Improve image quality in surveillance footage for forensic analysis and evidence preparation
  - Batch-process large image collections for e-commerce, publishing, or digital asset management workflows
