use_cases:
  - Creating AI avatars by cloning appearance and voice from real-person video data
  - Generating talking head videos driven by text-to-speech or voice input — fully offline
  - Producing digital human content for education, marketing, and enterprise communications
  - Running avatar generation on Windows with Docker-based deployment for privacy-sensitive use cases
  - Supporting multi-language avatar video production with customizable voice parameters
