name: Duix Avatar
tagline: Truly open-source AI avatar toolkit for offline video generation
description: |-
  Duix Avatar is a free and open-source AI avatar toolkit for offline video generation and digital human cloning. It clones appearance and voice from real-person video data to create ultra-realistic digital humans, with text-to-speech driven avatar animation. Fully offline on Windows, supports Docker deployment, multi-language scripts, and customizable voice parameters.
problem_solved: |-
  Creating realistic AI avatars typically costs tens of thousands of dollars for 3D digital human production or requires cloud-based services that compromise privacy. Duix Avatar solves this by providing a free, fully offline toolkit that clones appearance and voice from video data and drives avatars with text or voice — all running locally with no internet connection needed.
github_url: https://github.com/duixcom/Duix-Avatar
website_url: https://www.duix.com
