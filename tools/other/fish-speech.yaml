name: Fish Speech
description: >-
  Advanced text-to-speech system with voice cloning capabilities, supporting over 10 languages with
  low-latency synthesis and high-quality voice output using latent-code Transformer models.
tagline: Multilingual TTS with voice cloning

github_url: https://github.com/fishaudio/fish-speech
website_url: https://speech.fish.audio

category: Other
tags:
  - tts
  - text-to-speech
  - voice-cloning
  - multilingual
  - audio-generation
  - speech-synthesis
pricing: free
is_open_source: true
license: Fish Audio Research License

problem_solved: >-
  Building multilingual voice applications requires high-quality text-to-speech synthesis with
  natural prosody across languages, but most commercial TTS APIs are expensive, limited in language
  support, or disallow custom voices. Fish Speech provides open-source, low-latency TTS with voice
  cloning across 10+ languages, giving developers a self-hosted alternative to proprietary speech
  APIs for production deployments.

use_cases:
  - Synthesize natural-sounding speech in over 10 languages for multilingual content and applications
  - Clone and customize voices from short audio samples for personalized speech interfaces
  - Deploy low-latency TTS pipelines for real-time voice assistants and interactive voice response
  - Generate speech training data for voice recognition and speech-to-text model development
  - Build accessibility tools with high-quality screen reader voices in under-resourced languages
