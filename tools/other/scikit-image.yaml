name: scikit-image
description: |-
  A collection of algorithms for image processing in Python, providing a well-documented, NumPy-native library with tools for segmentation, transformation, feature extraction, morphology, and color processing.
tagline: Image processing algorithms for scientific Python

github_url: https://github.com/scikit-image/scikit-image
website_url: https://scikit-image.org
docs_url: https://scikit-image.org/docs

category: Other
tags: [python, image-processing, computer-vision, numpy, segmentation, feature-extraction, scientific]
pricing: free
is_open_source: true
license: BSD-3-Clause

problem_solved: |-
  Image processing in Python historically required switching between multiple C++ libraries (OpenCV, ITK) with different API conventions, or implementing basic algorithms from scratch. scikit-image provides a comprehensive collection of production-ready image processing algorithms with a consistent, NumPy-native API built on top of the scientific Python ecosystem, making it easy to build image processing pipelines.

use_cases:
  - Segment cells and biological structures in microscopy images using watershed and active contour algorithms
  - Extract and match image features (SIFT, ORB, HOG) for panorama stitching and object recognition
  - Apply morphological operations and filters to clean and enhance images in document processing workflows
  - Perform color space conversions, histogram equalization, and exposure adjustments in image preprocessing pipelines
