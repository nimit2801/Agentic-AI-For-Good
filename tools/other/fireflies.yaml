pricing: paid
is_open_source: false
use_cases:
  - "Auto-joining calendar meetings to record, transcribe, and summarize every team conversation"
  - "Analyzing sales calls with sentiment analysis, talk-time metrics, and topic tracking"
  - "Searching across thousands of meetings to find specific discussions, decisions, or quotes"
  - "Syncing meeting insights to CRM, project management, and collaboration tools automatically"
  - "Generating custom AI summaries with action items for recruiting, sales, and product meetings"
