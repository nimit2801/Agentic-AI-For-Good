name: Burr
description: >
  Apache Burr (incubating) is a lightweight, dependency-free Python library that
  makes it easy to develop applications that make decisions — such as chatbots,
  agents, and simulations — by expressing them as state machines built from
  simple Python functions, with an integrated UI for real-time monitoring and
  tracing.
problem_solved: >
  Managing state, tracking complex decisions, and adding human feedback in
  LLM-powered applications is difficult; Burr solves this by enabling developers
  to express applications as explicit state machines with pluggable persistence
  and a built-in UI for real-time monitoring, debugging, and tracing.
use_cases:
  - "Build stateful chatbots and conversational agents with explicit state management"
  - "Create agentic workflows and simulations as maintainable state machines"
  - "Monitor, trace, and debug application execution in real time with the Burr UI"
github_url: https://github.com/apache/burr
website_url: https://burr.apache.org/
docs_url: https://burr.apache.org/
install_command: pip install "apache-burr[start]"
tagline: "A state machine framework for building decision-making AI applications"
tags:
  - state-machine
  - agent-framework
  - chatbot
  - monitoring
  - tracing
  - apache
  - llmops
pricing: free
is_open_source: true
license: Apache-2.0
