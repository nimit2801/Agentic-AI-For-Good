name: InvokeAI
description: InvokeAI is a leading open-source creative engine for Stable Diffusion models. It provides an industry-leading WebUI with a unified canvas, in/out-painting, brush tools, and node-based workflows for professionals, artists, and enthusiasts to generate and refine visual media.
tagline: Creative engine for Stable Diffusion with professional-grade tools
category: Other
pricing: free
is_open_source: true
license: Apache-2.0
github_url: https://github.com/invoke-ai/InvokeAI
website_url: https://invoke-ai.github.io/InvokeAI/
docs_url: https://invoke.ai/
install_command: |
  # Download the launcher from GitHub releases
  # Visit https://github.com/invoke-ai/launcher/releases/latest
  # Or install via pip for development:
  pip install InvokeAI
problem_solved: Creating and refining AI-generated images requires complex pipeline setup and technical knowledge. InvokeAI provides an intuitive web interface with a unified canvas, in/out-painting, brush tools, and node-based workflows, making professional-grade image generation accessible to creators.
use_cases:
  - Generate high-quality images from text prompts using Stable Diffusion models
  - Create and refine images with an interactive canvas and brush tools
  - Build reusable node-based workflows for complex image generation pipelines
  - Run locally for complete privacy and control over generated content
tags:
  - python
  - image-generation
  - stable-diffusion
  - canvas
  - creative
