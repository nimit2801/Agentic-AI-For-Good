name: Otter AI
tagline: AI meeting notetaker that records, transcribes, and summarizes conversations
description: |-
  Otter AI is an AI meeting assistant that automatically records, transcribes, and summarizes meetings across video conferencing platforms. It provides real-time transcription, speaker identification, automated summaries, action items, and a searchable knowledge base — helping teams capture and recall meeting insights without manual note-taking.
problem_solved: |-
  Team meetings generate critical information — decisions, action items, design rationale — that gets lost when no one takes notes or when notes are incomplete. Otter solves this by automatically joining meetings, transcribing everything in real time, generating AI summaries and action items, and building a searchable repository of every conversation so nothing is forgotten.
website_url: https://otter.ai
docs_url: https://help.otter.ai
category: Other
tags:
  - meeting-assistant
  - transcription
  - ai-notes
  - meeting-summaries
  - productivity
pricing: freemium
is_open_source: false
use_cases:
  - "Automatically recording and transcribing team meetings across Zoom, Google Meet, and Teams"
  - "Generating meeting summaries with key points, decisions, and action items after every call"
  - "Searching past conversations using natural language queries to find specific decisions or discussions"
  - "Sharing meeting notes and transcripts with absent team members for async collaboration"
  - "Capturing in-person conversations via the mobile app for record-keeping and follow-ups"
