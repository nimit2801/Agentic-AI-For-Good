name: Runway
description: "Runway is an AI-powered creative suite for video generation, editing, and post-production. It provides tools for text-to-video, image-to-video, video-to-video, inpainting, motion tracking, green screen keying, and real-time collaboration — making advanced video production accessible to everyone."
tagline: "AI-powered video generation, editing, and creative tools"

