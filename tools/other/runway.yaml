problem_solved: |
  Professional video editing and visual effects require expensive software, powerful hardware,
  and years of specialized training. Runway brings AI-powered video tools to a browser —
  generating video from text prompts, removing backgrounds without a green screen, tracking
  objects across frames, and applying cinematic effects with natural language instructions.
  Its Gen-3 and Gen-4 models produce high-quality video from text or images, while tools like
  inpainting, frame interpolation, and motion brush give creators fine-grained control.
  Runway replaces complex multi-app workflows with a single cloud-based creative suite.

use_cases:
  - Generate short video clips from text prompts for social media content, marketing spots, and creative projects
  - Remove video backgrounds, objects, or people from footage without a green screen using AI segmentation tools
  - Create visual effects, motion graphics, and AI-generated transitions for professional video post-production
  - Prototype film scenes and storyboards by generating video samples from text descriptions before committing to production
