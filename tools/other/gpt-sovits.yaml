name: GPT-SoVITS
description: A few-shot voice cloning and text-to-speech system that can train a high-quality TTS model with just one minute of reference audio. Supports zero-shot and few-shot voice cloning across multiple languages including Chinese, English, Japanese, Korean, and Cantonese with web UI inference and real-time voice conversion.
tagline: Train a TTS model from just 1 minute of voice data

github_url: https://github.com/RVC-Boss/GPT-SoVITS
website_url: https://github.com/RVC-Boss/GPT-SoVITS
docs_url: https://github.com/RVC-Boss/GPT-SoVITS/wiki

category: Other
tags: [voice-cloning, text-to-speech, few-shot, speech-synthesis, audio-generation, deep-learning]
pricing: free
is_open_source: true
license: MIT

problem_solved: |
  Most TTS systems require hours of studio-quality recordings for each speaker, making voice
  cloning inaccessible for casual use or for speakers of low-resource languages. GPT-SoVITS
  combines a GPT-based language model with a SoVITS vocoder to produce convincing voice clones
  from just 60 seconds of reference audio, with cross-lingual support and an intuitive web UI
  that makes training accessible to non-technical users.

use_cases:
  - Clone a voice from a 60-second recording for personalized TTS in games, videos, or podcasts
  - Generate Chinese and English bilingual voice content with consistent tone from a single speaker sample
  - Create character voices for indie games and animation with minimal voice actor recording time
  - Build accessibility tools that let users preserve and use their voice after speech loss
  - Produce real-time voice conversion for live streaming with low latency and high audio quality
