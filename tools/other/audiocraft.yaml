name: Audiocraft
description: A deep learning library for audio processing and generation that features MusicGen for text-to-music generation, EnCodec for high-fidelity neural audio compression, and AudioGen for text-to-sound effect synthesis.
tagline: Generate music and audio with deep learning from text prompts

github_url: https://github.com/facebookresearch/audiocraft
website_url: https://audiocraft.metademolab.com
install_command: pip install audiocraft

category: Other
tags: [audio-generation, music, deep-learning, pytorch, text-to-music, compression]
pricing: free
is_open_source: true
license: MIT

problem_solved: |
  Generating high-quality music and audio from text descriptions traditionally required either
  expensive studio production or rudimentary sample-based playback systems with limited creative
  control. Audiocraft provides state-of-the-art deep learning models for audio: MusicGen
  generates coherent, stylistically consistent music from text descriptions and melodic
  references; EnCodex compresses audio to very low bitrates while maintaining perceptual quality;
  and AudioGen synthesizes sound effects like footsteps, rain, or machinery from text prompts.
  All models run locally on consumer GPUs.

use_cases:
  - Generate original music tracks from text descriptions and melodic hums for content creation and prototyping
  - Compress audio for streaming and storage with EnCodec's high-quality neural codec at ultra-low bitrates
  - Synthesize custom sound effects for video games, films, and interactive applications from text prompts
  - Create audio training data by generating diverse sound samples with controllable acoustic properties
