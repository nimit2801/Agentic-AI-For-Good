name: Model Context Protocol (MCP)
description: "An open protocol standard that enables seamless integration between LLM applications and external data sources, tools, and workflows. MCP uses JSON-RPC 2.0 to establish stateful connections between hosts, clients, and servers, providing a universal connector for AI applications to share context, expose tools, and build composable integrations."
tagline: "The universal connector standard for AI apps and tools"
github_url: https://github.com/modelcontextprotocol/modelcontextprotocol
website_url: https://modelcontextprotocol.io
docs_url: https://modelcontextprotocol.io/docs/getting-started/intro
category: Other
tags:
  - protocol
  - ai-integration
  - llm
  - json-rpc
  - tool-use
  - anthropic
  - open-standard
  - context-management
  - agent-infrastructure
pricing: free
is_open_source: true
license: Apache-2.0
problem_solved: "AI applications lack a standardized way to connect to external data sources, tools, and workflows, requiring bespoke integrations for every combination of model and service. MCP provides an open, universal protocol so that any AI app can connect to any compatible tool or data source through a single standard interface."
use_cases:
  - "Connecting AI assistants like Claude or ChatGPT to local files, databases, and APIs through a standardized protocol"
  - "Building AI-powered IDEs and development tools that can access contextual data and execute tools via MCP servers"
  - "Creating enterprise chatbots that integrate with multiple organizational data sources and workflows uniformly"
