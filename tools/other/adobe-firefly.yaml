name: Adobe Firefly
description: "Adobe Firefly is a family of generative AI models integrated into Adobe's creative ecosystem for text-to-image, text-to-video, generative fill, text effects, and 3D-to-image conversion. It brings safe-for-commercial-use AI generation directly into Photoshop, Illustrator, and Express workflows."
tagline: "Generative AI for creative production — integrated into Adobe's ecosystem"

website_url: https://www.adobe.com/products/firefly.html
docs_url: https://helpx.adobe.com/firefly/using.html

category: Other
tags: [image-generation, video-generation, creative-tools, text-to-image, design, adobe, enterprise]
pricing: freemium
is_open_source: false

problem_solved: |
  Generative AI tools often operate outside existing creative workflows, forcing designers to
  switch between apps or paste generated content between tools. Adobe Firefly is natively
  integrated into the Adobe Creative Cloud ecosystem — Photoshop, Illustrator, Express, and
  Premiere Pro — so designers can generate, edit, and refine AI content without leaving their
  primary tools. Firefly offers text-to-image, generative fill, text effects, and now text-to-video,
  all trained on commercially safe data. Creative professionals get AI-powered productivity
  boosts inside the tools they already use, with enterprise-grade copyright protection.

use_cases:
  - Generate and edit images directly inside Photoshop using text prompts for concept exploration, background replacement, and creative iterations
  - Apply custom text effects and typography treatments using AI-generated textures, patterns, and styles in Illustrator and Express
  - Create commercially safe social media graphics, blog images, and marketing materials with AI generation licensed for commercial use
  - Extend video footage with generative AI tools and text-to-video directly within Premiere Pro for post-production and content creation
