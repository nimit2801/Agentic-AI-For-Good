name: ComfyUI
description: The most powerful and modular diffusion model GUI, API, and backend with a graph/nodes interface. Supports image, video, 3D, and audio generation with state-of-the-art open-source models like Flux, SD3, Hunyuan Video, and more through an intuitive visual node editor.
tagline: Node-based AI creation engine for image, video, and 3D generation

github_url: https://github.com/Comfy-Org/ComfyUI
website_url: https://www.comfy.org
docs_url: https://docs.comfy.org

install_command: |
  pip install comfy-cli
  comfy install

category: Other
tags: [diffusion-models, image-generation, video-generation, stable-diffusion, flux, node-editor, gui, pytorch, workflow, 3d-generation, audio-generation]
pricing: free
is_open_source: true
license: GPL-3.0

problem_solved: |
  Generating high-quality AI imagery, video, and 3D content typically requires stitching together multiple incompatible tools, managing complex command-line scripts, and navigating fragmented model ecosystems. ComfyUI solves this by providing a unified visual node-graph interface where creators can design, iterate, and productionize any AI generation workflow — from text-to-image to video and 3D — without writing code. Its modular architecture, memory-efficient execution, and support for virtually every major open model make it the de facto standard for professional AI content creation.

use_cases:
  - Build complex Stable Diffusion and Flux image generation workflows with visual node graphs
  - Create AI-generated videos using Hunyuan Video, Wan, and LTX-Video models with full control
  - Generate 3D models from text or images using Hunyuan3D with export-ready outputs
  - Design reusable production pipelines with App Mode and API endpoints for batch processing
  - Experiment with LoRA, ControlNet, and inpainting for precise image editing and enhancement
