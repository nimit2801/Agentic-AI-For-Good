name: RAGFlow
description: "RAGFlow is an open-source Retrieval-Augmented Generation engine that combines deep document understanding with agentic orchestration. It provides template-based intelligent chunking, hybrid search, grounded citations with traceability, and visual workflow design for building production-grade RAG pipelines that go beyond simple vector search."
tagline: "Open-source RAG engine with deep document understanding and agents"
github_url: https://github.com/infiniflow/ragflow
website_url: https://ragflow.io
docs_url: https://ragflow.io/docs/
install_command: "git clone https://github.com/infiniflow/ragflow.git && cd ragflow/docker && docker compose -f docker-compose.yml up -d"
category: RAG
tags:
  - rag
  - retrieval
  - documents
  - agents
  - open-source
  - enterprise
pricing: freemium
is_open_source: true
license: Apache-2.0
problem_solved: "Most RAG systems suffer from poor document parsing that produces garbage context, limited retrieval accuracy, and lack of explainability. RAGFlow solves this with deep document understanding, template-based chunking, hybrid search with citations, and agent-based orchestration — making retrieved answers trustworthy and traceable."
use_cases:
  - "Build enterprise knowledge bases that ingest Word, PDF, Excel, images, and web pages into searchable AI context"
  - "Automate equity investment research with multi-agent workflows that collect data and generate reports"
  - "Perform legal precedent analysis by extracting structured issues and retrieving comparable cases with citations"
  - "Create customer-support bots that ground answers in uploaded documentation with verifiable source references"
