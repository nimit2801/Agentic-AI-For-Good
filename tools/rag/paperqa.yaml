name: PaperQA
description: PaperQA (PaperQA2) is a high-accuracy agentic RAG system built for answering questions from scientific documents with precise citations. It integrates full-text search, metadata-aware embeddings, LLM re-ranking, and citation traversal to produce grounded, cited answers that surpass human expert performance on scientific literature benchmarks.
tagline: Superhuman RAG for scientific literature with cited, grounded answers

github_url: https://github.com/Future-House/paper-qa
website_url: https://www.futurehouse.org/research-announcements/wikicrow
docs_url: https://github.com/Future-House/paper-qa#readme

install_command: pip install paper-qa

category: RAG
tags: [rag, scientific-research, document-qa, literature-review, python]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Researchers and knowledge workers struggle to efficiently extract accurate, cited answers
  from large collections of scientific papers and technical documents. PaperQA solves this
  with a multi-step agent that automatically searches across documents, retrieves relevant
  passages, ranks evidence, and synthesizes well-cited answers — achieving superhuman
  accuracy on scientific QA benchmarks like LitQA2.

use_cases:
  - Automate literature reviews with cited evidence extracted from scientific papers
  - Answer domain-specific research questions with grounded citations from primary sources
  - Fact-check scientific claims against published literature at superhuman accuracy
  - Build knowledge management systems for R&D teams working with technical documents
