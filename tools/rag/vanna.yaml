name: Vanna
description: |
  Vanna is an open-source Python library that turns natural language questions into accurate SQL queries using LLMs and agentic retrieval-augmented generation (RAG). It learns your database schema and query history to generate, validate, and refine SQL, then returns results as data tables, charts, and summaries through a streaming web interface.
tagline: Natural language to SQL with agentic RAG and LLM-powered query generation
problem_solved: |
  Data analysts and business users often lack SQL skills, creating a bottleneck where every data request must go through engineering. Vanna eliminates this by letting anyone ask questions in plain English and get back accurate, executable SQL along with live results, visualizations, and natural-language summaries. It uses an agentic RAG approach to ground LLM outputs in your actual database schema, dramatically reducing hallucinated queries.
use_cases:
  - Business intelligence teams querying data warehouses without writing SQL
  - Customer support agents retrieving real-time order and user data via chat
  - Product managers analyzing feature usage and event funnels conversationally
category: RAG
tags:
  - python
  - sql
  - text-to-sql
  - database
  - open-source
github_url: https://github.com/vanna-ai/vanna
website_url: https://vanna.ai
