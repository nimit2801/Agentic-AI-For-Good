name: Quivr
description: An opinionated RAG framework for integrating GenAI into your apps. Supports any LLM, any vector store, and any file type with easy customization and existing-product integration.
tagline: Production-ready RAG for any LLM, vector store, or file type

github_url: https://github.com/QuivrHQ/quivr
website_url: https://quivr.com
docs_url: https://core.quivr.com

install_command: pip install quivr-core

category: RAG
tags: [python, rag, knowledge-base, chatbot, document-qa, genai]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Building a production-ready Retrieval-Augmented Generation pipeline from scratch means wiring
  together document ingestion, chunking, embedding, vector storage, retrieval, and LLM orchestration.
  Quivr provides an opinionated, ready-made RAG stack that handles all of this out of the box,
  letting developers focus on their product instead of plumbing. It works with any LLM, any vector
  store, and any file format.

use_cases:
  - Build a personal "second brain" AI assistant that answers questions across private documents
  - Automate customer support by grounding chatbots in product docs and knowledge bases
  - Power internal documentation Q&A for engineering teams with multi-format file ingestion
  - Create custom RAG workflows and chatbots over PDFs, text, Markdown, and more
