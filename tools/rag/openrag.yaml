name: OpenRAG
description: An IBM-backed, comprehensive open-source RAG platform that combines Langflow, Docling, and OpenSearch into a single-package deployment. Enables intelligent document search and AI-powered conversations through agentic RAG workflows with built-in document ingestion, semantic retrieval, reranking, and LLM generation.
tagline: Intelligent agent-powered document search

github_url: https://github.com/langflow-ai/openrag
website_url: https://www.openr.ag/
docs_url: https://docs.openr.ag/

install_command: uvx --python 3.13 openrag

category: RAG
tags: [rag, retrieval-augmented-generation, opensearch, langflow, docling, ibm, document-search, agentic-rag, vector-search]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Enterprises struggle to ground LLMs in private data due to the complexity of setting up production RAG pipelines — connecting document parsers, vector databases, embedding models, rerankers, and LLMs requires stitching together multiple incompatible tools. OpenRAG solves this by delivering a single-package, open-source RAG platform that handles document ingestion, hybrid search, reranking, and LLM generation out of the box with a drag-and-drop workflow builder, backed by the Langflow orchestration engine and OpenSearch for production-grade retrieval.

use_cases:
  - Build customer support assistants that search documentation and tickets for accurate, citation-backed answers
  - Deploy internal knowledge copilots answering employee questions using company documents and policies
  - Perform natural language analytics on large collections of reports, contracts, or regulatory documents
  - Create agentic RAG workflows with multi-agent coordination, re-ranking, and context-aware follow-ups
  - Enable drag-and-drop RAG pipeline construction for non-technical team members via Langflow visual interface
