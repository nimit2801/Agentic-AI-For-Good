name: FlashRAG
description: >
  A Python toolkit for efficient Retrieval-Augmented Generation (RAG) research.
  It includes 36 pre-processed benchmark datasets and 23 state-of-the-art RAG
  algorithms, plus modular components (retrievers, rerankers, generators,
  compressors, judgers) for building and evaluating custom pipelines.

tagline: A Python toolkit for efficient RAG research

github_url: https://github.com/RUC-NLPIR/FlashRAG
website_url: https://ruc-nlpir.github.io/FlashRAG/
docs_url: https://ruc-nlpir.github.io/FlashRAG/#/
install_command: pip install flashrag-dev --pre

category: RAG
tags:
  - RAG
  - benchmark
  - retrieval-augmented-generation
  - datasets
  - LLM
  - evaluation
  - framework
  - Python

pricing: free
is_open_source: true
license: MIT

problem_solved: |
  RAG researchers and developers face high friction reproducing SOTA methods,
  benchmarking new ideas, and assembling pipelines from scratch. FlashRAG
  standardizes datasets, components, and evaluation in one modular toolkit,
  dramatically accelerating RAG experimentation and reproducibility.

use_cases:
  - Reproduce and benchmark 23+ SOTA RAG algorithms on 36+ datasets
  - Assemble custom RAG pipelines from modular retrievers, generators, and refiners
  - Evaluate reasoning-based RAG on complex multi-hop QA tasks
  - Rapidly prototype RAG systems via the included visual UI (FlashRAG-UI)
