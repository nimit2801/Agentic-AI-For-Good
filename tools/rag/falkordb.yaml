name: FalkorDB
description: A high-performance, multi-tenant graph database optimized for generative AI workloads — powering knowledge graphs, agent memory, RAG pipelines, and graph-based retrieval with native Cypher query support.
tagline: Ultra-fast graph database for AI knowledge graphs and agent memory

github_url: https://github.com/FalkorDB/FalkorDB
website_url: https://www.falkordb.com
docs_url: https://docs.falkordb.com
install_command: |
  docker run -p 6379:6379 falkordb/falkordb:latest

category: RAG
