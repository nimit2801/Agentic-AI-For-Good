name: Verba
description: An open-source Retrieval-Augmented Generation (RAG) application by Weaviate that provides a streamlined user interface for querying and interacting with your data. Supports multiple LLM providers, chunking strategies, data types, and deployment options — local or cloud.
tagline: The Golden RAGtriever — open-source RAG for everyone

github_url: https://github.com/weaviate/Verba
website_url: https://github.com/weaviate/Verba
docs_url: https://github.com/weaviate/Verba/blob/main/README.md

install_command: pip install goldenverba

category: RAG
tags: [rag, retrieval-augmented-generation, weaviate, vector-database, llm, chatbot, document-query, semantic-search]
pricing: free
is_open_source: true
license: BSD-3-Clause

problem_solved: |
  Building a production-ready RAG application requires integrating vector databases, embedding models, LLM providers, document chunkers, and retrieval strategies — a complex, time-consuming process. Verba eliminates this complexity by providing a turnkey, modular open-source RAG tool with a built-in web UI and API. It supports multiple LLM providers (OpenAI, Anthropic, Cohere, Ollama, HuggingFace, Groq), data types (PDF, DOCX, CSV, audio, web pages), chunking strategies (token, semantic, recursive), and hybrid search — all configurable through an intuitive interface.

use_cases:
  - Query large collections of PDFs, DOCX, and CSV files to extract insights and answers from complex documents
  - Build a customer support knowledge base that provides citation-backed answers from internal documentation
  - Cross-reference multiple data sources with a single AI assistant that understands organizational context
  - Ingest academic research papers and perform semantic searches with summarized answers and source attribution
  - Deploy a private document Q&A system locally for privacy-sensitive data that cannot use external cloud services
