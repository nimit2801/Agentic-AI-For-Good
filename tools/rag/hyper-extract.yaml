name: Hyper-Extract
description: An intelligent, LLM-powered knowledge extraction CLI that transforms unstructured text into structured knowledge using hypergraphs, knowledge graphs, and spatio-temporal extraction.
tagline: Transform unstructured text into structured knowledge with LLMs

github_url: https://github.com/yifanfeng97/hyper-extract
website_url: https://yifanfeng97.github.io/Hyper-Extract
docs_url: https://yifanfeng97.github.io/Hyper-Extract/latest

category: RAG
tags: [python, rag, knowledge-graph, llm, cli, information-extraction, hypergraph]
pricing: free
is_open_source: true
license: NOASSERTION

install_command: pip install hyperextract

problem_solved: |
  Unstructured text — PDFs, emails, web pages, chat logs — is hard for LLMs to work with
  effectively. Without structured context, retrieval is imprecise and reasoning lacks depth.
  Hyper-Extract uses LLMs to build hypergraphs and knowledge graphs from raw documents,
  transforming them into queryable, structured knowledge. The CLI makes this process
  repeatable and scriptable, with semantic search built in.

use_cases:
  - Extract entities, relationships, and facts from legal contracts to build a searchable knowledge base
  - Convert a corpus of technical documentation into hypergraph structures for semantic retrieval
  - Build spatio-temporal knowledge graphs from news articles to track events across time and location
  - Process PDF reports into structured data for downstream RAG pipelines and analytics
  - Encode unstructured customer feedback into knowledge graphs for trend analysis and root cause discovery
