name: Tavily
description: Tavily is a web search and research API for AI agents and RAG systems, with search, extract, crawl, map, and research capabilities plus official Python, JavaScript, and MCP integrations.
tagline: Power your AI with real-time web search

github_url: https://github.com/tavily-ai/tavily-python
website_url: https://www.tavily.com/
docs_url: https://docs.tavily.com/welcome
install_command: |
  pip install tavily-python
  npm i @tavily/core

category: RAG
tags: [web-search, retrieval, rag, agents, api, mcp, crawling, extraction]
pricing: freemium
is_open_source: false
license: Proprietary hosted service; SDKs and MCP server MIT

problem_solved: |
  Agents and RAG applications need current, reliable web data, but raw search engines and ad hoc
  scraping pipelines are brittle, noisy, and hard to maintain. Tavily provides a single API for
  live search, extraction, crawling, and research workflows built specifically for LLM-powered
  applications that need fresh sources and grounded outputs.

use_cases:
  - Ground AI agents with current web search results and cited source content
  - Generate live RAG context from web pages instead of relying only on stale training data
  - Extract readable page content from URLs for summarization, analysis, or downstream processing
  - Crawl or map websites to build structured knowledge inputs for research workflows
