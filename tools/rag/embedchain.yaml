name: Embedchain
description: >
  Embedchain is an open-source framework for building and deploying personalized LLM apps on your own
  data by handling ingestion, chunking, embeddings, vector storage, and retrieval for chat and Q&A.
tagline: Create AI apps on your own data in minutes.
github_url: https://github.com/embedchain/embedchain
website_url: https://embedchain.ai/
docs_url: https://docs.embedchain.ai/
install_command: pip install embedchain
category: RAG
tags:
  - rag
  - embeddings
  - vector-database
  - semantic-search
  - chatbots
  - python
  - open-source
pricing: free
is_open_source: true
license: Apache-2.0
problem_solved: >
  Building retrieval systems on top of unstructured files and web data normally requires developers to
  hand-roll ingestion pipelines, chunking strategies, embedding generation, vector database setup, and
  retrieval logic. Embedchain collapses that boilerplate into a configurable framework so teams can get
  custom chat, search, and question-answering systems running faster.
use_cases:
  - Build chatbots that answer questions from your own documents and websites
  - Add semantic search across PDFs, notes, and knowledge-base content
  - Create internal question-answering tools over private company data
  - Prototype custom RAG applications without wiring every pipeline step manually
