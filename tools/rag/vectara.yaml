name: Vectara
description: >
  Vectara is an enterprise agent platform that combines Retrieval-Augmented
  Generation (RAG) with built-in governance, hallucination detection, and
  real-time policy enforcement. It handles the full RAG pipeline — ingestion,
  indexing, retrieval, re-ranking, and grounded generation — as a managed
  platform deployable on-prem, in your VPC, or in the cloud.
tagline: The trusted GenAI platform for governed, grounded AI agents
problem_solved: >
  Building reliable, hallucination-free AI agents requires stitching together
  embeddings, retrieval, LLMs, re-ranking, and governance — a complex pipeline
  that is error-prone and hard to secure. Vectara solves this with a complete
  managed RAG platform featuring built-in hallucination detection (Factual
  Consistency Score), always-on governance, and real-time policy enforcement
  so teams can build trusted AI applications without maintaining brittle
  infrastructure.
use_cases:
  - Enterprise semantic search and grounded Q&A over internal documents and knowledge bases
  - Customer-facing AI chatbots and support agents that deliver accurate, cited answers
  - Document generation and analysis with governance controls for compliance use cases
  - Guardian agents that monitor AI outputs for hallucinations before they reach users
github_url: https://github.com/vectara
website_url: https://www.vectara.com/
docs_url: https://docs.vectara.com/
install_command: |
  pip install vectara
  npm install @vectara/react-chatbot
category: RAG
tags:
