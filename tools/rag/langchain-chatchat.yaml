name: Langchain-Chatchat
description: An open-source, offline-capable RAG and LLM application platform built on LangChain and ChatGLM that supports local model deployment, knowledge base management, and multi-turn dialogue.
tagline: Offline RAG and LLM platform with local model support and knowledge bases

github_url: https://github.com/chatchat-space/Langchain-Chatchat
website_url: https://www.chatchat.space
docs_url: https://github.com/chatchat-space/Langchain-Chatchat

category: RAG
tags: [python, rag, langchain, llm, knowledge-base, local, offline, chatglm]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Building a production RAG application that runs entirely offline requires integrating
  LLM inference, embedding models, vector storage, document parsing, and a chat
  interface — all working together reliably. Langchain-Chatchat provides a complete,
  self-contained platform that supports local LLM deployment (ChatGLM, Llama, Qwen,
  etc.), automatic document ingestion and chunking, vector-based knowledge retrieval,
  and a web-based chat UI — all without any external API calls or cloud dependencies.

use_cases:
  - Deploy a fully offline enterprise knowledge base Q&A system with local LLMs and private documents
  - Build a document retrieval chatbot that answers questions from uploaded PDFs, Word docs, and markdown
  - Create a multi-tenant RAG platform where each team has its own isolated knowledge base
  - Integrate with local embedding models and vector stores for complete data sovereignty
  - Set up a conversational search interface over internal technical documentation and wikis
