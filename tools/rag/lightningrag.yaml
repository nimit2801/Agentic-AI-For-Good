name: LightningRAG
description: |-
  LightningRAG is a high-performance, full-stack RAG starter built with Go (Gin) and Vue 3. It provides knowledge base management with document ingestion, parsing, chunking, and vector retrieval, plus pluggable LLM, embedding, reranker, and vector store integrations — all with a visual agent canvas for orchestrating retrieval workflows.
tagline: Full-stack RAG platform with Go backend and visual agent orchestration

github_url: https://github.com/LightningRAG/LightningRAG
website_url: https://lightningrag.com

category: RAG
tags: [rag, knowledge-base, vector-search, full-stack, go, vue, document-processing]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |-
  Building production RAG applications requires integrating document ingestion, parsing, chunking, embedding, vector storage, and LLM retrieval — typically across multiple Python services that are slow to start and resource-intensive. LightningRAG solves this by providing a full-stack RAG platform in Go and Vue that offers higher performance, compiled deployment, smaller artifacts, and stronger concurrency than equivalent Python stacks — with built-in knowledge base management, pluggable LLM providers, and a visual agent canvas for orchestrating retrieval workflows.

use_cases:
  - "Create knowledge bases by ingesting documents with automatic parsing, chunking, and vector embedding pipelines"
  - "Build RAG-powered chat applications with pluggable LLM providers, embedding models, and vector stores"
  - "Orchestrate multi-step retrieval workflows using a visual agent canvas with drag-and-drop node composition"
  - "Deploy RAG applications as compiled Go binaries with minimal dependencies and fast cold-start times"
  - "Connect webhook channels (Feishu, Slack) to RAG knowledge bases for automated question-answering workflows"
