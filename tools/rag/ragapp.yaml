name: RAGapp
description: A self-hosted RAG (Retrieval-Augmented Generation) platform with a web UI for document ingestion, chunking, embedding, and conversational Q&A over your data with customizable LLM and embedding model support.
tagline: Self-hosted RAG platform with web UI and customizable models

github_url: https://github.com/ragapp/ragapp
website_url: https://ragapp.io
docs_url: https://github.com/ragapp/ragapp

category: RAG
tags: [python, rag, document-qa, knowledge-management, embeddings, self-hosted, retrieval]
pricing: free
is_open_source: true
license: MIT

problem_solved: |
  Implementing RAG for internal document Q&A requires orchestrating document parsing,
  chunking, embedding generation, vector storage, and LLM integration with a frontend
  — a significant engineering effort that many teams repeat from scratch. RAGapp
  provides a turnkey, self-hosted RAG platform with a web UI where users upload
  documents, configure chunking strategies, select embedding and LLM models, and
  start asking questions over their data immediately.

use_cases:
  - Deploy an internal knowledge base Q&A system where employees can ask questions about company documents
  - Create a self-hosted research assistant that answers questions from uploaded PDFs and research papers
  - Build a customer support knowledge base that retrieves answers from product documentation
  - Set up a document review system where users upload contracts and query key clauses
  - Run a fully private RAG system behind a corporate firewall with no data leaving the network
