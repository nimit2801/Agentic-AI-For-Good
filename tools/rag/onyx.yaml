name: Onyx
description: An open-source AI platform that serves as your team's entry point to Generative AI, offering enterprise search, custom AI agents, and 50+ connectors across internal knowledge sources.
tagline: Enterprise AI search and agents over all your internal knowledge

github_url: https://github.com/onyx-dot-app/onyx
website_url: https://onyx.app
docs_url: https://docs.onyx.app

install_command: curl -fsSL https://onyx.app/install_onyx.sh | bash

category: RAG
tags: [python, ai, rag, enterprise-search, knowledge-management, chatbot, agents, open-source, self-hosted, connectors]
pricing: freemium
is_open_source: true
license: MIT

problem_solved: |
  Organizations generate vast amounts of knowledge across wikis, chats, code repositories, and SaaS tools,
  but employees waste hours searching for information and waiting for expert responses. Onyx unifies all
  internal knowledge into a single AI interface with grounded answers, custom agents, secure access controls,
  and hybrid search to deliver reliable, actionable insights.

use_cases:
  - Enterprise search across Confluence, Slack, Notion, and Google Drive for instant grounded answers
  - Sales enablement to research prospects and competitors before customer calls with unified data
  - Customer support automation to resolve tickets faster using a grounded internal knowledge base
  - Engineering productivity to generate code, explain internal APIs, and search technical documentation
