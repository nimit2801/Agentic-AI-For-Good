name: LlamaIndex
description: A data framework for building LLM applications with structured data ingestion, indexing, and retrieval. Specializes in connecting LLMs to external knowledge sources.
tagline: Turn your data into a queryable knowledge base for any LLM

github_url: https://github.com/run-llama/llama_index
website_url: https://www.llamaindex.ai
docs_url: https://docs.llamaindex.ai

install_command: pip install llama-index

category: RAG
tags: [python, typescript, rag, knowledge-base, data-ingestion, embeddings, agents]
pricing: free
is_open_source: true
license: MIT

problem_solved: |
  Connecting LLMs to your own data — PDFs, databases, APIs, Notion pages — requires writing
  custom parsers, chunking strategies, embedding pipelines, and retrieval logic. LlamaIndex
  abstracts all of this with 160+ data connectors, smart chunking, query engines, and agent
  orchestration. It's the fastest way to go from "I have documents" to "I have a smart Q&A system."

use_cases:
  - Build a document Q&A system over PDFs, Word docs, and spreadsheets in under 10 lines of code
  - Create a structured analytics agent that queries SQL databases using natural language
  - Build a multi-document summarization pipeline that synthesizes insights across 1000+ files
  - Connect your LLM to live APIs (Notion, Slack, GitHub) with pre-built data loaders
  - Implement a conversational interface over a large knowledge base with conversation memory
