name: Giskard
description: >
  Giskard is an open-source Python library for testing and evaluating AI applications, including LLM agents and RAG systems.
  It automatically detects performance, bias, and security issues using adversarial testing and red teaming techniques.
  The library helps developers ensure quality and reliability in LLM-based systems before they reach production.
tagline: Open-source evaluation and testing library for LLM agents

website_url: https://www.giskard.ai
github_url: https://github.com/Giskard-AI/giskard
docs_url: https://docs.giskard.ai

install_command: pip install giskard

category: Monitoring
tags:
  - llm-evaluation
  - red-teaming
  - ai-testing
  - security
  - rag-evaluation
  - bias-detection
  - monitoring
  - python

pricing: freemium
is_open_source: true
license: Apache-2.0

problem_solved: |
  LLM agents and AI applications are vulnerable to security attacks, hallucinations, bias, and quality failures that manual testing often misses, risking data integrity and reputation.
  Giskard provides automated evaluation and red teaming to detect these issues during development before they reach production.

use_cases:
  - Red teaming LLM agents for prompt injection and security vulnerabilities
  - Evaluating RAG applications for hallucinations and factual accuracy
  - Detecting bias and inappropriate content in AI-generated outputs
