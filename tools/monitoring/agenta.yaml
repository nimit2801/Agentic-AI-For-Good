name: Agenta
description: The open-source LLMOps platform that combines a prompt playground, prompt management, LLM evaluation, and LLM observability in one place. Helps engineering and product teams build reliable, production-grade LLM applications faster.
tagline: All-in-one open-source LLMOps for prompt management, evaluation, and observability

github_url: https://github.com/Agenta-AI/agenta
website_url: https://agenta.ai
docs_url: https://docs.agenta.ai

install_command: pip install agenta

category: Monitoring
tags: [python, llmops, observability, evaluation, prompt-management, tracing]
pricing: freemium
is_open_source: true
license: MIT

problem_solved: |
  Teams shipping LLM apps face fragmented workflows across prompt engineering, evaluation, and
  production monitoring. Prompts break silently in production, evaluation is ad-hoc, and tracing
  complex agentic workflows is painful. Agenta unifies prompt collaboration, systematic evaluation
  (human + automated), and OpenTelemetry-native observability so teams can iterate confidently,
  catch regressions early, and debug production issues faster.

use_cases:
  - Version, branch, and A/B test prompts across 50+ models with domain experts
  - Run pre-built or custom evaluators via UI or SDK to catch regressions before deploying
  - Trace complex agentic workflows and monitor cost, latency, and failures in production
  - Promote prompt changes safely across environments with regression testing
