name: UpTrain
description: >
  UpTrain is an open-source unified platform to evaluate and improve Generative
  AI applications. It provides 20+ preconfigured evaluations covering language,
  code, and embedding use cases, performs root cause analysis on failures, and
  offers actionable insights via a self-hosted local dashboard.
problem_solved: >
  Evaluating and improving LLM applications is challenging because developers
  lack systematic ways to measure factual accuracy, response quality, retrieval
  relevance, and tonality at scale; UpTrain provides an open-source evaluation
  platform with 20+ pre-built checks, root cause analysis, and local dashboards
  to continuously improve GenAI apps.
use_cases:
  - "Evaluate RAG pipelines for factual accuracy, context relevance, and response completeness"
  - "Detect hallucinations and jailbreaks in production LLM applications"
  - "Run root cause analysis on low-scoring responses to improve prompts and retrieval"
github_url: https://github.com/uptrain-ai/uptrain
website_url: https://uptrain.ai
docs_url: https://docs.uptrain.ai/
install_command: pip install uptrain
tagline: "Open-source platform to evaluate and improve Generative AI applications"
tags:
  - evaluation
  - monitoring
  - llm
  - rag
  - hallucination-detection
  - root-cause-analysis
  - observability
pricing: freemium
is_open_source: true
license: Apache-2.0
