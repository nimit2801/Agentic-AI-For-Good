name: Apache SkyWalking
tagline: Application performance monitoring and observability for distributed systems
description: |-
  Apache SkyWalking is an open-source APM (application performance monitoring) system for microservices, cloud-native, and container-based architectures. It provides service topology mapping, service mesh observability, distributed tracing, metrics aggregation, logging integration, and alerting — all through a single platform with built-in UI and dashboarding.
problem_solved: |-
  Monitoring distributed systems requires stitching together separate tools for metrics, traces, and logs — each with its own instrumentation, storage, and UI. SkyWalking provides unified observability with automatic instrumentation agents for Java, Python, Go, Node.js, and more, plus native service mesh observability (Istio, Envoy), so teams get service topology maps, traces, metrics, and alerts from a single platform.
github_url: https://github.com/apache/skywalking
website_url: https://skywalking.apache.org
docs_url: https://skywalking.apache.org/docs
category: Monitoring
tags:
  - apm
  - observability
  - distributed-tracing
  - monitoring
  - service-mesh
pricing: free
is_open_source: true
license: Apache-2.0
use_cases:
  - "Monitoring service health and performance with automatic topology discovery and dependency maps"
  - "Tracing requests across microservices and service mesh (Istio, Envoy) for latency diagnosis"
  - "Setting up alerts on service metrics like response time, error rate, and throughput"
  - "Collecting and analyzing infrastructure metrics, logs, and traces in a unified dashboard"
  - "Instrumenting services with language agents for Java, Python, Go, Node.js, and Lua"
