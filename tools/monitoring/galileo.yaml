name: Galileo
description: "Galileo is an AI observability and evaluation platform for GenAI applications and agents at enterprise scale. It provides low-latency evaluators, production monitoring, experiment management, and guardrails to help teams build reliable and safe AI systems."
tagline: "GenAI evaluation, observability, and guardrails at enterprise scale"

website_url: https://galileo.ai
docs_url: https://docs.galileo.ai

category: Monitoring
tags: [llm-observability, evaluation, monitoring, genai, agents, guardrails]
pricing: freemium
is_open_source: false

problem_solved: |
  AI teams building GenAI applications face a blind spot: once a model is in production,
  understanding how it's performing — latency, accuracy, cost, safety — requires custom
  instrumentation and dashboards. Galileo provides a complete observability and evaluation
  platform with low-latency evaluators (Luna models), real-time production monitoring,
  experiment comparison, and AI guardrails. Teams can log traces, run evaluations, detect
  drift, and set up automated quality gates without building monitoring infrastructure
  from scratch. Galileo integrates via SDKs, OpenTelemetry, and API, making it easy to
  add observability to any GenAI stack.

use_cases:
  - Monitor production GenAI applications with real-time dashboards for latency, token usage, cost, and response quality metrics
  - Run A/B experiments comparing prompts, models, and retrieval parameters to find the optimal configuration for your use case
  - Detect and alert on data drift, hallucination patterns, and accuracy degradation in production LLM pipelines
  - Deploy AI guardrails that automatically enforce content policies, safety rules, and quality thresholds on live inference traffic
