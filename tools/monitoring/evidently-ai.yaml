name: Evidently AI
description: Open-source framework and platform for evaluating, testing, and monitoring ML and LLM systems, including drift, data quality, and RAG performance.
tagline: Evaluate, test, and monitor ML and LLM-powered systems

github_url: https://github.com/evidentlyai/evidently
website_url: https://www.evidentlyai.com/
docs_url: https://docs.evidentlyai.com/introduction
install_command: pip install evidently

category: Monitoring
tags: [ml-observability, llm-evaluation, rag-evaluation, data-drift, data-quality, testing]
pricing: freemium
is_open_source: true
license: Apache-2.0

problem_solved: |
  Teams need repeatable ways to detect regressions in model behavior, data quality, and LLM output,
  but those checks are often spread across notebooks, bespoke scripts, and one-off dashboards.
  Evidently AI packages evaluation, testing, drift detection, and reporting into a reusable workflow
  so teams can compare runs consistently and catch failures before or after deployment.

use_cases:
  - Monitor production data drift and data quality for ML pipelines
  - Run regression tests for LLM and RAG applications in CI workflows
  - Compare model versions, prompts, or retrieval settings with shared evaluation reports
  - Track evaluation metrics over time to spot quality degradation after deployment
