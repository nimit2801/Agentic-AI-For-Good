use_cases:
  - "Centralizing application logs from Kubernetes clusters for real-time querying and alerting"
  - "Reducing log storage costs by using label-based indexing instead of full-text search"
  - "Correlating logs with metrics and traces in Grafana for unified observability dashboards"
  - "Querying log streams with LogQL for debugging production incidents and application errors"
  - "Archiving long-term log data in object storage with configurable retention and compaction"
