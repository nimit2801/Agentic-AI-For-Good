name: Grafana Loki
tagline: Log aggregation system designed for cost-effective log storage and querying
description: |-
  Grafana Loki is a horizontally scalable, highly available log aggregation system inspired by Prometheus. It indexes log streams rather than individual log entries, making it dramatically cheaper to store and query logs at scale than traditional log management systems like Elasticsearch, while integrating seamlessly with Grafana for visualization and alerting.
problem_solved: |-
  Traditional log management systems require full-text indexing of every log line, which is expensive, slow to ingest, and complex to operate at scale. Loki takes a different approach — it only indexes metadata labels and stores log content in compressed chunks, making log storage 10-100x cheaper. Combined with LogQL for querying and Grafana dashboards, teams get powerful log observability without the operational cost of Elasticsearch.
