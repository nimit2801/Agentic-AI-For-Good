name: Pydantic Logfire
description: OpenTelemetry-native observability platform for LLMs, AI agents, and application backends with unified traces across model calls, APIs, databases, and runtime behavior.
tagline: AI observability for LLMs, apps, and agents

github_url: https://github.com/pydantic/logfire
website_url: https://pydantic.dev/logfire
docs_url: https://pydantic.dev/docs/logfire/get-started
install_command: pip install logfire

category: Monitoring
tags: [monitoring, observability, ai-observability, llm, agents, opentelemetry, tracing, logging]
pricing: freemium
is_open_source: true
license: MIT

problem_solved: |
  Production AI systems generate traces across LLM calls, agent steps, APIs, database queries, and
  infrastructure events, but those signals are often scattered across separate monitoring tools.
  Pydantic Logfire brings those telemetry streams together so teams can debug failures, track cost
  and latency, and understand how end-to-end AI workflows behave in production.

use_cases:
  - Trace LLM calls and agent workflows in production AI applications
  - Correlate backend, database, and model telemetry in a single observability view
  - Track latency, token usage, and operational cost across deployed AI systems
  - Instrument Python and other OpenTelemetry-compatible services for AI debugging
