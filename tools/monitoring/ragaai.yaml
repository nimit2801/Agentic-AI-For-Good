name: RagaAI
description: |-
  RagaAI Catalyst is an open-source Python SDK for agent AI observability, monitoring, and evaluation. It provides tracing for agents, LLMs, and tools, multi-agent debugging, a self-hosted dashboard with timeline and execution graph views, and built-in evaluation metrics for LLM application quality including RAG, agentic, and guardrail assessments.
tagline: Open-source observability, monitoring and evaluation for agent AI

github_url: https://github.com/raga-ai-hub/RagaAI-Catalyst
website_url: https://docs.raga.ai

install_command: pip install ragaai-catalyst

category: Monitoring
tags: [monitoring, observability, llm, agents, evaluation, tracing, debugging]
pricing: freemium
is_open_source: true
license: Apache-2.0

problem_solved: |-
  Agentic AI applications are notoriously hard to debug and evaluate — multi-step agent loops, tool calls, and LLM interactions produce complex execution graphs that are invisible to traditional monitoring tools. RagaAI Catalyst solves this by providing comprehensive tracing of agents, LLMs, and tools in a unified dashboard with timeline and execution graph views, plus built-in evaluation metrics for RAG quality, agent performance, and guardrail effectiveness — making it possible to observe, debug, and measure AI application quality in production.

use_cases:
  - "Trace and debug multi-agent systems with execution graph views showing agent decisions, tool calls, and LLM interactions"
  - "Monitor LLM application performance in production with latency, token usage, and error rate dashboards"
  - "Evaluate RAG pipeline quality with metrics for retrieval relevance, context utilization, and response faithfulness"
  - "Set up guardrails and monitor their effectiveness with built-in safety evaluation metrics"
  - "Debug agentic workflows by replaying traces with detailed timeline views of each step in the execution"
