name: Comet
description: >
  An ML experiment tracking and monitoring platform that helps data science
  and machine learning teams track, compare, explain, and optimize models
  across the complete ML lifecycle from managing experiments to monitoring
  models in production.

tagline: Experiment tracking and model monitoring for ML teams

github_url: https://github.com/comet-ml
website_url: https://www.comet.com
docs_url: https://www.comet.com/docs/v2/
install_command: pip install comet-ml

category: Monitoring
tags:
  - experiment-tracking
  - mlops
  - model-monitoring
  - hyperparameter-tuning
  - dataset-versioning
  - model-registry
  - reproducibility

pricing: freemium
is_open_source: false
license: MIT

problem_solved: |
  Machine learning teams struggle to keep track of hundreds of experiments,
  hyperparameters, datasets, and model versions, leading to lost work,
  poor reproducibility, and slow iteration. Comet solves this by automatically
  logging experiments, metrics, parameters, and artifacts in a centralized
  platform, enabling reproducibility, collaboration, and faster model development.

use_cases:
  - Track and compare deep learning training runs across teams
  - Manage dataset versions and model lineage for reproducibility
  - Optimize hyperparameters with built-in search and visualization
  - Monitor production models for drift and performance degradation
