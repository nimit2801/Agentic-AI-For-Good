name: LangWatch
description: Platform for LLM evaluations, AI agent testing, and production observability with tracing, simulations, datasets, and prompt tooling for development and runtime monitoring.
tagline: Evaluate, test, and observe AI agents and LLM apps.

github_url: https://github.com/langwatch/langwatch
website_url: https://langwatch.ai
docs_url: https://langwatch.ai/docs
install_command: pip install langwatch

category: Monitoring
tags: [python, monitoring, observability, tracing, llm-evaluation, agent-testing, prompt-management, self-hosted]
pricing: freemium
is_open_source: false
license: BSL-1.1

problem_solved: |
  Teams often need separate tools for prompt evaluation, agent simulations, production tracing, and cost monitoring,
  which makes it hard to catch regressions before release or debug failures after deployment. LangWatch combines evals,
  tracing, datasets, and runtime observability so teams can test and monitor AI systems in one workflow.

use_cases:
  - Trace and debug LLM app or agent behavior in production environments
  - Run agent simulations before release to catch regressions earlier
  - Evaluate prompts and models on datasets inside CI or review workflows
  - Track token usage, performance, and costs over time across deployments
