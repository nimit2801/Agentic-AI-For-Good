name: Arize Phoenix
description: "Arize Phoenix is an AI observability and evaluation platform for tracing, debugging, and improving LLM applications and agents. It includes OpenTelemetry-based instrumentation, evals, datasets, experiments, prompt management, playground workflows, and annotation support."
tagline: "LLM tracing, evaluation, and experimentation platform"
github_url: https://github.com/Arize-ai/phoenix
website_url: https://phoenix.arize.com
docs_url: https://arize.com/docs/phoenix
install_command: "pip install arize-phoenix"
category: Monitoring
tags:
  - llm-observability
  - evaluation
  - tracing
  - opentelemetry
  - agents
  - rag
  - prompt-management
pricing: freemium
is_open_source: true
license: Elastic License 2.0
problem_solved: "LLM and agent systems fail in ways that are hard to reproduce from logs alone. Phoenix makes prompts, spans, retrieval context, responses, feedback, and evaluation results visible so teams can debug quality issues, compare experiments, and improve production AI behavior."
use_cases:
  - "Trace and debug LLM agent workflows with OpenTelemetry instrumentation"
  - "Evaluate RAG retrieval quality, hallucination risk, and response quality"
  - "Compare prompts, models, parameters, datasets, and experiment results"
  - "Collect human feedback and annotations for production AI outputs"
