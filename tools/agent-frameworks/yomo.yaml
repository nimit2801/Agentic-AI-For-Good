name: YoMo
description: Open-source LLM Function Calling Framework for building scalable and ultra-fast AI agents with geo-distributed edge AI infrastructure. Provides a Rust-powered streaming runtime that connects AI agents to real-time data sources with sub-millisecond latency across edge locations.
tagline: Serverless AI agent framework with edge infrastructure

github_url: https://github.com/yomorun/yomo
website_url: https://yomo.run
docs_url: https://docs.yomo.run

install_command: curl -fsSL https://get.yomo.run | sh

category: Agents
tags: [agents, serverless, edge, streaming, function-calling, llm, rust, real-time]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Building real-time AI agents that respond to streaming data — sensor feeds, market events,
  user interactions — typically requires connecting LLM function calling to complex event
  pipelines with high latency. YoMo solves this by providing a serverless streaming runtime
  purpose-built for AI agents: developers write simple function-calling patterns that the
  framework connects to geo-distributed edge infrastructure for sub-millisecond data access.
  Agents can react to real-world events, process streaming data, and trigger actions across
  distributed locations without managing Kafka, Flink, or other stream-processing infrastructure.

use_cases:
  - Build real-time AI agents that react to live data streams (market prices, IoT sensors, user events)
  - Deploy geo-distributed AI inference at edge locations for sub-millisecond response times
  - Create streaming LLM function-calling pipelines that process and respond to continuous data
  - Connect AI agents to real-time data sources without managing Kafka or stream-processing infrastructure
  - Build location-aware AI applications that process data and make decisions at the network edge
