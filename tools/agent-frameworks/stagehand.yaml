name: Stagehand
tagline: "The AI browser automation framework — resilient, readable, and production-ready."
description: "Stagehand is a browser automation framework that uses AI to control web browsers with natural language and code. By combining the power of AI with the precision of code, Stagehand makes web automation flexible, maintainable, and actually reliable through four primitives: act(), extract(), observe(), and agent()."
problem_solved: "Traditional browser automation frameworks like Playwright and Selenium force developers to write brittle selectors that break with every UI change, while fully autonomous AI agents are unpredictable and impossible to debug. Stagehand bridges this gap by letting developers choose when to use deterministic code versus natural language instructions, providing self-healing automation that survives page redesigns."
use_cases:
  - Web scraping and structured data extraction from dynamic websites with Zod schema validation
  - Automated browser testing with self-healing natural language selectors that survive page redesigns
  - AI-driven browser agent workflows for multi-step tasks like form filling, login flows, and end-to-end web interactions
github_url: https://github.com/browserbase/stagehand
website_url: https://stagehand.dev
docs_url: https://docs.stagehand.dev/
install_command: npm install @browserbasehq/stagehand
