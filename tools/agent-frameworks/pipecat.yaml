name: Pipecat
description: An open-source Python framework for building real-time voice and multimodal conversational agents. Orchestrate audio, video, AI services, and transport layers with composable pipelines, pluggable service integrations, and ultra-low latency interaction over WebRTC or WebSocket connections.
tagline: Open-source framework for voice and multimodal conversational AI

github_url: https://github.com/pipecat-ai/pipecat
website_url: https://pipecat.ai
docs_url: https://docs.pipecat.ai/
install_command: pip install pipecat-ai

category: Agents
tags: [voice-ai, multimodal, realtime, conversational-ai, streaming, tts, stt, pipeline, webrtc]
pricing: freemium
is_open_source: true
license: BSD-2-Clause

problem_solved: |
  Building real-time voice and multimodal AI agents requires orchestrating speech recognition, language
  models, text-to-speech, and transport layers with ultra-low latency streaming across WebRTC or WebSocket
  connections, which is complex to implement from scratch. Pipecat provides composable pipelines, 40+
  service integrations, and transport abstraction so developers can wire up STT, LLM, TTS, and image
  generation services into working voice and multimodal agents without building the streaming infrastructure
  themselves.

use_cases:
  - Build voice assistants with natural, streaming conversations and interruption handling
  - Create AI companions such as coaches, meeting assistants, and interactive characters
  - Develop customer support and intake bots with guided conversational flows and function calling