name: Botpress
description: The open-source platform for building and deploying GPT/LLM-powered chatbots and AI agents with a visual flow builder, multi-channel integrations, and enterprise-grade scalability.
tagline: Build and deploy LLM-powered chatbots and AI agents visually

github_url: https://github.com/botpress/botpress
website_url: https://botpress.com
docs_url: https://botpress.com/docs

install_command: |
  npm install @botpress/sdk
  npm install -g @botpress/cli

category: Agents
tags: [chatbot, agents, llm, visual-builder, open-source, javascript, typescript]
pricing: freemium
is_open_source: true
license: MIT

problem_solved: |
  Building conversational AI agents from scratch requires complex NLP pipelines, state management,
  and channel integrations. Botpress provides a visual flow builder and open-source SDK that lets
  developers create, deploy, and scale LLM-powered chatbots and agents across web, messaging apps,
  and voice channels without managing underlying infrastructure complexity.

use_cases:
  - Build customer support chatbots that integrate with CRM and ticketing systems
  - Create internal knowledge-base assistants that answer employee questions using company documents
  - Deploy conversational AI across WhatsApp, Slack, Telegram, and web chat simultaneously
  - Develop AI agents with visual flow logic, handoff to humans, and custom tool integrations