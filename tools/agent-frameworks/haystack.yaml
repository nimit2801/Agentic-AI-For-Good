description: Haystack is an open-source AI orchestration framework for building production-ready LLM applications with modular pipelines and agent workflows. It provides explicit control over retrieval, routing, memory, and generation, enabling scalable agents, RAG, search, and conversational systems with full transparency and debuggability.
problem_solved: Building production-ready AI applications requires orchestration of complex pipelines across retrieval, generation, memory, and tool use. Haystack solves this by providing modular, composable building blocks that give developers full visibility and control over every step of their LLM-powered systems, from prototype to enterprise scale.
use_cases:
  - Build advanced RAG pipelines with hybrid retrieval, self-correction loops, and multi-strategy generation
  - Design production-ready AI agents with standardized tool calling and scalable context engineering
  - Architect multimodal AI applications around image processing and audio transcription
  - Create conversational AI chatbots with standardized generator interfaces
  - Develop content generation engines with flexible Jinja2 template-based prompt flows
