name: CrewAI
description: A framework for orchestrating role-playing autonomous AI agents that collaborate as a crew to complete complex, multi-step tasks.
tagline: Build collaborative AI agent teams that get real work done

github_url: https://github.com/crewAIInc/crewAI
website_url: https://crewai.com
docs_url: https://docs.crewai.com

category: Agents
tags: [python, agents, multi-agent, role-playing, orchestration, autonomous]
pricing: freemium
is_open_source: true
license: MIT

problem_solved: |
  Single LLM agents hit a ceiling on complex tasks — they lose context, struggle with parallel
  work, and can't specialize. CrewAI models agents as specialists in a crew: a researcher, a
  writer, a fact-checker — each with their own role, goal, tools, and memory. Agents collaborate
  sequentially or in parallel, with one agent handing off to the next. The result is more reliable
  output on multi-step, multi-domain tasks than any single agent can produce.

use_cases:
  - Build a content pipeline where one agent researches, another writes, and a third edits — fully automated
  - Create a competitive intelligence crew that monitors competitors, extracts insights, and writes weekly reports
  - Automate a code review workflow with agents specializing in security, performance, and documentation
  - Build a customer support team that triages, researches, and responds to tickets autonomously
  - Orchestrate a data analysis pipeline where agents collect, clean, analyze, and visualize data in sequence
