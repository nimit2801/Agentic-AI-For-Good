name: Mem0
description: "Universal memory layer for AI agents and applications that provides persistent, self-improving memory infrastructure. Mem0 adds, learns, and retrieves context across conversations to personalize AI experiences, reduce redundant context, and lower token costs while keeping the right information available."
tagline: "The memory layer for personalized AI"
github_url: https://github.com/mem0ai/mem0
website_url: https://mem0.ai
docs_url: https://docs.mem0.ai
install_command: "pip install mem0ai"
category: Agents
tags:
