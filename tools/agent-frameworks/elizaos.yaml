name: ElizaOS
description: An open-source framework for building and deploying autonomous AI agents with multi-agent orchestration, plugin ecosystem, and a rich web dashboard for production management.
tagline: Open-source framework for autonomous AI agents
github_url: https://github.com/elizaOS/eliza
website_url: https://elizaos.ai
docs_url: https://docs.elizaos.ai

category: Agents
tags: [typescript, agents, multi-agent, autonomous, framework, plugins, orchestration, chatbots]
pricing: free
is_open_source: true
license: MIT

install_command: bun add -g elizaos

problem_solved: |
  Building production-ready autonomous AI agents from scratch requires handling multi-agent
  orchestration, plugin management, model-agnostic integration, state persistence, and
  deployment — a massive engineering lift. ElizaOS provides a modular framework with a
  powerful CLI, web dashboard, and plugin registry that lets developers scaffold, develop,
  and deploy agents in minutes instead of months. Agents connect to Discord, Telegram,
  Slack, and other platforms out of the box, with built-in RAG, memory, and tool-calling.

use_cases:
  - Deploy autonomous customer support agents that triage, research, and resolve tickets across Slack and Discord
  - Build multi-agent content pipelines where specialized agents research, write, edit, and publish collaboratively
  - Create game NPCs with persistent memory, contextual awareness, and real-time decision-making
  - Automate business workflows with agents that monitor data sources, generate reports, and trigger actions
  - Develop personal AI companions with long-term memory, multi-platform presence, and extensible skill sets
