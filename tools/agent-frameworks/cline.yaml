name: Cline
description: "Autonomous coding agent that lives in your IDE (VS Code, JetBrains, CLI). Creates and edits files, executes commands, uses the browser, and more, with your permission at every step. Supports multiple LLM providers, MCP extensibility, and collaborative Plan and Act workflows."
tagline: "Autonomous coding agent right in your IDE"
github_url: https://github.com/cline/cline
website_url: https://cline.bot
docs_url: https://docs.cline.bot
install_command: "code --install-extension cline.cline"
category: Agents
tags:
  - coding-agent
  - vscode-extension
  - autonomous-coding
  - ai-assistant
  - developer-tools
  - llm-agent
  - mcp
  - cli
pricing: free
is_open_source: true
license: Apache-2.0
problem_solved: "Developers spend excessive time on repetitive coding tasks like file creation, code refactoring, running commands, and debugging. Cline automates these workflows inside the IDE with a human-in-the-loop approach, letting AI handle mundane implementation while the developer approves each action."
use_cases:
  - "Understand and navigate unfamiliar codebases by asking Cline questions about files, dependencies, and behavior"
  - "Refactor large codebases with coordinated multi-file changes while keeping imports, types, and behavior consistent"
  - "Automate recurring development tasks via the CLI in scripts, cron jobs, and CI pipelines"
