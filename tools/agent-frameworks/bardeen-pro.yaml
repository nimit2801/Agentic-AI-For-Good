name: Bardeen Pro
description: >-
  Bardeen is an AI-powered automation platform that connects your apps and automates
  repetitive workflows without code. Bardeen Pro is the premium tier offering advanced
  automation features, AI-powered workflow building, premium integrations, team
  collaboration, and higher usage limits. It enables knowledge workers and developers
  to build automations that combine web scraping, data enrichment, spreadsheet
  operations, and AI actions across 100+ apps.
tagline: No-code AI automation across your apps

