name: Aider
description: "Aider is an AI pair programming tool that runs in your terminal. It connects to LLMs like Claude, DeepSeek, and OpenAI to edit code in your local git repository. Aider automatically commits changes with sensible messages, builds a map of your entire codebase for context-aware edits, and supports 100+ programming languages."
tagline: "AI pair programming in your terminal"
github_url: https://github.com/Aider-AI/aider
website_url: https://aider.chat
docs_url: https://aider.chat/docs/
install_command: "pip install aider-install"
category: Agents
tags:
  - ai-coding
  - pair-programming
  - git-integration
  - code-generation
  - terminal
  - llm-client
  - developer-tools
  - open-source
pricing: free
is_open_source: true
license: Apache-2.0
problem_solved: "Developers waste significant time on boilerplate code, repetitive edits, and context-switching between IDE and chat interfaces. Aider eliminates this friction by letting AI directly edit your local git-tracked files with full codebase awareness, automatic git commits, and undo support."
use_cases:
  - "Pair programming with an LLM to implement new features or refactor existing code across multi-file projects"
  - "Rapidly prototyping new projects by describing requirements in natural language and having Aider scaffold the codebase"
  - "Fixing bugs by describing the issue and letting Aider locate relevant code, apply fixes, and run linters and tests automatically"
