name: Agency Swarm
description: >
  Framework for building multi-agent applications that leverages and extends the
  OpenAI Agents SDK, providing specialized features for creating, orchestrating,
  and managing collaborative swarms of AI agents with customizable roles and
  type-safe tools.
problem_solved: >
  Building and orchestrating multi-agent systems is complex and error-prone;
  Agency Swarm simplifies this by providing a structured framework with
  customizable agent roles, explicit directional communication flows, and
  type-safe Pydantic tools built on the OpenAI Agents SDK, enabling reliable
  production-ready multi-agent applications.
use_cases:
  - "Build collaborative AI agencies with defined roles like CEO, Developer, and Assistant"
  - "Create production-ready multi-agent workflows with explicit communication flows"
  - "Develop type-safe agent tools using Pydantic for automatic argument validation"
github_url: https://github.com/VRSEN/agency-swarm
website_url: https://agency-swarm.ai
docs_url: https://agency-swarm.ai
install_command: pip install -U agency-swarm
tagline: "Reliable multi-agent orchestration framework built on OpenAI Agents SDK"
tags:
  - multi-agent
  - orchestration
  - openai
  - agents
  - framework
  - pydantic
  - production-ready
pricing: free
is_open_source: true
license: MIT
