name: Zep
tagline: Memory and context engineering platform for AI agents
description: "Zep is a context engineering platform that assembles personalized context from chat history, business data, and user behavior using temporal knowledge graphs. It combines agent memory, Graph RAG, and context assembly to deliver relevant, up-to-date context that reduces hallucinations and improves accuracy in AI agent applications."
problem_solved: "AI agents lack persistent memory and contextual awareness across sessions, leading to hallucinations, repetitive interactions, and inability to personalize responses based on user preferences, evolving facts, and business data."
use_cases:
  - "Persistent agent memory across multi-turn conversations and sessions"
  - "Personalized AI assistants that recall user preferences and traits over time"
  - "Graph RAG for retrieving relevant business data and real-time context"
  - "Context assembly for reducing hallucinations in production AI agents"
github_url: https://github.com/getzep/zep
website_url: https://www.getzep.com
docs_url: https://help.getzep.com
install_command: pip install zep-cloud
category: Agents
tags:
  - memory
  - context-engineering
  - knowledge-graph
  - graph-rag
  - agent-memory
  - hallucination-reduction
pricing: freemium
is_open_source: true
license: Apache-2.0
