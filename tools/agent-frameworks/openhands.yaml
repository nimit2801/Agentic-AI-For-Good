name: OpenHands
description: "OpenHands is an open-source AI-driven development platform that enables autonomous coding agents to write code, fix bugs, review PRs, and automate development workflows. It provides a CLI, GUI, SDK, and cloud deployment options for running AI agents that execute code in sandboxed environments."
tagline: "Open-source AI coding agents for autonomous software development"
github_url: https://github.com/OpenHands/OpenHands
website_url: https://openhands.dev
docs_url: https://docs.openhands.dev
install_command: "docker run -it --rm --pull=always ghcr.io/openhands/openhands:latest"
category: Agents
tags:
  - coding-agent
  - autonomous-development
  - ai-agent
  - code-review
  - bug-fixing
  - software-engineering
  - open-source
  - sdk
pricing: freemium
is_open_source: true
license: MIT
problem_solved: "Software development teams spend excessive time on repetitive tasks like bug fixes, code reviews, test generation, and dependency upgrades, slowing feature delivery and increasing technical debt across large codebases."
use_cases:
  - "Autonomous bug fixing and vulnerability patching across repositories"
  - "Automated code review with security and best practice analysis"
  - "Legacy code migration and refactoring with built-in testing and validation"
