name: ConnectOnion
description: Open-source AI agent collaboration framework that lets you build multi-agent systems where specialized agents work together on complex tasks. Provides agent orchestration, memory sharing, tool composition, and inter-agent communication primitives in a lightweight Python framework.
tagline: AI agent collaboration framework for multi-agent systems

github_url: https://github.com/openonion/connectonion
website_url: https://connectonion.com
docs_url: https://docs.connectonion.com

install_command: pip install connectonion

category: Agents
tags: [agents, multi-agent, python, collaboration, orchestration, framework]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Building multi-agent systems where multiple AI agents collaborate on complex tasks requires
  solving inter-agent communication, shared memory, task routing, and consistent orchestration
  — problems that are expensive to solve from scratch. ConnectOnion solves this by providing
  a lightweight Python framework with built-in agent collaboration primitives: agents can
  delegate subtasks to each other, share context through a unified memory system, compose
  tools across agent boundaries, and coordinate through configurable orchestration patterns
  — all without requiring complex infrastructure or distributed systems expertise.

use_cases:
  - Build a multi-agent research system where a planner, researcher, writer, and fact-checker collaborate on reports
  - Create agent teams that decompose complex tasks into parallel subtasks with automatic coordination
  - Develop collaborative AI assistants that share context and memory across multiple specialized agents
  - Orchestrate tool composition chains where one agent's output feeds into another agent's specialized tools
  - Prototype and iterate on multi-agent architectures with a lightweight framework and minimal boilerplate
