name: LangGraph
tagline: Build resilient language agents as graphs with durable execution and human-in-the-loop control.
description: LangGraph is a low-level orchestration framework and runtime for building, managing, and deploying long-running, stateful agents. It provides core infrastructure for agent orchestration including durable execution, streaming, human-in-the-loop, and comprehensive memory — enabling developers to build complex multi-actor LLM workflows as graphs.
problem_solved: Building complex, stateful LLM agent applications requires managing persistent state, surviving failures, incorporating human oversight, and maintaining memory across sessions — capabilities absent from simpler agent frameworks that only handle basic single-turn tasks without robust orchestration primitives.
use_cases:
  - Building multi-agent workflows with complex, customizable control flows for single, multi-agent, and hierarchical architectures
  - Creating stateful conversational agents with both short-term working memory and long-term persistent memory across sessions
  - Implementing human-in-the-loop approval and moderation flows where agents pause for human review before executing critical actions
github_url: https://github.com/langchain-ai/langgraph
website_url: https://www.langchain.com/langgraph
docs_url: https://docs.langchain.com/oss/python/langgraph/overview
install_command: pip install -U langgraph
category: Agents
