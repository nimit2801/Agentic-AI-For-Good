name: OpenClaw
description: A cross-platform personal AI assistant that runs locally on any OS, with gateway daemon, message channels (WhatsApp, Telegram, Slack, Discord, Signal, iMessage), and fully offline-capable operation.
tagline: Your own personal AI assistant on any platform

github_url: https://github.com/openclaw/openclaw
website_url: https://openclaw.ai
docs_url: https://docs.openclaw.ai

install_command: npm install -g openclaw@latest

category: Agents
tags: [ai-assistant, personal-ai, cross-platform, typescript, open-source, privacy, local-first, messaging]
pricing: free
is_open_source: true
license: MIT

problem_solved: |
  Existing AI assistants are tied to specific platforms (desktop only, mobile only, or cloud-only) and cannot be accessed across all communication channels. OpenClaw solves this with a single gateway daemon that runs on any OS and connects to WhatsApp, Telegram, Slack, Discord, Signal, iMessage, IRC, and more — all with local-first, privacy-preserving AI that works fully offline.

use_cases:
  - "Cross-platform AI assistant: access the same AI from your terminal, phone, desktop, and all messaging apps simultaneously"
  - "Privacy-first personal assistant: run entirely locally with no cloud dependency for sensitive personal or business data"
  - "Multi-channel notification hub: receive AI-generated summaries and alerts across WhatsApp, Telegram, Slack, and email"
  - "Team collaboration: deploy a shared AI assistant accessible via team Slack channels and group chats"
  - "Home automation: use OpenClaw as a natural language interface to smart home devices via MCP tool integration"
  - "Developer productivity: automate repetitive tasks using the CLI gateway with custom tool integrations"
