name: Open Interpreter
tagline: A natural language interface for computers
description: "Open Interpreter lets LLMs run code locally on your computer. Chat through a terminal interface to create and edit files, control browsers, analyze datasets, and more — giving language models general-purpose computing capabilities."
problem_solved: "LLMs are inherently limited to text generation and cannot directly interact with a computer's capabilities. Open Interpreter bridges this gap by enabling LLMs to execute code, manipulate files, control applications, and perform real computing tasks locally, turning language models into general-purpose computer agents."
use_cases:
  - "Create and edit photos, videos, PDFs, and other documents programmatically"
  - "Control a Chrome browser to perform web research and automation tasks"
  - "Plot, clean, and analyze large datasets with real code execution"
github_url: https://github.com/OpenInterpreter/open-interpreter
website_url: https://www.openinterpreter.com
docs_url: https://docs.openinterpreter.com
install_command: pip install open-interpreter
category: Agents
tags:
  - agents
  - code-execution
  - local-ai
  - python
  - desktop-agent
  - llm
pricing: freemium
is_open_source: true
license: AGPL-3.0
