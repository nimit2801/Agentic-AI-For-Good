name: Mastra
tagline: The modern TypeScript framework for building AI-powered applications and agents.
description: From the team behind Gatsby, Mastra is a TypeScript framework for building AI-powered applications and agents. It provides agents, workflows, RAG, memory, MCP integration, evals, and observability — everything needed to prototype fast and ship with confidence.
problem_solved: Building production-grade AI agents and applications with TypeScript requires extensive plumbing for orchestration, memory, observability, and evaluation. Mastra unifies all these primitives into a single framework so developers can go from idea to deployed agent quickly.
use_cases:
  - Building AI agents with tools, memory, guardrails, and streaming for production use
  - Creating multi-step AI workflows with branching logic, persistent state, and human-in-the-loop
  - Implementing RAG pipelines with document processing, vector search, and retrieval-augmented generation
github_url: https://github.com/mastra-ai/mastra
website_url: https://mastra.ai
docs_url: https://mastra.ai/docs
install_command: npm create mastra@latest
category: Agents
tags:
  - TypeScript
  - AI agents
  - LLM
  - RAG
  - workflows
  - MCP
  - observability
  - evals
  - memory
  - Node.js
pricing: freemium
is_open_source: true
license: Apache-2.0
