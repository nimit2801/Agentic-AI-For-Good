name: MetaGPT
description: MetaGPT is a multi-agent framework that assigns specialized roles to LLMs to form a collaborative software company, enabling end-to-end software development and complex task execution from natural language prompts.
tagline: Build a collaborative AI software company from natural language

github_url: https://github.com/FoundationAgents/MetaGPT
website_url: https://github.com/FoundationAgents/MetaGPT
docs_url: https://docs.deepwisdom.ai/main/en/

install_command: pip install metagpt

category: Agents
tags: [python, agents, multi-agent, software-development, automation, llm, framework]
pricing: free
is_open_source: true
license: MIT

problem_solved: |
  Complex software development and multi-step workflows require coordinating many specialized
  tasks — architecture design, coding, testing, documentation — which is slow and error-prone
  when done manually or by a single generalist LLM. MetaGPT automates this by orchestrating
  multiple LLM agents with distinct roles (product manager, architect, engineer, tester) that
  collaborate to deliver complete software projects from a single natural language requirement.

use_cases:
  - Generate complete software projects including architecture, code, tests, and docs from one prompt
  - Automate multi-agent data analysis pipelines with specialized agents for collection, cleaning, and visualization
  - Conduct autonomous web research and generate structured reports through coordinated agent teams
  - Build interactive simulations such as multi-agent debates and game environments
  - Prototype AI-powered tools and SaaS products without writing boilerplate infrastructure code
