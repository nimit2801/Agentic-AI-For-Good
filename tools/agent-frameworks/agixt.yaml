name: AGiXT
description: AGiXT is a comprehensive AI automation platform with 40+ built-in extensions that transforms how you interact with artificial intelligence. It provides multi-provider support, enterprise-grade features, workflow automation, and natural language control for managing complex systems including smart home devices, enterprise workflows, and cryptocurrency trading.
tagline: AI automation platform with 40+ extensions for agent-driven workflows

github_url: https://github.com/Josh-XT/AGiXT
website_url: https://agixt.com
docs_url: https://docs.agixt.com
install_command: pip install agixtsdk

category: Agents
tags: [agents, automation, multi-provider, workflow, extensions, enterprise, ai-platform]
pricing: freemium
is_open_source: true
license: MIT

problem_solved: |
  Building a complete AI-powered automation system typically requires stitching together multiple frameworks, providers, and integrations. AGiXT provides a unified platform with 40+ pre-built extensions covering everything from smart home control and enterprise asset management to cryptocurrency trading — accessible through natural language with multi-provider LLM support.

use_cases:
  - Automate enterprise workflows by chaining multiple AI services and extensions through natural language commands
  - Control smart home devices, manage IoT systems, and automate digital environments via conversational AI
  - Deploy a centralized AI agent platform with OAuth, multi-tenancy, and advanced security for enterprise use
  - Combine multiple LLM providers (OpenAI, Anthropic, Google, local models) under one platform with automatic failover
  - Build complex automation sequences that chain extensions, webhooks, and WebSocket connections in real time
