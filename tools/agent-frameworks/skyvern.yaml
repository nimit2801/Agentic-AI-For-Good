name: Skyvern
tagline: AI agents to automate workflows on any website
description: "Skyvern automates browser-based workflows using LLMs and computer vision. It provides a Playwright-compatible SDK that adds AI functionality on top of Playwright, as well as a no-code workflow builder to help both technical and non-technical users automate manual workflows on any website, replacing brittle or unreliable automation solutions."
problem_solved: "Traditional browser automation relies on DOM parsing and XPath-based interactions that break whenever website layouts change. Skyvern uses Vision LLMs to interact with websites visually, making automations resilient to layout changes and able to operate on websites it has never seen before."
use_cases:
  - "Automate invoice downloading from vendor portals behind logins and 2FA"
  - "Fill and submit applications, registrations, and compliance forms at scale across multiple websites"
  - "Extract structured data from any website without needing an API"
  - "Browser testing and QA that adapts to UI changes without flaky selectors"
github_url: https://github.com/Skyvern-AI/skyvern
website_url: https://www.skyvern.com
docs_url: https://docs.skyvern.com
install_command: pip install skyvern
category: Agents
tags:
  - browser-automation
  - ai-agents
  - llm
  - computer-vision
  - playwright
  - web-automation
  - workflow-automation
  - rpa
pricing: freemium
is_open_source: true
