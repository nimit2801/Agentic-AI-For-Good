name: Microsoft Agent Framework
description: An open-source framework from Microsoft for building, orchestrating, and deploying AI agents and multi-agent workflows. Supports Python and .NET with built-in patterns for agent collaboration, tool use, memory management, and safe autonomous execution.
tagline: Build and orchestrate AI agents with Microsoft's agent framework

github_url: https://github.com/microsoft/agent-framework
docs_url: https://github.com/microsoft/agent-framework#readme

install_command: |
  pip install microsoft-agent-framework

category: Agents
tags: [agents, multi-agent, orchestration, microsoft, python, dotnet, autonomous, tool-use]
pricing: free
is_open_source: true
license: MIT

problem_solved: |
  Building production multi-agent systems requires handling agent lifecycle management, tool registration, inter-agent communication, memory persistence, and safety guardrails — infrastructure that each team currently builds from scratch. Microsoft Agent Framework provides a standardized runtime with built-in patterns for agent orchestration, human-in-the-loop workflows, tool integration, and durable execution across Python and .NET ecosystems, so developers focus on agent logic instead of infrastructure.

use_cases:
  - "Orchestrate multiple AI agents that collaborate on complex tasks with role-based delegation and handoffs"
  - "Build a customer support system where agents triage queries, escalate to specialized agents, and loop in humans"
  - "Create automated research workflows with agents for web search, document analysis, data extraction, and synthesis"
  - "Implement agent-powered automation for enterprise workflows with human approval checkpoints and audit trails"
  - "Deploy agents with built-in safety guardrails, content filtering, and configurable autonomous execution limits"
