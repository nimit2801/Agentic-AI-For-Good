name: Goose
description: An open source, extensible AI agent that runs locally on your machine — available as a desktop app, CLI, and API. Works with 15+ LLM providers and 70+ MCP extensions. Goes beyond code suggestions to install, execute, edit, and test with any LLM.
tagline: Your native open source AI agent — for code, workflows, and everything in between

github_url: https://github.com/block/goose
website_url: https://goose-docs.ai/
docs_url: https://goose-docs.ai/

category: Agents
tags: [rust, agents, mcp, automation, cli, desktop-app, llm, code-assistant]
pricing: free
is_open_source: true
license: Apache-2.0

install_command: curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh | bash

problem_solved: |
  Developers and knowledge workers need an AI agent that can autonomously execute multi-step
  tasks on their machine — not just suggest code snippets, but actually run commands, edit files,
  browse the web, and orchestrate workflows across tools and data sources.

use_cases:
  - Code generation, editing, and automated testing with multi-LLM provider support
  - Automating multi-step workflows and repetitive tasks via portable YAML recipes
  - Research and data analysis with multi-tool orchestration via 70+ MCP extensions
