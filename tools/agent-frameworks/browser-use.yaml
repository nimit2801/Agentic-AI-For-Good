name: Browser Use
description: "Browser Use is an open-source Python library that makes websites accessible to AI agents by connecting LLMs to browser automation. It supports multiple LLM providers and enables agents to navigate, click, type, extract data, and perform complex multi-step web tasks autonomously using natural language instructions."
tagline: "Make websites accessible for AI agents"
github_url: https://github.com/browser-use/browser-use
website_url: https://browser-use.com
docs_url: https://docs.browser-use.com
install_command: "pip install browser-use"
category: Agents
tags:
  - browser-automation
  - llm
  - web-agent
  - python
  - openai
  - anthropic
  - gemini
  - playwright
  - rpa
  - ai-agent
pricing: free
is_open_source: true
license: MIT
problem_solved: "Building reliable browser automation with LLMs is complex. DOM parsing, element interaction, multi-step reasoning, and cross-site compatibility require significant glue code. Browser Use provides a ready-made agent framework that handles vision and DOM-based element detection, action execution, tab management, and LLM orchestration out of the box."
use_cases:
  - "Automate repetitive web workflows like form filling, data extraction, and CRM updates"
  - "Perform QA testing and monitoring of web applications using natural language instructions"
  - "Build AI agents that browse, search, and interact with any website autonomously"
