name: OpenRouter
description: "OpenRouter provides an OpenAI-compatible API for accessing hundreds of AI models across many providers. It offers model routing, fallbacks, pricing visibility, usage tracking, SDKs, and agent-building support through one unified developer interface."
tagline: "Unified API for routing across hundreds of AI models"
github_url: https://github.com/OpenRouterTeam
website_url: https://openrouter.ai
docs_url: https://openrouter.ai/docs/quickstart
install_command: "npm install @openrouter/sdk"
category: LLM
tags:
  - llm-gateway
  - model-routing
  - openai-compatible
  - fallback-routing
  - ai-infrastructure
  - cost-optimization
pricing: freemium
is_open_source: false
license: Proprietary
problem_solved: "Teams building AI applications often need to compare and route between many model providers without maintaining separate integrations, billing paths, and fallback logic. OpenRouter centralizes access so developers can choose models by quality, price, context window, and availability."
use_cases:
  - "Build AI applications with one API for many commercial and open models"
  - "Route production traffic to lower-cost or higher-availability model providers"
  - "Compare model quality, latency, and price before selecting a deployment option"
  - "Add fallback models to keep user-facing AI features resilient during outages"
