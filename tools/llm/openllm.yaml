name: OpenLLM
description: OpenLLM is an open-source platform for running any open-source large language model as an OpenAI-compatible API endpoint. It simplifies production deployment with built-in model management, auto-scaling, batching optimizations, and support for models like DeepSeek and Llama.
tagline: Run any open-source LLM as an OpenAI-compatible API endpoint
category: LLM
pricing: free
is_open_source: true
license: Apache-2.0
github_url: https://github.com/bentoml/OpenLLM
website_url: https://bentoml.com
docs_url: https://github.com/bentoml/OpenLLM#readme
install_command: pip install openllm
problem_solved: Deploying open-source LLMs in production requires handling model packaging, serving infrastructure, auto-scaling, and API compatibility. OpenLLM simplifies this by turning any open-source LLM into a scalable, OpenAI-compatible API endpoint with built-in model management and optimization.
use_cases:
  - Deploy DeepSeek, Llama, and other open-source LLMs as production API endpoints
  - Serve models with auto-scaling and batching optimizations for cost efficiency
  - Integrate with existing applications using the OpenAI-compatible REST API
  - Manage model artifacts and versions across staging and production environments
tags:
  - python
  - llm
  - inference
  - serving
  - api
  - deployment
