name: Stanza
description: A Stanford NLP Python library for tokenization, sentence segmentation, named entity recognition, and multilingual parsing that supports over 70 human languages with state-of-the-art accuracy.
tagline: Multilingual NLP library from Stanford

github_url: https://github.com/stanfordnlp/stanza
website_url: https://stanfordnlp.github.io/stanza/
install_command: pip install stanza

category: LLM
