name: Perplexity
description: AI-powered answer engine and developer API platform that processes natural language queries by searching the live web and synthesizing responses with cited sources. Offers Sonar search, agent, and embedding APIs with OpenAI-compatible SDK.
tagline: The AI answer engine for research and discovery

website_url: https://www.perplexity.ai
docs_url: https://docs.perplexity.ai

category: LLM
tags: [search-engine, answer-engine, web-search, api, llm, research, rag]
pricing: freemium
is_open_source: false

problem_solved: |
  Traditional search engines return lists of links that require manual sifting to find answers.
  Perplexity transforms this by using LLMs to understand the query context, search the web in
  real time, and synthesize a direct, cited answer. For developers, the Perplexity API (Sonar,
  Search, Agent, Embeddings) adds real-time web grounding to any AI application, eliminating
  the need to build and maintain your own web retrieval pipeline. The API is fully compatible
  with the OpenAI SDK, so integration takes minutes.

use_cases:
  - Research any topic by asking natural language questions and getting cited, synthesized answers
  - Add real-time web search and citation capabilities to any LLM-powered application via API
  - Power AI research assistants that need up-to-date web grounding without building a retrieval pipeline
  - Generate structured research reports with inline source citations for content or analysis workflows
  - Query financial data, news events, or technical documentation with automatic source attribution
