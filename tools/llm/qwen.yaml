name: Qwen
description: Qwen (Qwen3) is Alibaba Cloud's open-source large language model family, offering cutting-edge models for chat, coding, reasoning, and multimodal tasks through free local deployment via HuggingFace Transformers and an affordable OpenAI-compatible API.
tagline: Alibaba's open-source LLM family for chat, coding, and reasoning

github_url: https://github.com/QwenLM/Qwen3
website_url: https://qwen.ai

install_command: |
  pip install transformers

category: LLM
tags: [llm, open-source, coding, reasoning, multimodal, chinese, api, huggingface]
pricing: freemium
is_open_source: true
license: Apache-2.0

problem_solved: |
  Access to high-performance large language models often requires expensive API subscriptions or complex infrastructure setup. Qwen provides powerful open-source models for chat, coding, reasoning, and multimodal tasks that can be deployed locally via HuggingFace Transformers or accessed through an affordable OpenAI-compatible API, making frontier AI capabilities accessible to developers and researchers worldwide.

use_cases:
  - Deploy state-of-the-art open-source LLMs locally for private inference and fine-tuning with HuggingFace Transformers
  - Build coding assistants and agentic applications using Qwen's strong code generation and tool-calling capabilities
  - "Access Qwen models via OpenAI-compatible API for multilingual chat, reasoning, and content generation"
  - Process images and text together with Qwen's multimodal vision-language capabilities for document analysis
