name: xAI Grok
description: xAI's Grok is a family of large language models with strong reasoning and real-time knowledge from X (formerly Twitter). The official Python SDK provides synchronous and asynchronous clients for chat, image understanding, and tool use.
tagline: xAI's Grok models via the official Python SDK

github_url: https://github.com/xai-org/xai-sdk-python
website_url: https://x.ai
docs_url: https://docs.x.ai

category: LLM
tags: [llm, grok, xai, sdk, api, reasoning]
pricing: paid
is_open_source: false
license: Apache-2.0 (SDK only)

install_command: pip install xai-sdk

problem_solved: |
  Teams building with frontier LLMs often need an alternative to OpenAI and Anthropic for cost, latency, or capability reasons. xAI's Grok models offer competitive reasoning benchmarks plus real-time knowledge from X, and the official SDK makes it trivial to swap into existing pipelines.

use_cases:
  - Add Grok to an agentic pipeline as an alternative LLM provider for cost or latency reasons
  - Use Grok's tool use capabilities for multi-step agentic workflows
  - Build apps that combine Grok with real-time information from the X platform
  - Switch LLM providers via the OpenAI-compatible API endpoint exposed by the SDK
  - Run image understanding and multimodal tasks through the Grok vision models
