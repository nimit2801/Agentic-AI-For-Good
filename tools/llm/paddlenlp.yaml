name: PaddleNLP
description: A powerful and easy-to-use NLP and large language model library by PaddlePaddle with a comprehensive model zoo covering LLMs, document intelligence, embeddings, and information extraction.
tagline: Easy-to-use LLM and NLP library with a comprehensive model zoo

github_url: https://github.com/PaddlePaddle/PaddleNLP
website_url: https://paddlenlp.readthedocs.io
docs_url: https://paddlenlp.readthedocs.io/zh/latest

install_command: pip install paddlenlp

category: LLM
tags: [python, nlp, llm, document-intelligence, embedding, information-extraction, transformers, paddlepaddle]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Building production NLP and LLM applications requires managing pretrained model
  weights, tokenizers, training loops, and inference optimizations across dozens of
  architectures — a significant engineering effort for most teams. PaddleNLP provides
  a unified library with hundreds of pretrained models (BERT, ERNIE, Llama, Qwen, etc.),
  distributed training support, document intelligence pipelines, and semantic search
  capabilities — all with a consistent API on top of PaddlePaddle.

use_cases:
  - Fine-tune large language models on domain-specific data with distributed training support
  - Extract structured information from documents using the UIE information extraction framework
  - Build neural search and document retrieval pipelines with semantic embedding models
  - Deploy LLM inference endpoints with high-performance serving and quantization support
  - Perform text classification, sentiment analysis, and sequence labeling at scale
