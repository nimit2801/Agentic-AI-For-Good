name: Mistral AI
description: AI platform for building, customizing, and deploying language-model applications, agents, and workflows via web products and API.
tagline: Frontier AI. In your hands.

github_url: https://github.com/mistralai
website_url: https://mistral.ai/
docs_url: https://docs.mistral.ai/

category: LLM
tags: [llm, api, agents, rag, enterprise, coding, workflows]
pricing: freemium
is_open_source: false

problem_solved: |
  Building production AI systems usually means stitching together hosted models, agent logic,
  evaluation, and deployment infrastructure across multiple vendors. Mistral AI provides managed
  language models, agent-building tools, and deployment workflows in one platform so teams can
  prototype, integrate, and operate AI applications without managing model infrastructure from scratch.

use_cases:
  - Build and deploy AI applications through an API and playground
  - Create custom agents with instructions, tools, and knowledge bases
  - Run document search and retrieval-augmented generation workflows
  - Research topics and analyze documents in a no-code workspace
  - Generate and automate coding tasks from the terminal
