name: Cohere
description: |
  Cohere is an enterprise AI platform that provides private, secure, and customizable large language models
  and retrieval systems. Its product suite includes Command for generation, Embed for multimodal search,
  Rerank for semantic search enhancement, North for enterprise AI workplaces, and Compass for intelligent
  business search.

tagline: Enterprise LLMs and retrieval systems with data privacy and control

github_url: https://github.com/cohere-ai
website_url: https://cohere.com
docs_url: https://docs.cohere.com
install_command: pip install cohere

category: LLM
tags: [llm, enterprise, retrieval, embeddings, rerank, python, api]
pricing: freemium
is_open_source: false
license: MIT

problem_solved: |
  Organizations need powerful AI and language model capabilities without sacrificing data privacy, security,
  or infrastructure control. Cohere solves this by offering private-deployable, enterprise-grade LLMs and
  retrieval systems that reduce vendor lock-in and ensure sensitive data never leaves the customer's environment.

use_cases:
  - Enterprise knowledge retrieval and intelligent document search with Compass and Embed
  - Building AI agents and automating complex business workflows via North
  - Multilingual conversational AI and customer support across 70+ languages
  - Semantic search and reranking to surface relevant business insights
