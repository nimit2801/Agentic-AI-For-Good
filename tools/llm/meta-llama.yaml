name: Meta Llama
description: >-
  Meta's family of open-weight large language models spanning 8B to 405B parameters, supporting
  multilingual text generation, code generation, tool use, and reasoning across diverse deployment
  scenarios — from edge devices to cloud-scale inference.
tagline: Open-weight LLMs from Meta

github_url: https://github.com/meta-llama/llama
website_url: https://llama.meta.com
docs_url: https://llama.meta.com/docs
install_command: pip install llama-models

category: LLM
tags:
  - llm
  - open-source
  - text-generation
  - code-generation
  - reasoning
  - multilingual
pricing: free
is_open_source: true
license: Llama 2 Community License

problem_solved: >-
  Building applications with state-of-the-art language models usually requires paying for
  proprietary APIs or navigating complex licensing, deployment, and safety requirements. Meta Llama
  provides a family of open-weight LLMs — from 8B for edge deployment to 405B for cloud-scale
  reasoning — that developers can download, fine-tune, and deploy freely. Combined with a Python
  CLI for model management and inference, Llama makes production-grade open LLMs accessible for
  any deployment target.

use_cases:
  - Generate code, documentation, and technical content with state-of-the-art multilingual reasoning
  - Fine-tune open-weight foundation models on domain-specific data for enterprise applications
  - Deploy language models on edge devices with the 8B variant or scale to cloud clusters for 405B inference
  - Build agentic systems with built-in tool use capabilities and structured reasoning
  - Run offline or air-gapped inference with fully local model weights and no API dependencies
