name: Anthropic
description: AI platform for building applications and agentic workflows with Claude models, APIs, tool use, web search, code execution, and managed agent runtime features.
tagline: Safety-focused Claude models and APIs for production AI apps

github_url: https://github.com/anthropics/anthropic-sdk-python
website_url: https://www.anthropic.com/
docs_url: https://docs.anthropic.com/

install_command: |
  pip install anthropic
  npm install @anthropic-ai/sdk

category: LLM
tags: [llm, claude, api, agents, tool-calling, sdk, enterprise]
pricing: paid
is_open_source: false

problem_solved: |
  Teams building production AI systems often need more than raw model access: they need dependable
  APIs, SDKs, tool use, browsing, code execution, and agent runtime features that can be integrated
  without assembling a full stack from multiple vendors. Anthropic provides Claude models and a
  managed developer platform so teams can build, operate, and scale AI assistants and workflows
  with less infrastructure and orchestration overhead.

use_cases:
  - Build chat, Q&A, and content-generation applications with Claude models
  - Add tool use, web search, and code execution to agentic application workflows
  - Power coding assistants and software engineering copilots in internal tools
  - Integrate managed AI capabilities into enterprise support, research, and operations systems
