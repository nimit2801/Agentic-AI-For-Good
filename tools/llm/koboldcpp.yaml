name: KoboldCpp
tagline: Run GGUF models easily with a KoboldAI UI. One File. Zero Install.
description: >
  KoboldCpp is an easy-to-use AI text-generation software for GGML and GGUF models,
  inspired by the original KoboldAI. It is a single self-contained distributable that
  builds off llama.cpp and adds powerful features including image generation and editing,
  video generation, speech-to-text, text-to-speech, music generation, multimodal vision,
  MCP server support, and compatible API endpoints for popular services.
problem_solved: >
  Provides a simple, zero-install way to run local LLMs and multimodal AI models with a
  user-friendly web UI and broad API compatibility, eliminating complex setup and dependency
  management for local AI inference on consumer hardware.
use_cases:
  - Local LLM text generation and chat for creative writing, roleplay, instruct, and storywriter modes
  - Multimodal AI tasks including image generation and editing, vision recognition, video generation, speech-to-text, text-to-speech, and music generation
  - Local AI API server compatible with OpenAI, Ollama, A1111, ComfyUI, Whisper, and XTTS endpoints
  - Running AI models on consumer hardware with CPU and GPU offload, including older PCs, Macs, Linux, Android, and Raspberry Pi
github_url: https://github.com/LostRuins/koboldcpp
website_url: https://github.com/LostRuins/koboldcpp/wiki
docs_url: https://github.com/LostRuins/koboldcpp/wiki
install_command: |
  curl -fLo koboldcpp https://github.com/LostRuins/koboldcpp/releases/latest/download/koboldcpp-linux-x64-oldpc
  chmod +x koboldcpp
  ./koboldcpp
license: AGPL-3.0
is_open_source: true
pricing: free
category: LLM
