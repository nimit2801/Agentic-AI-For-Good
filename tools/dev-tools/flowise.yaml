name: Flowise
description: Flowise is an open source generative AI development platform that lets you build AI agents and LLM workflows visually using drag-and-drop building blocks. It supports everything from simple chatbots to complex multi-agent systems with RAG, tool calling, and human-in-the-loop capabilities.
tagline: Build AI Agents, Visually

github_url: https://github.com/FlowiseAI/Flowise
website_url: https://flowiseai.com
docs_url: https://docs.flowiseai.com

category: Dev Tools
tags: [llm, ai-agents, workflow-builder, drag-and-drop, open-source, generative-ai, chatbot, rag, multi-agent, no-code]
pricing: freemium
is_open_source: true
license: Apache-2.0

problem_solved: |
  Building AI agents and LLM workflows traditionally requires writing complex orchestration
  code, managing API integrations, and handling prompt engineering manually. Flowise solves
  this by providing a visual drag-and-drop interface with pre-built nodes for 100+ LLMs,
  vector databases, and tools — enabling both technical and non-technical users to prototype
  and productionize AI applications without deep coding expertise.

use_cases:
  - Multi-agent workflow orchestration for coordinated AI systems
  - RAG-powered chatbots and customer support assistants
  - AI copilots embedded into existing SaaS products and analytics platforms
