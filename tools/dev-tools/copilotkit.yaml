name: CopilotKit
tagline: The open-source framework for building agent-native applications with generative UI
description: CopilotKit is the leading SDK for building full-stack agentic applications with generative UI, shared state, and human-in-the-loop workflows. It provides React and Angular frontend SDKs that connect any AI agent backend to your user interface, enabling dynamic UI rendering from agent actions, conversation threading, and state persistence across sessions.
problem_solved: Building production-ready AI agent interfaces that connect to frontend applications is complex and time-consuming. CopilotKit solves this by providing a complete open-source frontend stack for agentic AI integration, giving developers pre-built chat UI, generative UI components, shared state layers, and human-in-the-loop workflows out of the box.
use_cases:
  - Add AI copilot or chat assistants to existing React or Angular SaaS applications
  - Build generative UIs where AI agents dynamically render custom React components
  - Implement human-in-the-loop workflows where agents request user confirmation
  - Create agent-native applications with bidirectional state between agents and UI
  - Deploy multi-step conversational workflows with automatic session persistence
category: Dev Tools
tags:
  - react
  - angular
  - agent
  - open-source
  - typescript
  - generative-ui
  - frontend-sdk
  - copilot
github_url: https://github.com/CopilotKit/CopilotKit
website_url: https://www.copilotkit.ai
docs_url: https://docs.copilotkit.ai
install_command: npm install @copilotkit/react-core @copilotkit/react-ui
