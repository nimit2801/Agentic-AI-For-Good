name: ByteChef
description: |-
  An open-source platform that unifies AI agent orchestration and workflow automation in a single system. Features a drag-and-drop visual editor for building AI agents with built-in LLM provider integration, tool calling, memory, guardrails, and MCP support alongside traditional workflow automation.
tagline: Unify AI agent orchestration and workflow automation

github_url: https://github.com/bytechefhq/bytechef
website_url: https://www.bytechef.io
docs_url: https://docs.bytechef.io

category: Dev Tools
tags: [workflow-automation, ai-agents, ipaas, low-code, integration, mcp, orchestration, java]
pricing: freemium
is_open_source: true
license: Apache-2.0

install_command: docker pull bytechef/bytechef

problem_solved: |
  Organizations typically use separate tools for AI agents and workflow automation, creating integration overhead and siloed management. ByteChef brings both into a single platform with a drag-and-drop visual editor, built-in AI agent component that runs the full agent loop (model selection, tool calling, memory, guardrails), and 200+ pre-built integrations. It can be self-hosted, embedded into products, and supports enterprise-grade security.

use_cases:
  - Build AI agents with drag-and-drop that can call APIs, query databases, and execute sub-workflows without writing code
  - Replace point-to-point integrations with a unified automation platform connecting SaaS, databases, and AI services
  - Embed AI agent capabilities into existing SaaS products using ByteChef's embedded iPaaS architecture
  - Create multi-step workflows that combine traditional automation triggers with AI-powered decision steps
  - Manage AI agent memory, guardrails, and MCP tool connections through a centralized visual interface
