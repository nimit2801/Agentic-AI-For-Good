name: Qwen Code
description: Qwen Code is an open-source AI coding agent that lives in your terminal. Built by the Qwen team at Alibaba, it offers interactive and headless modes, multi-provider API support (OpenAI, Anthropic, Gemini, Ollama, vLLM), IDE integration for VS Code, Zed, and JetBrains, and built-in tools for skills, sub-agents, memory, and computer use — all under an Apache 2.0 license.
tagline: An open-source AI coding agent that lives in your terminal

github_url: https://github.com/QwenLM/qwen-code
website_url: https://qwen.ai/qwencode
docs_url: https://qwenlm.github.io/qwen-code-docs/en/users/overview/

install_command: |
  npm install -g @qwen-code/qwen-code
  brew install qwen-code

category: Dev Tools
tags:
  - ai-coding-agent
  - terminal-ai
  - code-assistant
  - developer-tools
  - cli
  - typescript
  - qwen
pricing: free
is_open_source: true
license: Apache 2.0

problem_solved: |
  Developers need a powerful, privacy-aware AI coding agent that works seamlessly in
  the terminal, supports any LLM provider, and integrates with their existing IDE and
  workflow — not just a single vendor's locked-in solution. Qwen Code provides a fully
  open-source terminal-based AI coding agent optimized for Qwen models but compatible
  with OpenAI, Anthropic, Gemini, and local models via Ollama/vLLM, with built-in
  tools for skills, sub-agents, memory, computer use, and IDE integration — all free
  and locally runnable.

use_cases:
  - "Build features end-to-end from natural language descriptions across multiple files in the terminal"
  - Debug complex codebase errors with automatic call-stack tracing and multi-file analysis
  - Automate CI/CD pipelines and git workflows with headless mode for unattended operations
  - Run as a local, privacy-preserving AI coding agent using Ollama or vLLM for sensitive code
  - Refactor large codebases across dozens of files with a single instruction and IDE integration
