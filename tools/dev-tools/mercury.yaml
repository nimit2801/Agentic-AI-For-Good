name: Mercury
description: An open-source framework that converts Jupyter notebooks into interactive web applications with parameter widgets, file uploads, and real-time output — enabling data scientists to share analyses without rewriting code.
tagline: Turn Jupyter notebooks into web apps

github_url: https://github.com/mljar/mercury
website_url: https://mercury.mljar.com
docs_url: https://mercury.mljar.com/docs

install_command: pip install mercury

category: Dev Tools
tags: [jupyter, notebook, web-app, dashboard, python, data-science, sharing]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Data scientists build analyses in Jupyter notebooks but struggle to share them 
  with non-technical stakeholders who need interactive controls. Mercury adds YAML 
  configuration headers to existing notebooks that declare sliders, dropdowns, 
  text inputs, and file uploads — automatically generating a responsive web 
  application without requiring web development skills, framework migrations, or 
  code changes to the original notebook logic.

use_cases:
  - Share exploratory data analyses with business stakeholders who can adjust parameters and see results update in real time
  - Convert ML training notebooks into interactive demo tools where users control hyperparameters and visualize model outputs
  - Build internal dashboards that let team members run pre-built analyses on their own uploaded data without writing code
  - Deploy notebook-based reports and simulations as password-protected web apps accessible from any browser
