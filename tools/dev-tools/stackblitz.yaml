name: StackBlitz
description: A browser-based development environment powered by VS Code that lets developers spin up full-stack projects instantly without local setup.
tagline: Instant browser-based VS Code IDE

github_url: https://github.com/stackblitz/core
website_url: https://stackblitz.com
docs_url: https://developer.stackblitz.com

install_command: npm install @stackblitz/sdk

category: Dev Tools
tags: [javascript, typescript, ide, online, vs-code, development, prototyping, web-ide]
pricing: freemium
is_open_source: true
license: MIT

problem_solved: |
  Setting up a local development environment — installing Node.js, configuring package
  managers, and cloning repositories — eats into the time developers spend actually
  coding, and sharing a running application for review requires complex deployment steps.
  StackBlitz spins up a full VS Code environment with an installed runtime in any browser
  tab, supports git integration and instant sharing, and the SDK lets developers embed
  live, editable code examples into documentation and tutorials.

use_cases:
  - Embed live, editable code examples in documentation so readers can run and modify code without leaving the page
  - Create instant starter templates for hackathons and workshops that require zero local setup
  - Share a running full-stack application with colleagues for code review without deploying to a server
  - Prototype and test web application ideas on any device with a browser
