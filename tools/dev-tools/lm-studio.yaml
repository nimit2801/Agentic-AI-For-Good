name: LM Studio
description: >
  LM Studio is a desktop tool for running large language models locally on macOS, Windows, and Linux,
  with chat, document RAG, local APIs, SDKs, and optional headless deployment for private inference.
tagline: Run AI models locally and privately.
github_url: https://github.com/lmstudio-ai
website_url: https://lmstudio.ai/
docs_url: https://lmstudio.ai/docs/app
install_command: curl -fsSL https://lmstudio.ai/install.sh | bash
category: Dev Tools
tags:
  - local-llm
  - desktop-app
  - offline
  - rag
  - openai-compatible
  - mcp
  - cli
  - sdk
  - headless
pricing: free
is_open_source: false
license: Proprietary
problem_solved: >
  Developers who want to run and integrate local models usually juggle model downloads, GPU setup,
  private chat interfaces, and custom API wrappers before they can build anything useful. LM Studio
  packages local model management, offline chat, document RAG, and OpenAI-compatible endpoints into one
  tool so teams can experiment privately without relying on hosted inference.
use_cases:
  - Run local LLMs on macOS, Windows, or Linux for private experimentation
  - Chat with documents entirely offline on a laptop or workstation
  - Expose a local OpenAI-compatible API for internal apps and prototypes
  - Deploy headless local inference workflows on servers or CI machines
