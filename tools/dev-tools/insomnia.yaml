name: Insomnia
description: "An open-source, cross-platform API client for designing, debugging, and testing REST, GraphQL, WebSocket, SSE, and gRPC APIs with support for cloud, local, and Git-backed storage."
tagline: "Open-source API client for REST, GraphQL, gRPC, and WebSockets"
github_url: https://github.com/Kong/insomnia
website_url: https://insomnia.rest
docs_url: https://docs.insomnia.rest
install_command: brew install --cask insomnia
category: Dev Tools
tags:
  - api-testing
  - rest-client
  - graphql
  - grpc
  - collaboration
  - debugging
pricing: freemium
is_open_source: true
license: Apache-2.0
problem_solved: "Insomnia solves the multi-protocol API testing challenge by providing a single desktop application for REST, GraphQL, WebSocket, SSE, and gRPC requests — with environment variables, code generation, and team sync built in. It eliminates the need to switch between curl, GraphQL IDEs, and protocol-specific tools for API development and debugging."
use_cases:
  - "Debug REST and GraphQL APIs with environment-specific variable substitution and history tracking"
  - "Test gRPC endpoints with reflection-based service discovery and streaming response visualization"
  - "Organize API requests into collections shared with team members via Git-synced or cloud storage"
  - "Generate production-ready code snippets from API requests in client languages like curl, Python, and JavaScript"
  - "Design and test API request workflows with environment inheritance and chained request variables"
