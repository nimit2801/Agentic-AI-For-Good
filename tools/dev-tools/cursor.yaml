name: Cursor
description: An AI-first code editor built on VS Code that integrates LLMs deeply into the editing experience — autocomplete, multi-file editing, codebase chat, and AI-powered refactors.
tagline: The code editor built for AI-assisted development

github_url: https://github.com/getcursor/cursor
website_url: https://cursor.sh
docs_url: https://docs.cursor.sh

category: Dev Tools
tags: [editor, ide, vscode, autocomplete, chat, multi-file, typescript, python]
pricing: freemium
is_open_source: false

problem_solved: |
  GitHub Copilot gives you autocomplete. Cursor gives you an AI co-developer. The difference
  is context: Cursor indexes your entire codebase and lets the AI reason across files, understand
  your architecture, and make multi-file edits in a single command. You can ask "refactor this
  module to use the repository pattern" and it writes the changes across every affected file.
  For developers doing large-scale refactors or building in unfamiliar codebases, this is a
  10x productivity multiplier.

use_cases:
  - Ask "how does authentication work in this codebase?" and get an accurate, code-linked answer
  - Refactor a module across 20 files with a single natural language instruction
  - Generate entire feature branches from a description, including tests and documentation
  - Debug an error by asking Cursor to trace through the relevant call stack and propose a fix
  - Onboard to a new codebase by chatting with Cursor about the architecture before touching code
