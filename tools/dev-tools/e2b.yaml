name: E2B
description: "Open-source infrastructure for running AI-generated code in secure isolated cloud sandboxes. Provides SDKs for Python and JavaScript to start and control sandboxes where agents can execute code, use terminals, access the internet, and manipulate files in Firecracker-powered microVMs with full isolation."
tagline: "Secure cloud sandboxes for AI-generated code"
github_url: https://github.com/e2b-dev/E2B
website_url: https://e2b.dev
docs_url: https://e2b.dev/docs
install_command: |
  pip install e2b
  npm install e2b
category: Dev Tools
tags:
  - sandbox
  - code-interpreter
  - ai-agents
  - code-execution
  - firecracker
  - cloud-infrastructure
pricing: freemium
is_open_source: true
license: Apache-2.0
problem_solved: "AI agents need a safe, isolated environment to execute generated code without risking host systems or data. Traditional execution environments lack the security isolation, tooling, and scalability needed for agentic workflows and code interpretation."
use_cases:
  - "Securely execute AI-generated code in isolated cloud sandboxes"
  - "Build coding agents with terminal, filesystem, and internet access"
  - "AI-powered data analysis and visualization in safe environments"
