name: PyGlove
description: A Python library for evolutionary neural architecture search, hyperparameter tuning, and AutoML that lets developers define and explore large search spaces with Python object manipulation. It supports distributed search, genetic programming, and RL-based optimization with built-in checkpointing and visualization.
tagline: Evolutionary neural architecture search and hyperparameter optimization

github_url: https://github.com/google/pyglove
website_url: https://pyglove.ai
docs_url: https://pyglove.readthedocs.io

category: Dev Tools
tags: [automl, nas, hyperparameter-optimization, evolutionary-search, architecture-search, python]
pricing: free
is_open_source: true
license: Apache-2.0
install_command: pip install pyglove

problem_solved: |
  Designing neural architectures and tuning hyperparameters manually is a trial-and-error process that requires extensive domain expertise and compute resources, often yielding suboptimal results. PyGlove provides a unified framework for AutoML that represents neural architectures and hyperparameters as manipulable Python objects, enabling developers to define and explore combinatorial search spaces with evolutionary algorithms, genetic programming, and reinforcement learning — all with distributed execution and built-in experiment tracking.

use_cases:
  - Evolve neural network architectures automatically with genetic programming and mutation operators
  - Search hyperparameter spaces for deep learning models using evolutionary and RL-based optimization strategies
  - Define complex, multi-objective AutoML pipelines that optimize for accuracy, latency, and model size simultaneously
  - Distribute architecture search across multiple workers and accelerators with built-in parallelism support
  - Compare and visualize search results with integrated experiment logging and reward curve analysis
