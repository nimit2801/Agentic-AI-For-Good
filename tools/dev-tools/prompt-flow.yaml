name: Prompt Flow
description: Prompt Flow is a comprehensive development suite from Microsoft for building high-quality LLM applications. It provides visual flow design, prompt engineering, evaluation metrics, and production deployment tools for prototyping, testing, and monitoring LLM apps.
tagline: Build high-quality LLM apps from prototyping to production deployment
category: Dev Tools
pricing: free
is_open_source: true
license: MIT
github_url: https://github.com/microsoft/promptflow
website_url: https://microsoft.github.io/promptflow/
docs_url: https://microsoft.github.io/promptflow/
install_command: pip install promptflow promptflow-tools
problem_solved: Building production-ready LLM applications requires iterating on prompts, evaluating outputs, managing connections, and deploying flows reliably. Prompt Flow provides an integrated development environment with visual flow design, automated evaluation, and managed deployment for the full LLM app lifecycle.
use_cases:
  - Design and prototype LLM workflows using a visual drag-and-drop flow editor
  - Evaluate prompt quality with automated metrics and human feedback loops
  - Manage API connections and secrets for OpenAI, Azure, and other model providers
  - Deploy flows to production with built-in monitoring and A/B testing support
tags:
  - python
  - llm
  - prompt-engineering
  - evaluation
  - deployment
  - microsoft
