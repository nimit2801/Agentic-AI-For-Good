name: Reflex
description: An open-source Python framework for building and deploying reactive web apps with a pure Python frontend and backend, letting AI teams ship interactive demos and dashboards without writing JavaScript.
tagline: Build reactive web apps in pure Python

github_url: https://github.com/reflex-dev/reflex
website_url: https://reflex.dev
docs_url: https://reflex.dev/docs

install_command: pip install reflex

category: Dev Tools
tags: [web-framework, python, reactive, dashboard, full-stack, app-development]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  AI practitioners who build models and pipelines in Python often struggle to create 
  interactive web UIs for demos, internal dashboards, and customer-facing tools because 
  they lack frontend development skills. Reflex provides a reactive, state-driven web 
  framework where both frontend and backend are written in pure Python — with automatic 
  state syncing, real-time updates, and one-command deployment — eliminating the 
  JavaScript gap from AI tool development.

use_cases:
  - Ship interactive AI demos with real-time streaming outputs, parameter sliders, and file upload UIs in hours instead of days
  - Build internal dashboards for monitoring model performance, experiment tracking, and dataset exploration with live updates
  - Create multi-user AI tools where collaborators can interact with shared model state and see results update across sessions
  - Deploy data labeling tools and annotation interfaces that run entirely in the browser with a Python-only codebase
