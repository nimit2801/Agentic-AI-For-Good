name: Supermaven
description: >
  Supermaven is an AI code completion tool that uses a 1 million token context window to provide
  the highest quality code completions. Designed for speed, it integrates as a copilot in VS Code,
  JetBrains IDEs, and Neovim with 3x lower latency than competitors.
problem_solved: >
  Developers spend significant time writing boilerplate code and navigating large codebases.
  Existing copilots often have small context windows and slow latency. Supermaven solves this by
  offering a 1M token context window and 3x faster response times, enabling developers to write
  code 2x faster with contextual suggestions across entire projects.
use_cases:
  - "AI-powered code completion inside VS Code and JetBrains IDEs"
  - "Contextual suggestions across large codebases using a 1M token context window"
  - "Chat interface for debugging, refactoring, and generating code diffs with hotkey-driven workflow"
github_url: https://github.com/supermaven-inc/supermaven-nvim
website_url: https://supermaven.com
docs_url: https://supermaven.com/download
install_command: code --install-extension Supermaven.supermaven
tagline: "The fastest copilot for AI code completion"
tags:
  - dev-tools
  - code-completion
  - copilot
  - ide-extension
  - ai-assistant
  - developer-productivity
pricing: freemium
is_open_source: false
license: Proprietary
