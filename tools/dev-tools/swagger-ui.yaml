name: Swagger UI
description: "A collection of HTML, JavaScript, and CSS assets that dynamically generate beautiful, interactive API documentation from any Swagger or OpenAPI specification, with live request execution and schema exploration."
tagline: "Interactive API documentation from OpenAPI specs"
github_url: https://github.com/swagger-api/swagger-ui
website_url: https://swagger.io/tools/swagger-ui
docs_url: https://swagger.io/docs/open-source-tools/swagger-ui
install_command: npm install swagger-ui-dist
category: Dev Tools
tags:
  - api-documentation
  - openapi
  - swagger
  - interactive-docs
  - developer-experience
pricing: free
is_open_source: true
license: Apache-2.0
problem_solved: "Swagger UI solves the API documentation problem by turning any OpenAPI spec into an interactive, explorable web page where developers can read endpoints, see request/response schemas, and execute live API calls — all without building custom documentation or maintaining separate docs that drift from the implementation."
use_cases:
  - "Host interactive API documentation on your website that lets users test endpoints with real requests"
  - "Embed Swagger UI in internal developer portals for microservice API exploration and debugging"
  - "Generate live documentation from OpenAPI specs during CI builds and deploy to a docs subdomain"
  - "Use the Try It Out feature for ad hoc API testing without leaving the browser or installing tools"
  - "Customize the UI theme and branding to match your company's developer experience portal"
