name: PyTorch Geometric (PyG)
description: >
  PyG (PyTorch Geometric) is a library built upon PyTorch to easily write
  and train Graph Neural Networks (GNNs) for a wide range of applications
  related to structured data. It provides methods for deep learning on
  graphs and irregular structures, mini-batch loaders for small and giant
  graphs, multi-GPU support, torch.compile support, common benchmark
  datasets, and transforms for learning on graphs, 3D meshes, and point
  clouds.
tagline: Graph Neural Network Library for PyTorch
problem_solved: >
  Traditional deep learning frameworks are designed for regular grid-like
  data (images, text, audio) and cannot natively handle graph-structured
  or irregular data. PyTorch Geometric solves this by providing a
  comprehensive library built on PyTorch that enables researchers and
  developers to easily build, train, and deploy Graph Neural Networks on
  relational, graph-structured, and geometric data, with built-in support
  for message passing, graph convolutions, neighbor sampling, heterogeneous
  graphs, and scalable distributed training on large graphs.
use_cases:
  - Social network analysis and recommendation systems using user-item graph interactions
  - Drug discovery and molecular property prediction from graph representations of molecules
  - Point cloud processing and 3D computer vision for autonomous driving and robotics
  - Citation network analysis and node classification for knowledge graph reasoning
github_url: https://github.com/pyg-team/pytorch_geometric
website_url: https://pyg.org/
docs_url: https://pytorch-geometric.readthedocs.io/en/latest/
install_command: pip install torch_geometric
category: Dev Tools
