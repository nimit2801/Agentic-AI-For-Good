name: Sourcery
description: >-
  Sourcery is an AI code review assistant that automatically reviews every pull request on any
  GitHub repository, providing instant feedback, summaries, and line-by-line suggestions. It also
  works as an IDE coding assistant — helping you understand code, add tests, write docstrings, and
  optimize for readability or performance directly in your editor.
tagline: Instant AI code reviews for every PR

github_url: https://github.com/sourcery-ai/sourcery
website_url: https://sourcery.ai
docs_url: https://docs.sourcery.ai

category: Dev Tools
tags:
  - code-review
  - ai-assistant
  - pull-requests
  - developer-productivity
  - code-quality
pricing: freemium
is_open_source: false
license: Proprietary

problem_solved: >-
  Code review is a bottleneck in every development workflow. Human reviewers are expensive, slow,
  and inconsistent — especially for routine style issues, missing edge cases, and insufficient test
  coverage. Sourcery solves this by providing instant, consistent AI-powered reviews on every pull
  request, summarizing the changes, offering actionable feedback, and flagging potential issues
  before a human reviewer ever looks at the diff.

use_cases:
  - "Automatically review every PR in your repository with instant feedback on code quality and correctness"
  - "Get AI-powered line-by-line suggestions and high-level architectural feedback on each change"
  - "Use Sourcery as an IDE pair programmer to understand legacy code, generate unit tests, and refactor"
  - "Speed up the review cycle by catching obvious issues before they reach human reviewers"
  - "Maintain consistent code quality standards across large teams and multiple repositories"
