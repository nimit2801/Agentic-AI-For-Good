name: Warp
description: A modern, Rust-based terminal emulator with GPU-accelerated rendering, intelligent auto-completions, AI-powered command generation, and collaborative editing for developers.
tagline: The terminal for the AI age — fast, smart, and collaborative

github_url: https://github.com/warpdotdev/Warp
website_url: https://www.warp.dev
docs_url: https://docs.warp.dev

install_command: brew install --cask warp

category: Dev Tools
tags: [terminal, rust, developer-tools, gpu-accelerated, ai, productivity, shell, collaboration]
pricing: freemium
is_open_source: true
license: AGPL-3.0

problem_solved: |
  Traditional terminals are relics from the 1970s — single-process, no syntax highlighting,
  no autocomplete, no way to browse command history visually. Developers spend hours typing
  the same commands, debugging shell syntax errors, and scrolling through endless terminal
  history. Warp rebuilds the terminal from scratch in Rust with GPU-accelerated rendering
  for smooth performance, intelligent command autocomplete that learns your patterns,
  AI-powered natural language to shell command translation, and shared sessions for
  collaborative debugging. It feels like a modern IDE for the command line.

use_cases:
  - Describe what you want to do in natural language and Warp generates the correct shell command instantly
  - Browse, search, and edit shell command history with a visual editor instead of scrolling blindly with arrow keys
  - Share a live terminal session with team members for collaborative debugging and pair programming
  - Use intelligent autocomplete that suggests commands, flags, and arguments based on your usage patterns
  - Organize commands into workflows and notebooks that combine shell commands with markdown documentation
