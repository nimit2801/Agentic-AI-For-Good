name: OpenAPI Generator
description: "An automatic API client and server stub generator that builds SDKs, server stubs, documentation, and configuration files from any OpenAPI Specification (v2 or v3) for 50+ programming languages."
tagline: "Generate API clients, server stubs, and docs from OpenAPI specs"
github_url: https://github.com/OpenAPITools/openapi-generator
website_url: https://openapi-generator.tech
docs_url: https://openapi-generator.tech/docs/installation
install_command: npm install -g @openapitools/openapi-generator-cli
category: Dev Tools
tags:
  - api-generation
  - openapi
  - sdk
  - code-generation
  - documentation
  - rest-api
pricing: free
is_open_source: true
license: Apache-2.0
problem_solved: "OpenAPI Generator eliminates the tedious work of writing API client SDKs and server stubs by hand. Given an OpenAPI spec, it generates typed, idiomatic clients for 50+ languages, matching server stubs, interactive docs, and config files — all from a single declarative schema that stays in sync with the API."
use_cases:
  - "Generate a type-safe TypeScript API client from an OpenAPI spec in seconds"
  - "Create matching server stubs in Python, Java, Go, or Ruby from the same API contract"
  - "Keep API documentation automatically in sync with the implementation via spec-first development"
  - "Build SDKs for multiple platforms (iOS, Android, web, backend) from a single OpenAPI definition"
  - "Validate and lint OpenAPI specs before generating production client libraries"
