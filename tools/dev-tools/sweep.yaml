name: Sweep
description: An AI coding assistant for JetBrains IDEs that helps developers write, refactor, and understand code through natural language prompts and automated code suggestions.
tagline: AI coding assistant for JetBrains

github_url: https://github.com/sweepai/sweep
website_url: https://sweep.dev

install_command: "Install from JetBrains Marketplace (Plugin ID: 26275-sweep-ai)"

category: Dev Tools
tags: [jetbrains, coding-assistant, ai-code, developer-tools, ide-plugin, code-generation, refactoring]
pricing: freemium
is_open_source: false
license: Proprietary

problem_solved: |
  JetBrains IDE users lack deep AI integration that understands their project context, codebase structure, and coding patterns. Sweep brings AI-powered code generation, refactoring, and documentation directly into the JetBrains workflow, enabling developers to write and modify code using natural language without leaving their IDE — with context-aware suggestions that respect existing code style and architecture.

use_cases:
  - "Code generation: generate functions, classes, and entire files from natural language descriptions inside JetBrains IDEs"
  - "AI-powered refactoring: rename variables, extract methods, and restructure code with context-aware suggestions"
  - "Code review assistance: get AI-generated code reviews and improvement suggestions for open pull requests"
  - "Documentation generation: automatically generate Javadoc, KDoc, and inline comments for existing code"
  - "Bug detection: identify potential bugs and security issues with AI-powered static analysis suggestions"
  - "Unit test generation: create comprehensive unit tests for existing code with a single prompt"
