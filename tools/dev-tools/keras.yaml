name: Keras
description: A high-level, multi-backend deep learning API that runs on JAX, TensorFlow, PyTorch, and OpenVINO, enabling rapid model development for computer vision, NLP, audio processing, and time-series forecasting with minimal code.
tagline: Multi-backend deep learning framework for humans

github_url: https://github.com/keras-team/keras
website_url: https://keras.io
docs_url: https://keras.io/getting_started
install_command: pip install keras

category: Dev Tools
tags: [deep-learning, machine-learning, python, jax, pytorch, tensorflow, neural-networks]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Building deep learning models often requires verbose, framework-specific boilerplate for model
  definition, training loops, and deployment, making rapid iteration costly. Keras provides a
  clean, high-level API that abstracts away backend complexity — supporting JAX, TensorFlow, and
  PyTorch interchangeably — so developers can define, train, and export models without committing
  to a single deep learning framework or rewriting code when switching backends.

use_cases:
  - Build and train computer vision models with convolutional and transformer architectures
  - Fine-tune large language and multimodal models using a consistent high-level API
  - Prototype and iterate on neural network architectures with a readable, composable model API
  - Export trained models across JAX, TensorFlow, PyTorch, and OpenVINO runtimes
  - Train and deploy models at scale on GPU and TPU hardware with minimal code changes
