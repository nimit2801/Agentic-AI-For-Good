name: Bisheng
description: An open-source LLM devops platform for building enterprise AI applications. Provides a complete suite for GenAI workflow orchestration, RAG pipeline management, agent development, model fine-tuning, and LLM operations with a visual builder interface and production monitoring.
tagline: Open-source LLM devops platform for enterprise AI applications

github_url: https://github.com/dataelement/bisheng
website_url: https://bisheng.cn
docs_url: https://bisheng.cn/docs

install_command: |
  docker compose up -d

category: Dev Tools
tags: [llm, devops, enterprise, rag, workflow, pipeline, agent, fine-tuning, monitoring, visual-builder]
pricing: freemium
is_open_source: true
license: Apache-2.0

problem_solved: |
  Building production LLM applications requires integrating multiple capabilities — RAG pipelines, agent orchestration, model deployment, prompt management, monitoring, and fine-tuning — across different tools with inconsistent APIs and no unified operations view. Bisheng provides an all-in-one LLM devops platform with a drag-and-drop workflow builder, built-in RAG engine, agent framework, model management, and production observability, reducing the effort to go from prototype to production deployment.

use_cases:
  - "Build visual RAG pipelines with document ingestion, chunking, embedding, and retrieval without writing code"
  - "Orchestrate multi-step LLM workflows connecting knowledge bases, APIs, and AI models in a drag-and-drop interface"
  - "Manage multiple LLM models, track prompts, and monitor production inference performance from a single console"
  - "Fine-tune open-source models on enterprise data with built-in training pipeline management and experiment tracking"
  - "Deploy and monitor AI applications with production-grade logging, alerting, and usage analytics dashboards"
