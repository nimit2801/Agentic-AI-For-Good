name: CodeWhisperer
description: >-
  Amazon CodeWhisperer is an AI-powered code generation service from AWS that
  provides real-time code suggestions in the IDE based on natural language comments
  and surrounding code context. It supports multiple languages and IDEs, includes
  built-in security vulnerability scanning, and is designed to generate code that
  follows AWS best practices for cloud and API usage. Now integrated into Amazon Q
  Developer.
tagline: AWS-powered AI code generation with built-in security scanning

website_url: https://aws.amazon.com/codewhisperer
docs_url: https://docs.aws.amazon.com/codewhisperer

install_command: "Install AWS Toolkit IDE extension from AWS Toolkit marketplace"

category: Dev Tools
tags:
  - code-generation
  - aws
  - ai-coding
  - security-scanning
  - ide-extension
  - developer-tools
pricing: freemium
is_open_source: false
license: Proprietary

problem_solved: |-
  Developers building on AWS need code suggestions that understand AWS services,
  APIs, and security best practices — which generic AI code assistants often miss.
  CodeWhisperer solves this by providing an AI code generator that's specifically
  trained on AWS-optimized code patterns, making it particularly valuable for cloud
  development. It also includes built-in security scanning that flags vulnerabilities
  like OWASP Top 10 issues as you type, combining code generation with proactive
  security feedback in a single tool.

use_cases:
  - "Generate AWS SDK code, CloudFormation templates, and Lambda functions that follow AWS best practices"
  - "Get real-time code suggestions with built-in security vulnerability scanning as you type"
  - "Accelerate cloud-native development with AI that understands AWS service APIs and IAM patterns"
  - "Write infrastructure as code with AI assistance for CDK, CloudFormation, and Terraform on AWS"
  - "Onboard to AWS development faster with context-aware code generation for common cloud patterns"
