name: OpenVINO
description: >
  OpenVINO™ is an open-source toolkit for optimizing and deploying AI inference
  across Intel hardware. It boosts deep learning performance in computer vision,
  NLP, automatic speech recognition, and generative AI. The toolkit supports
  models from PyTorch, TensorFlow, ONNX, and more, enabling efficient deployment
  from edge devices to the cloud.
tagline: Optimize and deploy AI inference across Intel hardware from edge to cloud
problem_solved: >
  Deploying deep learning models to production is challenging because training
  frameworks and target hardware are mismatched, leading to poor performance and
  high latency. OpenVINO solves this by providing a unified toolkit that
  optimizes, converts, and accelerates AI inference across CPUs, GPUs, NPUs, and
  other devices — reducing latency, improving throughput, and shrinking model
  size without sacrificing accuracy.
use_cases:
  - Computer vision inference at the edge for smart cities, retail, and industrial inspection
  - LLM-powered chatbots and conversational AI with optimized inference on Intel hardware
  - Automatic speech recognition using Whisper and other ASR models
  - Generative AI pipelines including text-to-image and multimodal assistants
  - Low-latency recommendation system inference at production scale
github_url: https://github.com/openvinotoolkit/openvino
website_url: https://docs.openvino.ai
docs_url: https://docs.openvino.ai
install_command: pip install -U openvino
category: Dev Tools
