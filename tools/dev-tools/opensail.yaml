pricing: free
is_open_source: true
license: Apache-2.0
use_cases:
  - Building and deploying AI agent workflows with scheduling, webhooks, and Slack triggers
  - Creating multi-step automations with approval gates, budget limits, and audit logging
  - Running portable AI workspaces that sleep when idle and resume with full state
  - Connecting business systems like Slack, Linear, GitHub, and Salesforce to agent workflows
  - Publishing and sharing reusable agent workflows as installable apps within a team
