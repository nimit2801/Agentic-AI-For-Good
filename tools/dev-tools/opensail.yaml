name: OpenSail
tagline: Open platform for building, running, and sharing AI workflows and agents
description: |-
  OpenSail is an open-source alternative to Codex App, Claude Desktop, and Cursor for agentic software work. It provides a platform for building, running, and sharing AI workflows, apps, agents, and automations with portable workspace snapshots, approval gates, budget limits, and Kubernetes-native deployment. Supports scheduling, webhooks, Slack integration, and multi-agent orchestration.
problem_solved: |-
  Building production-ready AI agents and workflows requires integrating multiple systems — scheduling, approval gates, budget controls, permissions, audit logging, and state management — which most agent frameworks leave as an exercise for the developer. OpenSail provides a complete open platform with portable workspaces, built-in connectors, and Kubernetes-native deployment that turns AI experiments into durable, team-ready software.
github_url: https://github.com/TesslateAI/OpenSail
website_url: https://docs.tesslate.com
docs_url: https://docs.tesslate.com
category: Dev Tools
tags:
