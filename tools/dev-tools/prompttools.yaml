name: PromptTools
tagline: Open-source toolkit for experimenting with prompts, LLMs, and vector databases
description: |-
  PromptTools provides a set of open-source, self-hostable tools for experimenting with, testing, and evaluating LLMs, vector databases, and prompts. Developers can test prompts and parameters across different models — OpenAI, Anthropic, LLaMA — and evaluate vector database retrieval accuracy using familiar code, notebooks, or a local playground interface.
problem_solved: |-
  Evaluating LLM prompts and model performance across different providers requires repetitive manual testing with inconsistent tooling. PromptTools solves this with a unified Python API that lets developers run systematic experiments across models, parameters, and vector databases — then visualize results — all from code, notebooks, or a local playground without relying on external evaluation services.
github_url: https://github.com/hegelai/prompttools
website_url: https://hegel-ai.com
docs_url: http://prompttools.readthedocs.io
install_command: pip install prompttools
category: Dev Tools
tags:
  - prompt-engineering
  - evaluation
  - experimentation
  - llm-testing
  - vector-database
pricing: free
is_open_source: true
license: Apache-2.0
use_cases:
  - Testing and comparing LLM responses across models, temperatures, and system prompts in code
  - Evaluating vector database retrieval accuracy with configurable embedding models and queries
  - Visualizing experiment results with built-in charting for quick performance comparisons
  - Running prompt experiments in Jupyter notebooks for interactive analysis
  - Self-hosting a prompt evaluation playground without sending data to external services
