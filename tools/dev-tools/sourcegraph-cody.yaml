name: Sourcegraph Cody
description: >-
  Cody is an AI code assistant from Sourcegraph that uses advanced codebase search
  and indexing to provide context-aware code generation, explanation, refactoring,
  and bug fixing. It understands your entire codebase — not just the file you have
  open — by leveraging Sourcegraph's code search and intelligence platform, making
  its suggestions deeply informed by your project's architecture, patterns, and APIs.
tagline: AI code assistant powered by Sourcegraph code intelligence

github_url: https://github.com/sourcegraph/cody-vs
website_url: https://sourcegraph.com/cody
docs_url: https://docs.sourcegraph.com/cody

install_command: "Install from VS Code Marketplace (extension ID: sourcegraph.cody-ai)"

category: Dev Tools
tags:
  - ai-coding
  - code-generation
  - code-search
  - code-intelligence
  - vscode-extension
  - developer-tools
pricing: freemium
is_open_source: false
license: Proprietary

problem_solved: |-
  Most AI code assistants only see the file you are currently editing, missing the
  broader context of your codebase — dependencies, API contracts, architectural
  patterns, and historical decisions. Cody solves this by integrating with Sourcegraph's
  code intelligence platform, which indexes your entire codebase across all repositories.
  This means Cody's suggestions, explanations, and refactors are grounded in your actual
  project structure and conventions, not just the code in your current tab.

use_cases:
  - "Ask questions about your codebase and get answers that reference actual functions, types, and APIs in your project"
  - "Generate code that follows your project's established patterns and conventions across multiple files"
  - "Get context-aware code reviews that understand your architecture and detect issues across repository boundaries"
  - "Automate refactoring with AI that understands API contracts and callers across your entire codebase"
  - "Onboard to unfamiliar codebases by asking Cody to explain how components, services, and data flows work"
