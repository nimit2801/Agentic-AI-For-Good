name: Middleware
description: Middleware is an open-source engineering management platform that measures and analyzes team effectiveness using DORA metrics. It tracks deployment frequency, lead time for changes, mean time to restore, and change failure rate by connecting to GitHub, GitLab, and other DevOps tools.
tagline: Open-source DORA metrics platform for engineering teams

github_url: https://github.com/middlewarehq/middleware
website_url: https://www.middlewarehq.com
docs_url: https://docs.middlewarehq.com

category: Dev Tools
tags: [dora-metrics, engineering-productivity, devops, analytics, github, gitlab, developer-tools]
pricing: freemium
is_open_source: true
license: Apache-2.0

problem_solved: |
  Engineering leaders lack visibility into their team's delivery performance, making it hard to identify bottlenecks and measure improvement. Middleware automatically collects DORA metrics from version control and CI/CD tools, providing dashboards and insights on deployment frequency, lead time, restore time, and failure rate without manual data gathering.

use_cases:
  - Track team DORA metrics automatically from GitHub and GitLab without manual data entry or complex setup
  - Identify delivery bottlenecks by analyzing deployment frequency, lead time, change failure rate, and MTTR trends
  - Generate engineering performance reports for retrospectives, standups, and quarterly planning
  - Set up automated notifications when key metrics cross threshold targets
  - Compare team performance across projects with standardized, normalized metrics
