name: Node-RED
description: "Node-RED is a low-code, flow-based programming tool for wiring together hardware devices, APIs, and online services. It provides a browser-based flow editor where users create event-driven applications by connecting pre-built nodes — making it ideal for integrating AI models, LLM APIs, IoT data pipelines, and web services into automated workflows without writing boilerplate code."
tagline: "Low-code flow-based programming for event-driven AI workflows"
github_url: https://github.com/node-red/node-red
website_url: https://nodered.org
docs_url: https://nodered.org/docs
install_command: npm install -g node-red
category: Dev Tools
tags:
  - low-code
  - workflow-automation
  - iot
  - api-integration
  - data-pipeline
pricing: free
is_open_source: true
license: Apache-2.0
problem_solved: |
  Integrating AI models into production workflows typically requires stitching together API calls, event processors, database operations, and notification services — often resulting in fragile glue code that's hard to maintain or modify. Node-RED solves this with an intuitive flow-based programming environment where users visually wire together pre-built nodes for HTTP requests, databases, cloud services, MQTT, WebSockets, and AI APIs. Flows can be deployed instantly to production on the built-in runtime, and the extensive community library provides thousands of ready-made nodes for connecting to virtually any service.
use_cases:
  - "Build automated AI inference pipelines by wiring together LLM API calls with data preprocessing and result storage"
  - "Create IoT data flows that send sensor data through ML models for real-time anomaly detection and alerts"
  - "Develop webhook-based integrations between AI services, databases, and messaging platforms without writing code"
  - "Prototype and deploy event-driven workflows that react to API calls, timers, or database changes with minimal setup"
