name: Dify
description: Dify is an open-source LLM app development platform. Its intuitive interface combines AI workflow, RAG pipeline, agent capabilities, model management, observability features and more, letting you quickly go from prototype to production.
tagline: Production-ready platform for agentic workflow development

github_url: https://github.com/langgenius/dify
website_url: https://dify.ai
docs_url: https://docs.dify.ai

category: Dev Tools
tags: [ai-agent, workflow-builder, rag, llm, no-code, low-code, open-source, docker, mcp, observability]
pricing: freemium
is_open_source: true
license: Apache-2.0

problem_solved: |
  Engineering teams waste months stitching together separate tools for AI workflows,
  RAG retrieval, agent orchestration, and observability. Dify unifies these into one
  visual platform with built-in model management and MCP integrations, cutting
  time-to-production from months to days.

use_cases:
  - Enterprise knowledge-base Q&A bots serving thousands of employees across departments
  - AI customer-support agents with multi-step tool calling and RAG retrieval
  - Visual workflow automation for content generation and data processing pipelines
