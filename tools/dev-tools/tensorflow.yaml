name: TensorFlow
description: An open-source end-to-end machine learning framework for building, training, and deploying ML models across CPUs, GPUs, and TPUs, with production-ready serving capabilities and a mature ecosystem of tools.
tagline: End-to-end open-source machine learning framework

github_url: https://github.com/tensorflow/tensorflow
website_url: https://tensorflow.org
docs_url: https://www.tensorflow.org/api_docs
install_command: pip install tensorflow

category: Dev Tools
tags: [machine-learning, deep-learning, python, tensorflow, neural-networks, gpu, training, inference]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Building and deploying machine learning models requires a unified framework for data pipeline
  construction, model training, distributed computing, and production serving. TensorFlow provides
  an end-to-end platform with eager execution, automatic differentiation, Keras integration, TFX
  for production pipelines, TensorFlow Serving for model deployment, and TensorFlow Lite for
  mobile devices — giving teams a single stack that covers experimentation through deployment.

use_cases:
  - Train deep neural networks for computer vision, NLP, and generative AI across GPU and TPU clusters
  - Deploy trained models to production using TensorFlow Serving, TF Lite, and TF.js for web
  - Build data preprocessing pipelines using tf.data for efficient input loading at scale
  - Develop and experiment with custom model architectures using eager execution and Keras APIs
  - Run distributed training across multiple GPUs and machines with tf.distribute.Strategy
