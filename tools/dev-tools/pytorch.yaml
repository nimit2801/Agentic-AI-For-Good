name: PyTorch
description: An open-source deep learning framework for tensor computation, automatic differentiation, and training neural networks on CPUs and GPUs, widely used for research, production systems, and model development.
tagline: Train and deploy deep learning models with a flexible Python framework

github_url: https://github.com/pytorch/pytorch
website_url: https://pytorch.org/
docs_url: https://docs.pytorch.org/docs/stable/index.html
install_command: pip3 install torch torchvision

category: Dev Tools
tags: [deep-learning, machine-learning, tensor, autograd, gpu, python, neural-networks, training]
pricing: free
is_open_source: true
license: BSD-3-Clause

problem_solved: |
  Training and iterating on machine learning systems requires fast tensor operations, gradient
  computation, hardware acceleration, and a developer-friendly programming model. PyTorch provides
  one framework for building, training, and optimizing neural networks with automatic
  differentiation and strong GPU support, reducing the amount of custom infrastructure teams need
  to move from experimentation to real model development workflows.

use_cases:
  - Train computer vision models for classification, detection, and segmentation tasks
  - Build and fine-tune transformer models for NLP and generative AI workloads
  - Develop speech and audio models with GPU-accelerated tensor operations and autograd
  - Prototype reinforcement learning agents with flexible model definition and training loops
  - Run research experiments that need rapid iteration on custom neural network architectures
