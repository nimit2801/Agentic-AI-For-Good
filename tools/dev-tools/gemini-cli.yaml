name: Gemini CLI
description: Google's open-source AI agent for the terminal that brings Gemini's capabilities directly to your command line. Provides code generation, explanation, debugging, file manipulation, and conversation — all running locally with optional cloud-backed reasoning and context up to the full Gemini context window.
tagline: Google's official AI agent for your terminal

github_url: https://github.com/google-gemini/gemini-cli
website_url: https://geminicli.com
docs_url: https://geminicli.com/docs

install_command: npm install -g @google/gemini-cli

category: Dev Tools
tags: [cli, ai-assistant, code-generation, google, gemini, terminal, agent]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Developers want an AI assistant that works directly in their terminal without switching
  to a web interface or IDE plugin — but most CLI AI tools are either limited in capabilities
  or closed-source. Gemini CLI solves this by providing an open-source terminal agent with
  full Gemini model access (including its million-token context window), file editing, code
  generation, shell command execution, and multi-turn conversation — all from the command
  line. It can read and understand large codebases, generate and modify files, and answer
  questions about your project without uploading code to external services unnecessarily.

use_cases:
  - Generate code, fix bugs, and explain complex code directly from the terminal without switching contexts
  - Understand large codebases by asking questions with Gemini's million-token context window
  - Perform file operations (read, write, edit) through natural language commands in the terminal
  - Debug build failures, test errors, and runtime issues with AI-guided troubleshooting
  - Automate repetitive terminal tasks by describing them in natural language to the agent
