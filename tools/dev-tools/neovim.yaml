name: Neovim
description: "A hyper-extensible Vim-based text editor focused on modern development workflows with Lua scripting, built-in LSP client, treesitter syntax highlighting, LuaJIT performance, and a rich plugin ecosystem."
tagline: "Modern, extensible Vim-based code editor for developers"
github_url: https://github.com/neovim/neovim
website_url: https://neovim.io
docs_url: https://neovim.io/doc
install_command: brew install neovim
category: Dev Tools
tags:
  - editor
  - ide
  - lua
  - lsp
  - terminal
  - vim
pricing: free
is_open_source: true
problem_solved: "Neovim solves the editor extensibility gap by providing a fully modernized Vim foundation with native Lua scripting, asynchronous plugin execution, a built-in LSP client for language-aware editing, treesitter-based syntax highlighting, and a floating window API — enabling a terminal-based editor experience that rivals GUI IDEs in capability while staying keyboard-native."
use_cases:
  - "Edit code with language-aware autocompletion, go-to-definition, and diagnostics via the built-in LSP client"
  - "Build custom editor workflows and plugins entirely in Lua without learning Vimscript"
  - "Use treesitter for accurate, incremental syntax highlighting and code navigation in any language"
  - "Manage a fully customized IDE-like environment with lazy-loaded plugins for minimal startup time"
  - "Collaborate on code remotely via SSH or tmux with a fast, keyboard-driven terminal editor"
