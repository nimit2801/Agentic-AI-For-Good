name: Dash by Plotly
description: >
  Dash is the most downloaded, trusted Python framework for building ML and
  data science web apps. Built on top of Plotly.js, React, and Flask, Dash
  ties modern UI elements like dropdowns, sliders, and graphs directly to
  your analytical Python code — no JavaScript required. It enables data
  scientists and engineers to turn analytical work into production-ready,
  interactive web applications rapidly.
tagline: Build interactive data apps and dashboards in pure Python, no JavaScript required
problem_solved: >
  Data scientists and analysts often lack the web development skills needed
  to share their insights interactively. Dash solves this by providing a
  low-code Python framework that lets anyone build rich, interactive web
  dashboards and data apps without writing JavaScript, HTML, or CSS,
  bridging the critical gap between data analysis and application deployment
  for teams and organizations.
use_cases:
  - Create interactive business intelligence dashboards for KPI tracking
  - Build ML model monitoring and visualization interfaces for data science teams
  - Develop real-time data exploration tools for scientific and academic research
  - Deploy internal analytics applications for organizational decision-making
github_url: https://github.com/plotly/dash
website_url: https://dash.plotly.com/
docs_url: https://dash.plotly.com/
install_command: pip install dash
category: Dev Tools
tags:
