problem_solved: |
  JetBrains IDE users who want AI-powered code assistance face fragmentation — most AI coding
  tools are built for VS Code or terminal-based workflows, leaving JetBrains users with fewer
  options. Sweep AI solves this as a native JetBrains plugin that brings AI code generation,
  refactoring, and code understanding directly into the IDE. It understands project context,
  suggests multi-line code completions, can refactor existing code, and explains complex code
  sections. For developers who prefer JetBrains IDEs, Sweep provides the same class of AI
  assistance available on other platforms, integrated naturally into the JetBrains workflow
  without leaving the editor.

use_cases:
  - Generate code implementations from natural language descriptions directly in JetBrains IDEs
  - Refactor existing code to improve structure, performance, or readability with AI guidance
  - Get explanations for complex code sections to accelerate onboarding and code review
  - Automate boilerplate code generation for common patterns and frameworks
  - Search and navigate large codebases using natural language queries within the IDE
