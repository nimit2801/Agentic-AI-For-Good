name: OR-Tools
description: Google's open-source optimization suite for solving combinatorial optimization problems including constraint programming, linear programming, vehicle routing, and integer programming at scale. It provides Python, C++, and Java APIs with interfaces to commercial and open-source solvers.
tagline: Open-source optimization toolkit for combinatorial and constraint programming

github_url: https://github.com/google/or-tools
website_url: https://developers.google.com/optimization
docs_url: https://developers.google.com/optimization/introduction

category: Dev Tools
tags: [optimization, constraint-programming, operations-research, linear-programming, vehicle-routing, scheduling]
pricing: free
is_open_source: true
license: Apache-2.0
install_command: pip install ortools

problem_solved: |
  AI systems often need to make optimal decisions under constraints — scheduling resources, routing vehicles, assigning workers, or planning product mixes — but building custom optimization solvers from scratch is prohibitively complex and time-consuming. OR-Tools provides battle-tested algorithms for constraint programming, linear and integer programming, vehicle routing, and network flow optimization with a consistent Python API, enabling developers to solve complex real-world optimization problems without building solvers from the ground up.

use_cases:
  - Solve vehicle routing problems with time windows, capacity constraints, and multiple depots for logistics optimization
  - Build constraint satisfaction models for employee scheduling, resource allocation, and production planning
  - Optimize supply chain decisions with mixed-integer linear programming for manufacturing and distribution
  - Solve knapsack, bin packing, and assignment problems for inventory and resource management
  - Integrate optimization models with ML pipelines for AI-driven planning and decision-making systems
