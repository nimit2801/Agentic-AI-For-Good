name: Streamlit
description: Open-source Python framework for turning scripts into interactive web apps and dashboards with widgets, charts, tables, and rapid iteration loops.
tagline: Build and share Python data apps without front-end boilerplate

github_url: https://github.com/streamlit/streamlit
website_url: https://streamlit.io/
docs_url: https://docs.streamlit.io/
install_command: pip install streamlit

category: Dev Tools
tags: [python, data-apps, dashboards, rapid-prototyping, machine-learning, web-ui]
pricing: freemium
is_open_source: true
license: Apache-2.0

problem_solved: |
  Data and ML teams often need a quick way to turn Python analyses, model outputs, and workflow
  controls into browser-based tools, but building a separate frontend and backend stack adds a lot
  of overhead. Streamlit lets teams ship interactive apps directly from Python so prototypes,
  demos, and internal utilities can be shared without full web app engineering.

use_cases:
  - Build internal dashboards for exploring datasets, metrics, and experiment outputs
  - Share interactive model demos with teammates, clients, or community users
  - Prototype AI workflow interfaces before investing in a custom frontend stack
  - Create lightweight annotation or review tools around Python-based ML pipelines
