name: SkyPilot
description: SkyPilot is an open-source framework for running, managing, and scaling AI workloads on any infrastructure. It provides a unified interface to access and manage compute across Kubernetes, Slurm, AWS, GCP, Azure, and 20+ other cloud and on-prem platforms.
tagline: Run, manage, and scale AI workloads on any AI infrastructure
category: Dev Tools
pricing: free
is_open_source: true
license: Apache-2.0
github_url: https://github.com/skypilot-org/skypilot
website_url: https://skypilot.co
docs_url: https://docs.skypilot.co
install_command: |
  # With uv (recommended):
  uv pip install "skypilot[kubernetes,aws,gcp,azure]"
  # Or with pip:
  # pip install skypilot
problem_solved: Managing AI compute across multiple cloud providers, Kubernetes clusters, and on-prem infrastructure requires learning vendor-specific APIs and dealing with complex configuration. SkyPilot unifies this by providing a single interface to launch and manage jobs across 20+ platforms with automatic failover and cost optimization.
use_cases:
  - Launch LLM training and inference jobs across multiple clouds with one command
  - Automatically find the cheapest available GPU instances across cloud providers
  - Manage spot instance preemptions with automatic checkpointing and recovery
  - Deploy distributed training clusters on Kubernetes or Slurm without manual setup
tags:
  - python
  - infrastructure
  - cloud
  - gpu
  - kubernetes
  - distributed
