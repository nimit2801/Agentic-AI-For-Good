name: DOMglyph

description: DOMglyph is a React-based AI-native design system that ships every component with a dual-layer contract — a visual layer for humans and a machine-readable semantic layer expressed via `data-ai-*` HTML attributes (id, role, action, state, screen, section, entity). It pairs the component library with a runtime inspection API (`window.__DOMGLYPH__`) so AI agents, automation scripts, and E2E tests can query available actions, form schemas, screen context, and recent events without scraping the DOM.

github_url: https://github.com/llcortex/DOMGlyph
website_url: https://domglyph.llcortex.ai
docs_url: https://domglyph.llcortex.ai/docs/introduction/what-is-cortexui
install_command: npm install @domglyph/components @domglyph/ai-contract @domglyph/runtime
tagline: UI that speaks to humans and machines — every component is a machine-readable contract.

