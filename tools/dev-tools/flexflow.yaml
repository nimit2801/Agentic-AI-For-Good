name: FlexFlow
description: A distributed deep learning framework for flexible task scheduling and resource management across GPU clusters, enabling automatic parallelism and optimized execution of large-scale models.
tagline: Distributed deep learning with automatic parallelism

github_url: https://github.com/flexflow/FlexFlow
website_url: https://flexflow.ai

category: Dev Tools
tags: [distributed-training, deep-learning, gpu, scheduling, parallelism, high-performance]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Training large deep learning models across multiple GPUs requires manual configuration of
  parallelism strategies, resource scheduling, and data pipelines. FlexFlow automatically
  discovers and applies the best parallelization strategy for a given model and cluster,
  reducing engineering overhead while maximizing hardware utilization and training throughput.

use_cases:
  - Automatically discover optimal parallelism strategies for multi-GPU model training
  - Schedule and manage deep learning jobs across heterogeneous GPU clusters
  - Reduce engineering effort required to scale model training from single to multi-node setups
  - Profile and optimize distributed training performance for large transformer models
  - Deploy production training pipelines with dynamic resource allocation and fault tolerance
