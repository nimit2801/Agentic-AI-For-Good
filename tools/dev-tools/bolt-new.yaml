name: Bolt.new
tagline: Prompt, run, edit, and deploy full-stack web applications directly from your browser with AI
description: |-
  Bolt.new is an AI-powered full-stack web development agent that lets you prompt, run, edit, and deploy applications directly from your browser using WebContainers. It eliminates local setup by running code securely in-browser while an AI agent handles coding, debugging, and deployment.
problem_solved: |-
  Building and deploying full-stack web apps requires significant environment setup and coding expertise. Bolt.new removes friction by letting anyone create, iterate, and deploy production-ready applications through natural language prompts — no local tooling or manual DevOps needed.
github_url: https://github.com/stackblitz/bolt.new
website_url: https://bolt.new
docs_url: https://support.bolt.new
install_command: npm create bolt@latest
category: Dev Tools
tags:
  - ai-web-app-builder
  - full-stack-development
  - ai-coding
  - webcontainers
  - no-code
pricing: freemium
is_open_source: true
license: MIT
use_cases:
  - "Rapid prototyping of web applications from natural language descriptions"
  - "Building full-stack apps with React, Vue, or Node.js without local setup"
  - "Debugging and editing existing projects through conversational AI"
  - "Deploying production-ready applications directly from the browser"
  - "Learning web development through AI-guided code generation"
