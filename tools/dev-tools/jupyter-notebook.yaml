name: Jupyter Notebook
description: An open-source web application for creating and sharing documents containing live code, equations, visualizations, and narrative text, supporting over 40 programming languages with an interactive computing environment.
tagline: Interactive computing across 40+ programming languages
category: Dev Tools
tags:
  - interactive-computing
  - notebook
  - data-science
  - python
  - visualization
  - education
  - reproducible-research
  - development
pricing: free
is_open_source: true
license: BSD-3-Clause
github_url: https://github.com/jupyter/notebook
website_url: https://jupyter.org
docs_url: https://docs.jupyter.org
install_command: pip install notebook
problem_solved: Data scientists and researchers lack a convenient environment to combine code execution, data visualization, and explanatory text in a single interactive document. Jupyter Notebook solves this by providing a web-based interface where users can write and execute code in cells, see results inline, and share complete reproducible analyses with rich formatting.
use_cases:
  - Performing exploratory data analysis with interactive code execution and inline visualizations
  - Creating reproducible research documents that combine code, equations, plots, and narrative text
  - Teaching programming and data science with interactive examples that students can modify and run
