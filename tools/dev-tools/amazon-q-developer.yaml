name: Amazon Q Developer
description: >-
  Amazon Q Developer is an AI-powered developer assistant from AWS that provides
  code generation, debugging, troubleshooting, and AWS expertise directly in the
  IDE and AWS Console. It combines the capabilities of CodeWhisperer with advanced
  conversational assistance, allowing developers to ask questions about AWS services,
  troubleshoot infrastructure, generate CloudFormation and CDK templates, and get
  context-aware code suggestions — all integrated with AWS account context.
tagline: AI developer assistant with deep AWS expertise

website_url: https://aws.amazon.com/q/developer/
docs_url: https://docs.aws.amazon.com/amazonq/

install_command: "Install AWS Toolkit IDE extension from AWS Toolkit marketplace"

category: Dev Tools
tags:
  - aws
  - ai-assistant
  - code-generation
  - cloud-development
  - developer-tools
  - troubleshooting
pricing: freemium
is_open_source: false
license: Proprietary

problem_solved: |-
  AWS developers need to navigate a vast ecosystem of services, APIs, and best
  practices — often requiring frequent context-switching between the IDE,
  documentation, and the AWS Console. Amazon Q Developer solves this by bringing
  AWS expertise directly into the development workflow. It answers questions about
  AWS services with account-aware context, generates infrastructure code that
  follows AWS best practices, helps troubleshoot deployment issues, and provides
  code suggestions optimized for AWS development — all without leaving the IDE.

use_cases:
  - "Get AWS-aware code suggestions and completions that understand your account services and resource configurations"
  - "Ask natural language questions about AWS architecture, pricing, and best practices with account-specific context"
  - "Generate CloudFormation, CDK, and Terraform templates for AWS infrastructure using conversational prompts"
  - "Troubleshoot deployment failures and AWS service issues with AI that can access your account state"
  - "Migrate and modernize applications with AI-assisted analysis of your existing AWS infrastructure and code"
