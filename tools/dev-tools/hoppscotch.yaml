name: Hoppscotch
description: "An open-source API development ecosystem that works offline — supporting REST, GraphQL, WebSocket, SSE, and gRPC via web app, desktop app, and CLI with cloud sync and team collaboration."
tagline: "Open-source API development ecosystem for REST, GraphQL, and more"
github_url: https://github.com/hoppscotch/hoppscotch
website_url: https://hoppscotch.io
docs_url: https://docs.hoppscotch.io
install_command: npm install -g @hoppscotch/cli
category: Dev Tools
tags:
  - api-testing
  - graphql
  - websocket
  - rest-client
  - collaboration
  - open-source
pricing: freemium
is_open_source: true
license: MIT
problem_solved: "Hoppscotch solves API development fragmentation by providing a single open-source platform for REST, GraphQL, WebSocket, SSE, and gRPC requests — all accessible via web, desktop, or CLI without requiring an account. It eliminates the lock-in of proprietary API clients while supporting team collaboration and cloud sync."
use_cases:
  - "Quickly test REST and GraphQL API endpoints from the browser without installing any software"
  - "Debug real-time WebSocket and Server-Sent Events connections with a visual interface"
  - "Build and share API collections with team members using cloud-synced workspaces"
  - "Automate API tests in CI/CD pipelines using the Hoppscotch CLI runner"
  - "Use offline in air-gapped environments with the fully self-contained desktop application"
