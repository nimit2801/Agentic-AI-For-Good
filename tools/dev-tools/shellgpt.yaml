name: ShellGPT
description: A command-line productivity tool powered by large language models that generates shell commands, code snippets, and comments directly from natural language descriptions in the terminal.
tagline: AI-powered command-line productivity tool

github_url: https://github.com/TheR1D/shell_gpt
install_command: pip install shell-gpt

category: Dev Tools
tags:
  - cli
  - terminal
  - productivity
  - shell
  - ai
  - openai
  - python
  - developer-tools
pricing: free
is_open_source: true
license: MIT

problem_solved: |
  Remembering complex shell commands, syntax, and one-liners is a constant friction point for
  developers — especially for infrequent tasks like file manipulation, text processing, system
  administration, or cloud CLI commands. ShellGPT solves this by providing a terminal-native
  tool that translates natural language prompts directly into executable shell commands. It
  supports multiple LLM backends including OpenAI, local models through Ollama, and others.
  For developers who spend significant time in the terminal, ShellGPT eliminates the need to
  context-switch to a browser to look up command syntax, reducing friction and keeping the
  workflow inside the command line.

use_cases:
  - Generate complex shell commands from natural language descriptions without context switching
  - Create shell scripts and one-liners for file processing, data manipulation, and system administration
  - Explain existing shell commands to understand what they do before executing them
  - Integrate AI-powered command generation into custom shell workflows and scripts
  - Use local models via Ollama for privacy-sensitive terminal queries without sending data to external APIs
