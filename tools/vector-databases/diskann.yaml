name: DiskANN
description: Microsoft's high-performance vector indexing library that uses compressed graph-based approximate nearest neighbor search to enable fast, fresh, and filtered vector search directly on disk without loading the entire index into memory.
tagline: Graph-based vector search that runs on disk, not RAM

github_url: https://github.com/microsoft/DiskANN
website_url: https://microsoft.github.io/DiskANN
docs_url: https://microsoft.github.io/DiskANN/getting-started.html

category: Vector DB
tags:
