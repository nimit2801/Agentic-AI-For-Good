name: Meilisearch
description: "Meilisearch is a lightning-fast open-source search engine with built-in AI-powered hybrid search that combines semantic (vector) and keyword search. It offers instant typo-tolerant search, faceted filtering, geosearch, and a developer-friendly API with SDKs for most languages."
tagline: AI-powered hybrid search engine for developers

github_url: https://github.com/meilisearch/meilisearch
website_url: https://www.meilisearch.com
docs_url: https://www.meilisearch.com/docs

install_command: |
  brew install meilisearch

category: Vector DB
tags:
  - search-engine
  - full-text-search
  - vector-search
  - semantic-search
  - hybrid-search
  - rust
  - api
pricing: freemium
is_open_source: true
license: MIT

problem_solved: |
  Modern AI applications need search that understands intent, not just keywords — but implementing hybrid search
  that combines semantic vector search with traditional full-text search is complex and infrastructure-heavy.
  Meilisearch provides a drop-in search API that handles both vector and keyword search out of the box, with
  instant typo tolerance, faceting, and ranking — without building or maintaining a separate vector database.

use_cases:
  - "Add AI-powered hybrid search to applications that combines semantic understanding with fast keyword matching"
  - "Build search interfaces for knowledge bases and documentation with instant typo-tolerant results and faceted filtering"
  - "Power product and content discovery with semantic vector search that understands user intent beyond exact keywords"
