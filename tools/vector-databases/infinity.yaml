name: Infinity
description: An AI-native database built for LLM applications that provides incredibly fast hybrid search combining dense vector, sparse vector, tensor (multi-vector), and full-text search in a single engine with high-performance ingestion and query processing.
tagline: AI-native database for hybrid search in LLM applications

github_url: https://github.com/infiniflow/infinity
website_url: https://infiniflow.org
docs_url: https://github.com/infiniflow/infinity#readme

category: Vector DB
tags: [vector-database, hybrid-search, full-text-search, embedding, dense-vector, sparse-vector, tensor, ai-native]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  RAG applications need to search across multiple representation types — dense vector embeddings for semantic similarity, sparse vectors for keyword matching, and full-text for exact term search — but most databases only support one search paradigm well. Infinity combines all four search modalities (dense, sparse, tensor, full-text) in a single engine with high-speed ingestion and sub-millisecond query latencies, eliminating the need to maintain separate systems for different search strategies in LLM applications.

use_cases:
  - "Power a RAG pipeline that combines dense semantic search with BM25 keyword matching for higher retrieval accuracy"
  - "Store and query multi-vector embeddings for sophisticated document understanding and cross-modal retrieval"
  - "Build a hybrid search backend for AI applications requiring both semantic and exact-match capabilities in one database"
  - "Ingest and index millions of document chunks at high throughput for real-time AI application queries"
  - "Replace separate vector and full-text search systems with a single unified database for LLM application backends"
