name: Orama
description: >-
  Orama is a high-performance search engine that supports full-text, vector, and hybrid search
  in a single, lightweight package. At under 2KB, it runs in browsers, on servers, and at the
  edge — with zero external dependencies. Features include BM25 scoring, typo tolerance, facets,
  geosearch, results pinning, and built-in GenAI chat sessions over your indexed data.
tagline: Full-text, vector, and hybrid search in under 2KB

github_url: https://github.com/oramasearch/orama
website_url: https://docs.orama.io
docs_url: https://docs.orama.io/docs/orama-js/overview
install_command: npm install @orama/orama

category: Vector DB
tags:
  - search
  - vector-search
  - full-text-search
  - hybrid-search
  - javascript
  - edge
  - open-source
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: >-
  Traditional search engines are either cloud-dependent (Algolia, Meilisearch), heavy (Elasticsearch),
  or lack vector/embedding capabilities for semantic search. Orama solves this by providing full-text,
  vector, and hybrid search in a single, dependency-free package under 2KB that runs anywhere —
  browser, serverless, edge, or Node.js — without external infrastructure. Developers get production-
  grade search without managing a separate search cluster.

use_cases:
  - "Build client-side search for documentation sites and e-commerce catalogs with zero server infrastructure"
  - "Power semantic search across product catalogs with vector embeddings and hybrid ranking"
  - "Implement geo-aware search for location-based applications with built-in geosearch support"
  - "Create GenAI chat experiences over indexed documents with built-in answer engine integration"
  - "Deploy search at the edge for ultra-low-latency queries on serverless and edge runtimes"
