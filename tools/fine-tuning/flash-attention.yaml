name: Flash Attention
description: "Flash Attention is a fast and memory-efficient exact attention mechanism that dramatically accelerates transformer training and inference. It computes exact attention with IO-aware algorithms that minimize GPU memory reads and writes, enabling up to 4x faster training, 10x longer context windows, and significantly reduced memory usage compared to standard attention."
tagline: Fast and memory-efficient exact attention for transformers

github_url: https://github.com/Dao-AILab/flash-attention
website_url: https://tridao.me/publications/flash2/flash2.pdf
docs_url: https://github.com/Dao-AILab/flash-attention#readme

install_command: "pip install flash-attn"

category: Fine-tuning
tags:
  - attention
  - transformer
  - training
  - inference
  - gpu
  - memory-efficient
  - deep-learning
  - llm
  - optimization
pricing: free
is_open_source: true
license: BSD-3-Clause

problem_solved: |
  Transformer models are bottlenecked by GPU memory bandwidth in their attention layers. Standard attention reads the
  full attention matrix from HBM to SRAM, consuming O(N²) memory for sequence length N and making long-context training
  prohibitively slow and memory-intensive. Flash Attention computes exact attention with sublinear I/O complexity by
  tiling the attention computation across GPU SRAM and avoiding materialization of the full N² matrix, enabling
  developers to train and fine-tune models with significantly longer sequences, lower memory usage, and faster throughput
  while maintaining numerical exactness.

use_cases:
  - "Accelerate LLM pre-training by 2-4x with exact attention that reduces GPU memory bandwidth pressure during training"
  - "Fine-tune and inference with 10x longer context windows by avoiding O(N²) memory growth in the attention layer"
  - "Train and deploy transformer models on consumer GPUs that would otherwise run out of memory with standard attention"
