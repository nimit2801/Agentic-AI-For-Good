name: FlashAttention
description: A CUDA kernel library that makes attention compute dramatically faster and more memory-efficient. FlashAttention tiles attention computation across GPU SRAM instead of writing intermediate matrices to HBM, achieving 2-8x speedup and reducing memory from quadratic to linear in sequence length for LLM training and inference.
tagline: Fast and memory-efficient exact attention for LLMs

github_url: https://github.com/Dao-AILab/flash-attention
website_url: https://github.com/Dao-AILab/flash-attention
docs_url: https://github.com/Dao-AILab/flash-attention#readme

install_command: pip install flash-attn

category: Fine-tuning
tags:
  - pytorch
  - cuda
  - attention
  - kernels
  - gpu-optimization
  - training
  - inference
pricing: free
is_open_source: true
license: BSD-3-Clause

problem_solved: |
  Standard attention mechanisms in Transformers compute the full N×N attention matrix and
  write it to GPU HBM, consuming O(N²) memory and bandwidth. This makes long-context
  training — crucial for tasks like document summarization, code analysis, and
  retrieval-augmented generation — prohibitively expensive. FlashAttention tiles the
  attention computation, never materializing the full attention matrix, and uses the
  fast on-chip SRAM instead of slow global memory. The result is up to 8x faster training
  and inference on long sequences with exact, not approximate, attention.

use_cases:
  - Train LLMs with 128K+ context windows without running out of GPU memory
  - Speed up long-context inference for RAG pipelines processing large documents
  - Enable fine-tuning of large models on consumer GPUs by reducing memory footprint
  - Accelerate Transformer training by 2-8x with a drop-in attention replacement
  - Support video understanding models that process hundreds of frame embeddings
