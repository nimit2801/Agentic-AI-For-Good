name: TRL
description: Full stack Python library for post-training transformer language models with reinforcement learning methods like SFT, GRPO, DPO, and reward modeling, built on top of the Hugging Face Transformers ecosystem.
tagline: Full stack library to post-train foundation models with RL
category: Fine-tuning
tags:
  - python
  - transformers
  - reinforcement-learning
  - llm
  - fine-tuning
  - huggingface
  - peft
  - deepspeed
  - open-source
  - machine-learning
pricing: free
is_open_source: true
license: Apache-2.0
github_url: https://github.com/huggingface/trl
website_url: https://huggingface.co/docs/trl/index
docs_url: https://huggingface.co/docs/trl/index
install_command: pip install trl
problem_solved: Post-training large language models with reinforcement learning and preference optimization involves complex algorithms and infrastructure. TRL simplifies this by providing ready-to-use trainers, CLI tools, and seamless integrations with PEFT, DeepSpeed, and vLLM for efficient scaling.
use_cases:
  - Supervised fine-tuning of language models with SFTTrainer
  - Preference alignment using DPOTrainer and GRPOTrainer
  - Reward modeling for RLHF pipelines
  - Multi-GPU distributed training with DeepSpeed and FSDP
