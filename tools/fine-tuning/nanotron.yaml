name: Nanotron
description: Hugging Face's minimal distributed training library for large language models, designed for simplicity, readability, and ease of experimentation with multi-GPU training setups.
tagline: Minimal distributed LLM training from Hugging Face

github_url: https://github.com/huggingface/nanotron
website_url: https://huggingface.co/docs/nanotron

category: Fine-tuning
tags: [distributed-training, llm, fine-tuning, huggingface, gpu, training]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Distributed training frameworks for large language models are often complex and hard to
  modify, making experimentation difficult for researchers. Nanotron provides a minimal,
  readable codebase that implements core distributed training techniques in a straightforward
  way, lowering the barrier for researchers to explore new training methods and architectures.

use_cases:
  - Train large language models across multiple GPUs with a minimal, readable codebase
  - Experiment with novel training architectures and techniques without deep framework complexity
  - Prototype distributed training setups quickly for research and development
  - Fine-tune open-source LLMs on custom datasets using multi-GPU configurations
  - Learn and teach distributed training concepts through a clean, well-documented implementation
