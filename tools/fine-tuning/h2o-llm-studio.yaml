name: H2O LLM Studio
tagline: No-code GUI and framework for fine-tuning state-of-the-art large language models
description: >
  H2O LLM Studio is an open-source framework and no-code GUI designed for
  fine-tuning state-of-the-art large language models (LLMs). It enables users
  to easily and effectively fine-tune LLMs without coding experience, supports
  recent techniques such as LoRA, 8-bit training, DeepSpeed distributed
  training, and DPO/IPO/KTO alignment, and allows seamless export to the
  Hugging Face Hub.
problem_solved: >
  Fine-tuning LLMs typically requires deep expertise in machine learning,
  distributed systems, and manual scripting. H2O LLM Studio democratizes this
  process by providing a visual, no-code interface alongside a powerful CLI,
  making custom model training accessible to data scientists and domain experts
  while still offering advanced controls for ML engineers.
use_cases:
  - Fine-tune custom instruction-following chatbots and GPTs for mobile or offline use
  - Distill large LLMs into small, task-specific SLMs to reduce cost and latency
  - Train causal classification and regression models using LLMs for conversational AI
  - Apply DPO, IPO, or KTO preference optimization to align models with human feedback
  - Export and share fine-tuned checkpoints directly to the Hugging Face Hub
github_url: https://github.com/h2oai/h2o-llmstudio
website_url: https://h2o.ai/platform/llm-studio/
docs_url: https://docs.h2o.ai/h2o-llmstudio/
install_command: make setup
license: Apache-2.0
is_open_source: true
pricing: free
category: Fine-tuning
