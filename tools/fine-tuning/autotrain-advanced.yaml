name: AutoTrain Advanced
description: No-code platform from Hugging Face for training and fine-tuning state-of-the-art machine learning models. Supports LLM fine-tuning methods including SFT, DPO, ORPO, and Reward training through a simple configuration interface or Web UI.
tagline: Fine-tune any Hugging Face model with zero code

github_url: https://github.com/huggingface/autotrain-advanced
website_url: https://huggingface.co/autotrain
docs_url: https://huggingface.co/docs/autotrain

install_command: pip install autotrain-advanced

category: Fine-tuning
tags:
  - fine-tuning
  - llm
  - no-code
  - huggingface
  - sft
  - dpo
  - orpo
  - automl
  - python
pricing: free
is_open_source: true
license: Apache 2.0

problem_solved: |
  Fine-tuning large language models traditionally requires deep expertise in training pipelines,
  hyperparameter tuning, GPU memory optimization, and distributed computing — creating a
  significant barrier for many developers and organizations. AutoTrain Advanced abstracts away
  this complexity with a configuration-driven approach and optional Web UI, enabling anyone to
  fine-tune models on custom data using best practices automatically. It supports multiple
  alignment methods (SFT, DPO, ORPO, Reward) and integrates seamlessly with the Hugging Face
  ecosystem for model hosting and sharing.

use_cases:
  - Fine-tune an LLM on custom instruction-following data using Supervised Fine-Tuning (SFT)
  - Align a model with human preferences using Direct Preference Optimization (DPO)
  - Train a reward model for RLHF pipelines
  - Fine-tune vision, text classification, or tabular models without writing training code
  - Quickly iterate on model versions using the AutoTrain Web UI or configuration files
