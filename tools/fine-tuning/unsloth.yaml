name: Unsloth
description: Fast LLM fine-tuning and inference library that lets you run and train open models locally with up to 30x faster training, 90% less memory, and support for 500+ models including text, vision, audio, and embeddings.
tagline: Train and run LLMs locally 30x faster with 70% less memory
category: Fine-tuning
tags:
  - llm
  - fine-tuning
  - inference
  - local-ai
  - open-source
  - lora
  - gguf
  - training
  - ai
  - machine-learning
pricing: freemium
is_open_source: true
license: Apache-2.0
github_url: https://github.com/unslothai/unsloth
website_url: https://unsloth.ai
docs_url: https://docs.unsloth.ai
install_command: pip install unsloth
problem_solved: Traditional LLM fine-tuning is slow, memory-intensive, and requires complex setup. Unsloth solves this by providing optimized custom kernels that make training up to 30x faster with 70-90% less memory, enabling developers to fine-tune large models on consumer hardware without sacrificing accuracy.
use_cases:
  - Fine-tuning LLMs like Mistral, Gemma, Llama, and Qwen for custom tasks
  - Running models locally with an OpenAI-compatible API and tool-calling support
  - Creating custom training datasets from PDFs, CSVs, and JSON files
  - Fine-tuning vision, audio, and embedding models efficiently
  - Exporting fine-tuned models to GGUF, Safetensors, Ollama, or vLLM formats
