name: xTuring
tagline: Fine-tune, evaluate, and run private personalized LLMs
description: |-
  xTuring makes it simple, fast, and cost-efficient to fine-tune open-source LLMs on your own data, locally or in your private cloud. Supports GPT-OSS, LLaMA, Qwen, MiniMax, Mamba and more with LoRA and INT8/INT4 optimization. Built-in evaluation metrics and a simple Python API for data preparation, training, and inference — all from a single pip install.
problem_solved: |-
  Fine-tuning large language models typically requires complex infrastructure setup, extensive coding, and deep ML expertise. xTuring provides a clean Python API that handles the entire fine-tuning pipeline — data preparation, LoRA and low-precision training, inference, and evaluation — running locally or in your private cloud without expensive managed services.
github_url: https://github.com/stochasticai/xTuring
website_url: https://xturing.stochastic.ai
docs_url: https://xturing.stochastic.ai
install_command: pip install xturing
category: Fine-tuning
tags:
  - fine-tuning
  - llm
  - lora
  - training
  - open-source-llms
pricing: free
is_open_source: true
license: Apache-2.0
use_cases:
  - Fine-tuning open-source LLMs like LLaMA, Qwen, and Mamba on custom datasets
  - Running private fine-tuning experiments locally or in a VPC with data sovereignty
  - Optimizing training with LoRA and INT8/INT4 low-precision methods to reduce costs
  - Evaluating model quality with built-in metrics like perplexity after fine-tuning
  - Deploying fine-tuned models for inference with a simple Python API
