name: Kiln
description: >
  A free, open-source workbench for the full AI development loop — evals,
  prompt optimization, RAG, fine-tuning, synthetic data generation, agents,
  and tools — all in one platform. The desktop app lets non-technical team
  members contribute ratings without writing code, while the Python library
  deploys the same tasks to production. Runs locally with your API keys or
  offline with Ollama across 190+ models from OpenAI, Anthropic, Gemini,
  Bedrock, and more.
problem_solved: >
  AI development tooling is fragmented — teams must choose between code-only
  frameworks covering a single slice (orchestration, evals, or RAG) or paid
  SaaS platforms that lock in data and cannot be extended. Kiln solves this
  with a free, local-first, unified workbench where a single dataset flows
  through evals, prompt optimization, fine-tuning, RAG, agents, and synthetic
  data generation — all measurable, traceable, and collaborative with zero
  vendor lock-in and full data ownership.
tagline: A unified workbench for the full AI development loop — evals, fine-tuning, RAG, and agents
use_cases:
  - Zero-code fine-tuning of LLMs across 60+ models with automatic deployment to Fireworks, Together, and Vertex
  - Synthetic data generation for creating high-quality training datasets with interactive visual tooling and selective saving
  - AI system evaluation using LLM-as-Judge and G-Eval with auto-generated judge prompts and synthetic eval datasets
  - Building RAG systems with drag-and-drop support for PDFs, images, video, and audio documents
  - Composing multi-agent hierarchies with sub-agents, tools, MCP servers, and structured JSON outputs
category: Fine-tuning
tags:
  - fine-tuning
  - llm
  - evaluation
  - synthetic-data
  - rag
  - agents
  - prompt-optimization
  - python
pricing: free
is_open_source: true
