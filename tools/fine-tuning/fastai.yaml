name: FastAI
description: A high-level deep learning library built on PyTorch that provides best-practice training workflows, pre-built models, and APIs for computer vision, NLP, tabular data, and collaborative filtering with minimal code.
tagline: High-level deep learning library that makes state-of-the-art training accessible

github_url: https://github.com/fastai/fastai
website_url: https://www.fast.ai
docs_url: https://docs.fast.ai
install_command: pip install fastai

category: Fine-tuning
tags: [python, deep-learning, training, pytorch, fine-tuning, nlp, vision]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  Applying deep learning to real problems requires juggling complex training loops, learning rate
  schedules, data augmentation pipelines, and GPU optimization — each with its own best practices
  that change by domain. FastAI wraps proven training methodologies into a high-level API that
  automatically applies optimal defaults for vision, text, tabular, and collaborative filtering
  tasks. Practitioners get production-quality results without writing training loops or tuning
  hyperparameters from scratch.

use_cases:
  - Train image classification models on custom datasets with automatic learning rate finding and data augmentation
  - Fine-tune transformer language models for text classification, sentiment analysis, or named entity recognition
  - Build tabular data models for regression and classification with automatic handling of categorical variables
  - Train collaborative filtering recommenders using the same high-level API as vision and NLP models
