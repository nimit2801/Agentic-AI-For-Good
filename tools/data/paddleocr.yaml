name: PaddleOCR
description: Open-source OCR and document parsing toolkit for turning PDFs, scans, and images into structured text, tables, and layout-aware data for AI workflows.
tagline: OCR and document parsing for AI-ready structured data

github_url: https://github.com/PaddlePaddle/PaddleOCR
website_url: https://www.paddleocr.com/
docs_url: https://www.paddleocr.ai/latest/en/index.html
install_command: pip install paddleocr

category: Data
tags: [ocr, document-processing, pdf-parsing, data-extraction, multilingual, table-extraction, rag]
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: |
  AI systems cannot search or reason over scanned PDFs, forms, invoices, and document images until the
  contents are extracted from layouts, tables, and noisy OCR text. PaddleOCR converts these files into
  structured, machine-readable outputs such as text, tables, Markdown, and JSON so they can be indexed,
  validated, and passed reliably into downstream RAG, analytics, or automation pipelines.

use_cases:
  - Parse PDFs and document images into Markdown or JSON for RAG ingestion pipelines
  - Extract tables and layout structure from reports, invoices, forms, and scanned records
  - Run multilingual OCR across large collections of business documents and archives
  - Preprocess document corpora for downstream agents, search systems, and LLM applications
