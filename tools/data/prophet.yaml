name: Prophet
description: |-
  A forecasting tool for time series data with multiple seasonality, linear or non-linear growth, and holiday effects, designed to produce high quality forecasts that are intuitive to configure and interpret.
tagline: High quality time series forecasting made easy

github_url: https://github.com/facebook/prophet
website_url: https://facebook.github.io/prophet
docs_url: https://facebook.github.io/prophet/docs

category: Data
tags: [python, r, time-series, forecasting, seasonality, anomaly-detection, facebook]
pricing: free
is_open_source: true
license: MIT

problem_solved: |-
  Traditional time series forecasting methods require significant statistical expertise to tune and often struggle with missing data, outliers, and multiple seasonal patterns. Prophet automates the forecasting process with a decomposable additive model that handles daily, weekly, and yearly seasonality, holiday effects, and trend changepoints — producing accurate and interpretable forecasts from a simple, intuitive API.

use_cases:
  - Forecast website traffic and user growth with automatic detection of weekly and yearly seasonal patterns
  - Predict product demand for inventory planning including holiday and promotion effects
  - Generate capacity planning forecasts for cloud infrastructure with trend changepoint detection
  - Analyze business metric anomalies by comparing actual values against model-predicted intervals
