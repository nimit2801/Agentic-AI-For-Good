name: Maxun
description: Open-source no-code web data platform for turning websites into structured APIs. Supports web scraping, crawling, search, and AI-powered data extraction through recorder mode or natural language prompts.
problem_solved: Teams waste weeks writing and maintaining brittle web scraping scripts that break when sites change. Maxun solves this with a no-code platform that records browser actions, uses LLMs for intelligent extraction, and turns any website into a reliable structured API without writing code.
use_cases:
  - Extract product listings and prices from e-commerce sites at scale
  - Scrape job postings from multiple boards into a unified database
  - Monitor competitor websites for price and content changes automatically
  - Convert unstructured web pages into clean Markdown for AI workflows
github_url: https://github.com/getmaxun/maxun
website_url: https://www.maxun.dev
docs_url: https://docs.maxun.dev
install_command: |
  git clone https://github.com/getmaxun/maxun.git
  cd maxun
  cp ENVEXAMPLE .env
  docker compose up -d
category: Data
tags: [web-scraping, data-extraction, no-code, api, crawling]
pricing: free
is_open_source: true
license: AGPL-3.0
