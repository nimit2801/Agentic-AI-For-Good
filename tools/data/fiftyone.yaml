name: FiftyOne
description: An open-source tool for building high-quality datasets and computer vision models, providing dataset curation, analysis, visualization, and model evaluation in a single platform.
tagline: Build better datasets and vision models with ease
category: Data
tags:
  - computer-vision
  - datasets
  - data-quality
  - annotation
  - active-learning
  - data-centric-ai
  - mlops
  - data-curation
pricing: free
is_open_source: true
license: Apache-2.0
github_url: https://github.com/voxel51/fiftyone
website_url: https://fiftyone.ai
docs_url: https://docs.voxel51.com
install_command: pip install fiftyone
problem_solved: Building high-quality computer vision datasets is difficult — data scientists lack tools to explore, analyze, and curate their datasets effectively. FiftyOne solves this by providing an interactive platform for dataset visualization, quality analysis, model evaluation, and active learning, enabling rapid iteration on data quality.
use_cases:
  - Exploring and visualizing large computer vision datasets with embedded annotations and labels
  - Identifying labeling errors, duplicates, and edge cases to improve dataset quality and model performance
  - Comparing model predictions against ground truth for comprehensive model evaluation and debugging
