name: Surya
description: >-
  Surya is a multilingual document OCR toolkit that provides accurate text detection, text
  recognition, layout analysis, table recognition, and reading order extraction from PDFs and
  images. Built by the creator of Marker, it supports over 90 languages and delivers state-of-the-art
  OCR performance with vision-transformer-based models that handle complex layouts, math
  equations, and mixed-language documents.
tagline: Multilingual OCR and document understanding with vision transformers

github_url: https://github.com/VikParuchuri/surya
website_url: https://www.datalab.to
docs_url: https://github.com/VikParuchuri/surya?tab=readme-ov-file
install_command: pip install surya-ocr

category: Data
tags:
  - ocr
  - document-intelligence
  - pdf
  - text-detection
  - layout-analysis
  - table-recognition
  - multilingual
  - vision-transformer
pricing: free
is_open_source: true
license: Apache-2.0

problem_solved: >-
  Extracting text from PDFs, scanned documents, and images reliably remains a hard problem for AI
  pipelines — especially with complex layouts, tables, math equations, and mixed-language content.
  Traditional OCR engines like Tesseract struggle with layout understanding and modern document
  structures. Surya solves this with vision-transformer models purpose-built for document
  understanding: it detects text regions, recognizes characters, analyzes page layout, extracts
  tables, and preserves reading order — all in a single pipeline with multilingual support for
  over 90 languages.

use_cases:
  - Extract clean, structured text from scanned PDFs and images for RAG ingestion pipelines
  - Recognize and extract text from complex document layouts including tables, columns, and multi-language content
  - Process large batches of historical or multilingual documents with reading-order-preserving OCR
  - Extract table structures from scanned reports and financial documents for data analysis
  - Power automated document processing workflows that convert paper records into searchable digital archives
