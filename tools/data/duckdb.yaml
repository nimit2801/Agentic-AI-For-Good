name: DuckDB
tagline: Run analytics where your data lives
description: DuckDB is an analytical in-process SQL database management system. It is designed to run fast SQL analytics directly inside applications, notebooks, and pipelines without requiring a separate database server, enabling data teams to analyze data where it lives.
problem_solved: DuckDB eliminates the need to deploy and manage heavy external database servers for analytical workloads. It provides a fast, embeddable SQL engine that runs in-process, drastically reducing infrastructure complexity and allowing developers and data scientists to run high-performance analytics locally or inside their applications.
use_cases:
  - Interactive data analysis and exploration in Python, R, and Jupyter notebooks
  - ETL pipelines processing Parquet, CSV, JSON, and cloud object storage
  - Embedded analytics in applications without external database dependencies
  - Direct SQL querying of data lakes including Iceberg and Delta Lake
  - Lightweight local OLAP for data engineering and ad-hoc reporting
github_url: https://github.com/duckdb/duckdb
website_url: https://duckdb.org
docs_url: https://duckdb.org/docs/
install_command: pip install duckdb
category: Data
