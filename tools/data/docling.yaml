name: Docling
description: >
  Docling simplifies document processing, parsing diverse formats —
  including advanced PDF understanding — and providing seamless
  integrations with the gen AI ecosystem.
tagline: Get your documents ready for gen AI
problem_solved: >
  Documents (especially PDFs, scans, and mixed-layout files) are messy
  and unstructured, making them hard for AI systems to consume
  accurately. Docling converts complex documents into clean, structured
  representations (Markdown, JSON, HTML, DocTags) with accurate
  extraction of tables, formulas, reading order, images, and OCR text,
  eliminating brittle custom parsers and enabling reliable downstream
  AI, RAG, and agentic workflows.
use_cases:
  - RAG pipeline ingestion — chunk and convert PDFs, DOCX, PPTX for vector stores (Milvus, Weaviate, Qdrant) via LangChain, LlamaIndex, or Haystack integrations.
  - Structured data extraction — parse financial reports (XBRL), patents (USPTO), and scientific articles (JATS) into machine-readable structured data.
  - Agentic AI and assistants — equip Cursor, MCP-based agents, and other AI assistants with document-reading skills using the Docling MCP server and agent skills.
  - Document conversion and OCR — convert scanned PDFs and images to accessible Markdown, HTML, or JSON with table structure recovery and reading order detection.
  - Audio and video transcription processing — parse WebVTT, WAV, and MP3 with ASR models for downstream AI workflows.
github_url: https://github.com/docling-project/docling
website_url: https://www.docling.ai/
docs_url: https://docling-project.github.io/docling/
install_command: pip install docling
