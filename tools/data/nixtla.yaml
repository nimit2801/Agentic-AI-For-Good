name: Nixtla
description: |-
  A time series forecasting SDK providing production-ready pre-trained foundation models (TimeGPT) and scalable forecasting algorithms through a unified API, enabling accurate predictions across retail, finance, IoT, and energy domains with minimal code.
tagline: Pre-trained time series foundation models for forecasting and anomaly detection

github_url: https://github.com/Nixtla/nixtla
website_url: https://www.nixtla.io
docs_url: https://docs.nixtla.io

category: Data
tags: [python, time-series, forecasting, anomaly-detection, foundation-model, machine-learning]
pricing: freemium
is_open_source: true
license: MIT

problem_solved: |-
  Building accurate time series forecasts traditionally requires deep domain expertise in statistics, manual feature engineering, and complex model selection. Nixtla provides a unified API that gives access to both pre-trained foundation models (TimeGPT) and classic forecasting algorithms, handling seasonality, trend decomposition, and anomaly detection out of the box with just a few lines of Python code.

use_cases:
  - Forecast retail demand and inventory needs across thousands of SKUs with automatic seasonality detection
  - Predict energy consumption and renewable generation for grid operators using multivariate time series
  - Detect anomalies in IoT sensor data streams with pre-configured confidence intervals
  - Generate financial market forecasts with multiple seasonality patterns and uncertainty quantification
