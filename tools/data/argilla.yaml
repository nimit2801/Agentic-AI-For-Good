name: Argilla
description: A collaboration platform for AI engineers and domain experts to build high-quality datasets through human-in-the-loop annotation, programmatic labeling, and continuous model improvement.
tagline: Build high-quality datasets for AI
github_url: https://github.com/argilla-io/argilla
website_url: https://argilla-io.github.io/argilla/latest/

category: Data
tags: [python, data-annotation, datasets, active-learning, nlp, llm, rlhf, human-in-the-loop]
pricing: free
is_open_source: true
license: Apache-2.0

install_command: pip install argilla

problem_solved: |
  Building high-quality datasets for AI projects is a fragmented, manual process — data
  scientists use one-off scripts for annotation, domain experts lack accessible interfaces,
  and there's no systematic way to track data quality or iterate on annotations. Argilla
  provides a shared workspace where AI engineers and domain experts collaborate on dataset
  creation through an intuitive web UI and a Python SDK. It supports text classification,
  NER, preference tuning for LLMs, and multimodal annotation, with built-in quality
  monitoring and active learning workflows.

use_cases:
  - Create high-quality training datasets for LLM fine-tuning through collaborative human annotation
  - Build RLHF preference datasets by collecting and ranking model outputs with domain expert feedback
  - Annotate named entities and text classifications at scale with active learning to minimize labeling effort
  - Set up continuous evaluation pipelines where model outputs are reviewed and annotated for quality monitoring
  - Collaborate across teams with programmatic data access via the Python SDK and real-time web UI dashboards
