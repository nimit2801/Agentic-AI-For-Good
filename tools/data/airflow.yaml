name: Apache Airflow
tagline: A platform to programmatically author, schedule, and monitor workflows
description: Apache Airflow is an open-source platform for authoring, scheduling, and monitoring batch-oriented workflows as directed acyclic graphs (DAGs) in Python. It features a rich web UI, extensive integrations with cloud providers and databases, and a modular architecture that scales from single machines to large distributed deployments. Airflow is the industry standard for data pipeline orchestration.
problem_solved: Orchestrating complex multi-step data pipelines across disparate systems is difficult without a centralized scheduler. Airflow solves this by allowing teams to define workflows as Python DAGs with built-in scheduling, retry logic, monitoring, alerting, and integrations across cloud providers, databases, and services.
use_cases:
  - Orchestrating ETL and ELT data pipelines and batch processing workflows
  - Scheduling and monitoring machine learning model training pipelines
  - Automating cloud infrastructure provisioning and data transfer jobs
  - Running data quality checks, validation, and reporting workflows
category: Data
tags:
  - workflow-orchestration
  - data-pipeline
  - ETL
  - scheduling
  - DAG
  - automation
  - data-engineering
  - python
github_url: https://github.com/apache/airflow
website_url: https://airflow.apache.org
docs_url: https://airflow.apache.org/docs
install_command: pip install apache-airflow
pricing: free
is_open_source: true
license: Apache 2.0
