name: NetworkX
description: A Python library for the creation, manipulation, and study of complex networks and graph structures, widely used for knowledge graph construction, relational reasoning, and graph-based ML feature engineering.
tagline: Python library for complex network analysis

github_url: https://github.com/networkx/networkx
website_url: https://networkx.org
docs_url: https://networkx.org/documentation

install_command: pip install networkx

category: Data
tags: [graph, network-analysis, python, data-structures, knowledge-graph, complex-systems]
pricing: free
is_open_source: true
license: BSD-3-Clause

problem_solved: |
  Building and analyzing graph structures — knowledge graphs, social networks, 
  dependency graphs, or biological networks — requires robust data structures and 
  algorithms that standard Python libraries don't provide. NetworkX offers a 
  comprehensive suite of graph data structures and algorithms (search, shortest 
  paths, centrality, clustering, community detection, isomorphism) with a clean, 
  Pythonic API that integrates naturally with data science workflows and 
  visualization tools.

use_cases:
  - Construct and query knowledge graphs from structured data sources for graph-based retrieval and reasoning in AI pipelines
  - Analyze dependency graphs in ML pipelines to identify critical paths, bottlenecks, and single points of failure
  - Compute graph metrics like centrality, PageRank, and community structure on large networks for feature engineering
  - Model relationships between entities, documents, and concepts as graphs for graph neural network training data preparation
