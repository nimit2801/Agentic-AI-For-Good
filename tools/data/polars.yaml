name: Polars
tagline: Extremely fast Query Engine for DataFrames, written in Rust
description: Polars is a blazingly fast DataFrame library for manipulating structured data. Written from scratch in Rust, it provides an expressive, multi-threaded query engine with lazy and eager execution, streaming for larger-than-RAM datasets, and powerful query optimization. Available for Python, Rust, R, Node.js, and SQL.
problem_solved: Data scientists and engineers struggle with slow DataFrame operations and memory limitations when processing large datasets on a single machine. Polars solves this by providing a Rust-powered, vectorized query engine that achieves 30x+ performance over pandas, supports out-of-core streaming, and utilizes all CPU cores without extra configuration — all with zero required dependencies.
use_cases:
  - High-performance ETL and data wrangling on single machines
  - Streaming analytics for datasets larger than available RAM
  - Replacing pandas in data science pipelines for faster query execution
  - Building data applications in Python, Rust, R, or Node.js
github_url: https://github.com/pola-rs/polars
website_url: https://pola.rs
docs_url: https://docs.pola.rs
install_command: pip install polars
