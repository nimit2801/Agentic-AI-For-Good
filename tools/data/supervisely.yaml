name: Supervisely
description: An open-source web platform for data-centric AI combining data labeling, dataset management, model training, and deployment in a unified environment. It handles images, videos, point clouds, volumes, and tabular data with collaborative annotation, automated labeling with AI-assistance, and MLOps pipelines.
tagline: Unified platform for data-centric computer vision and AI

github_url: https://github.com/supervisely/supervisely
website_url: https://supervisely.com
docs_url: https://docs.supervisely.com

category: Data
tags: [computer-vision, data-labeling, annotation, data-management, mlops, image-segmentation, training]
pricing: freemium
is_open_source: true
license: Apache-2.0
install_command: pip install supervisely

problem_solved: |
  Computer vision projects require a fragmented stack: separate tools for labeling, dataset storage, model training, and deployment. Supervisely unifies the entire data-centric AI workflow on a single platform — from annotation and label management to model training, evaluation, and deployment. It supports images, video, volumetric data, and point clouds with collaborative labeling, AI-assisted automation, and a plugin ecosystem for integrating custom models and pipelines.

use_cases:
  - Curate and label large-scale computer vision datasets with AI-assisted annotation tools for images, video, and point clouds
  - Train and evaluate instance segmentation, object detection, and classification models within the platform
  - Automate data preprocessing pipelines with Python plugins and built-in transformation tools
  - Collaborate on annotation projects with role-based access, review workflows, and version control
  - Deploy trained models as REST API services directly from the platform for production inference
