name: Cleanlab
tagline: Automatically detect data and label issues in your ML datasets
description: Cleanlab's open-source library is the standard data-centric AI package for data quality and machine learning with messy, real-world data and labels.
problem_solved: ML models are only as good as the data they train on, yet real-world datasets are plagued by label errors, outliers, duplicates, and other quality issues that silently degrade model performance. Cleanlab automatically identifies these issues using your existing models, enabling you to clean datasets and train more robust ML systems without changing your modeling code.
use_cases:
  - Automatically detect label errors, outliers, and duplicates in image, text, audio, and tabular datasets
  - Train robust classification and regression models that are resilient to noisy labels
  - Improve consensus labels and estimate annotator quality for multi-annotator data
github_url: https://github.com/cleanlab/cleanlab
website_url: https://cleanlab.ai
docs_url: https://docs.cleanlab.ai
install_command: pip install cleanlab
category: Data
tags:
  - data-quality
  - data-cleaning
  - label-errors
  - outlier-detection
  - machine-learning
  - data-centric-ai
  - python
  - active-learning
pricing: free
is_open_source: true
license: Apache-2.0
