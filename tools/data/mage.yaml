name: Mage
description: >
  Mage is an open-source data pipeline tool that transforms and integrates data.
  It offers a modern visual replacement for Airflow, letting teams build, run,
  and manage data pipelines using Python, SQL, and R with instant feedback,
  built-in best practices, and native integrations with 100+ data sources.
tagline: Modern open-source data pipeline tool — the replacement for Airflow

github_url: https://github.com/mage-ai/mage-ai
website_url: https://www.mage.ai
docs_url: https://docs.mage.ai

install_command: pip install mage-ai

category: Data
tags: [python, data-engineering, etl, elt, data-pipeline, orchestration, sql, spark, dbt, open-source]
pricing: freemium
is_open_source: true
license: Apache-2.0

problem_solved: |
  Data engineers struggle with the complexity of building and orchestrating data
  pipelines in legacy tools like Airflow, where feedback loops are slow and
  best practices are hard to enforce. Mage replaces this with an intuitive visual
  interface, instant code feedback, and built-in engineering patterns for ETL/ELT
  workflows, slashing development time from days to hours.

use_cases:
  - "Build and orchestrate ETL/ELT pipelines with Python, SQL, or R in a visual editor"
  - Sync data between 100+ third-party sources and destinations with real-time monitoring
  - "Automate data transformations for machine learning feature engineering and analytics"
  - Collaborate on data workflows with team-wide version control and deployment
