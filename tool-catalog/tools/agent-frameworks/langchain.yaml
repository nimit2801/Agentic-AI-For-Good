integration:
  install_command: pip install langchain
  code_snippet: |
    from langchain import OpenAI, LLMChain, PromptTemplate
    from langchain.memory import ConversationBufferMemory

    template = """You are a helpful assistant.
    {history}
    Human: {input}
    Assistant:"""

    prompt = PromptTemplate(
        input_variables=["history", "input"],
        template=template
    )

    llm = OpenAI(temperature=0)
    memory = ConversationBufferMemory()
    chain = LLMChain(llm=llm, prompt=prompt, memory=memory)

    response = chain.predict(input="Hello!")
  guide: |
    ## Getting Started with LangChain

    1. **Installation**: `pip install langchain`
    2. **Set up API keys**: Export your LLM provider API key as an environment variable
    3. **Build your first chain**: Start with a simple LLMChain and expand
    4. **Add memory**: Use ConversationBufferMemory for chat applications
