name: LangChain
slug: langchain
tagline: Framework for building context-aware reasoning applications with LLMs
description: LangChain is a framework for developing applications powered by language models, making it easy to connect LLMs to external data sources and build complex workflows.
long_description: |
  LangChain is a comprehensive framework for building applications with large language models (LLMs). 
  It provides a standard interface for chains, lots of integrations with other tools, and end-to-end chains for common applications.
  
  Key features include:
  - Prompt management and optimization
  - Chains for combining components
  - Data augmented generation (RAG)
  - Agent-based architectures
  - Memory management for conversational context
category: Agents
