name: OpenAI API
slug: openai
tagline: Access GPT-4, DALL-E, Whisper, and other state-of-the-art AI models
description: OpenAI's API provides access to powerful language models including GPT-4, GPT-3.5, and specialized models for embeddings, image generation, and speech.
long_description: |
  The OpenAI API gives developers access to cutting-edge AI models through a simple REST API.
  
  Available models include:
  - GPT-4 and GPT-4 Turbo: Advanced reasoning and instruction following
  - GPT-3.5 Turbo: Fast and cost-effective for most tasks
  - DALL-E 3: State-of-the-art image generation
  - Whisper: Robust speech recognition and translation
  - Embeddings: Text embedding models for search and clustering
  - Moderation: Content safety and policy compliance
  
  The API supports function calling, fine-tuning, streaming responses, and more.
