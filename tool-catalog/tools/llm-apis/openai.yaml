integration:
  install_command: pip install openai
  code_snippet: |
    from openai import OpenAI

    client = OpenAI()

    completion = client.chat.completions.create(
        model="gpt-4",
        messages=[
            {"role": "system", "content": "You are a helpful assistant."},
            {"role": "user", "content": "Hello!"}
        ]
    )

    print(completion.choices[0].message.content)
  guide: |
    ## Quick Start

    1. **Get API key**: Sign up at platform.openai.com and create an API key
    2. **Install SDK**: `pip install openai`
    3. **Set environment variable**: `export OPENAI_API_KEY=your_key`
    4. **Make your first request**: Use the code snippet above
    
    ## Best Practices
    
    - Use streaming for real-time applications
    - Implement retry logic with exponential backoff
    - Monitor token usage to control costs
    - Use function calling for structured outputs
