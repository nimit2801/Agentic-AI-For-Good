<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Banner Review</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1A1A1A;
      font-family: 'Inter', sans-serif;
      color: #F5F1EB;
      padding: 40px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #6B6560;
      font-size: 14px;
      margin-bottom: 40px;
    }
    .banner-section {
      margin-bottom: 48px;
    }
    .banner-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #D4754E;
      margin-bottom: 12px;
    }
    .banner-wrapper {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(245, 241, 235, 0.1);
    }
    .banner-wrapper img {
      width: 100%;
      display: block;
    }
    .banner-notes {
      margin-top: 12px;
      font-size: 13px;
      color: #6B6560;
      line-height: 1.5;
    }
    hr {
      border: none;
      border-top: 1px solid rgba(245, 241, 235, 0.08);
      margin: 40px 0;
    }
    .ref-section {
      margin-top: 48px;
    }
    .ref-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6B6560;
      margin-bottom: 12px;
    }
    .ref-wrapper {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(245, 241, 235, 0.06);
      max-width: 800px;
    }
    .ref-wrapper img {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <h1>LinkedIn Banner Review</h1>
  <p class="subtitle">V1 Edited &mdash; resized to 1584 x 396</p>

  <div class="banner-section">
    <div class="banner-label">V1 Edited &mdash; Current</div>
    <div class="banner-wrapper">
      <img src="/images/banner-v1-edited.png" alt="V1 Edited">
    </div>
    <p class="banner-notes">Stock images removed. Headline fixed. Text repositioned center-right. Still needs: tighter vertical spacing, terracotta accent, decorative circles.</p>
  </div>

  <hr>

  <div class="ref-section">
    <div class="ref-label">Reference &mdash; OG Image (target aesthetic)</div>
    <div class="ref-wrapper">
      <img src="/og-image.png" alt="OG Image Reference">
    </div>
  </div>
</body>
</html>
